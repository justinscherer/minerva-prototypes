<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wikipedia Minerva Tester</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────── */
    body {
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #e9ebee;
    }

    /* ── Control bar ───────────────────────────────────────── */
    #control-bar {
      background: #1d1f23;
      padding: 7px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 300;
    }
    #home-link { color: #888; font-size: 11px; font-family: monospace; flex-shrink: 0; text-decoration: none; }
    #home-link:hover { color: #aaa; text-decoration: underline; }
    #lang-input {
      width: 48px; padding: 5px 7px;
      background: #2d2f35; border: 1px solid #555; color: #eee;
      font-size: 13px; border-radius: 4px; font-family: monospace;
    }
    #article-input {
      flex: 1; min-width: 160px; padding: 5px 8px;
      background: #2d2f35; border: 1px solid #555; color: #eee;
      font-size: 13px; border-radius: 4px;
    }
    #load-btn {
      padding: 5px 16px; background: #3366cc; color: #fff;
      border: none; border-radius: 4px; font-size: 13px;
      font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    #load-btn:hover { background: #1a4fbf; }
    #status-text { color: #888; font-size: 11px; font-family: monospace; }

    /* ── Page wrapper ──────────────────────────────────────── */
    #page-wrapper {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: calc(100vh - 38px);
      overflow-x: clip;
    }

    /* ── Minerva header ────────────────────────────────────── */
    .mw-header {
      height: 54px;
      background: #f8f9fa;
      border-bottom: 1px solid #dadde3;
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      flex-shrink: 0;
    }
    .mw-menu-btn, .mw-search-btn {
      background: none; border: none; cursor: pointer;
      color: #54595d; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mw-wordmark {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      text-decoration: none;
      display: flex;
      align-items: center;
      line-height: 0;
    }
    .mw-search-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Article outer wrapper ─────────────────────────────── */
    .article-outer {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Title section ─────────────────────────────────────── */
    .article-title-section { padding: 30px 16px 0; }
    .article-title-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }
    .article-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 27.2px; line-height: 36px;
      color: #101418; font-weight: normal;
      flex: 1; min-width: 0;
    }
    .article-actions {
      display: flex; align-items: center;
      gap: 0; flex-shrink: 0; padding-top: 6px;
    }
    .article-action-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: #3366cc; border-radius: 2px;
    }

    /* ── InfoChips ─────────────────────────────────────────── */
    .article-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; margin-top: 8px;
    }
    .infochip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e8eeff; color: #3366cc;
      border-radius: 9999px; padding: 1px 6px;
      font-size: 12px; line-height: 20px;
      cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .infochip svg { flex-shrink: 0; }

    /* ── Image gallery ─────────────────────────────────────── */
    .gallery-scroll {
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-left: 16px;
    }
    .gallery-scroll::-webkit-scrollbar { display: none; }
    .gallery-track { display: flex; gap: 4px; }
    .gallery-img {
      width: 175px; height: 175px;
      flex-shrink: 0; object-fit: cover;
      display: block; background: #f8f9fa;
    }
    /* ── Article text (shared base) ────────────────────────── */
    .art {
      padding: 0 16px;
      color: #202122;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .art a { color: #3366cc; text-decoration: none; }
    .art a:hover { text-decoration: underline; }
    .art sup { font-size: 9px; vertical-align: super; line-height: 0; }
    .art sup a { color: #3366cc; }
    .art small { font-size: 12px; }

    /* Lead uses same sizing as body — no separate overrides */

    /* Body sections — 16px */
    .art.body p, .art.body li { font-size: 16px; line-height: 26.4px; margin-bottom: 16px; }
    .art.body p:last-child { margin-bottom: 0; }
    .art.body ul, .art.body ol { padding-left: 22px; margin-bottom: 16px; }
    .art.body h3 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px; line-height: 26px; font-weight: normal;
      color: #101418; margin: 16px 0 8px;
    }
    .art.body h4 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px; line-height: 23px; font-weight: normal;
      color: #101418; margin: 12px 0 6px;
    }

    /* Infobox */
    .art table.infobox {
      width: 100%; border-collapse: collapse;
      font-size: 14.4px; line-height: 24px;
      color: #202122; margin: 0 0 12px;
    }
    .art table.infobox caption {
      font-weight: bold; text-align: center; font-size: 14.4px;
      padding: 8px 10px; border: 1px solid #eaecf0; border-bottom: none;
    }
    .art table.infobox th,
    .art table.infobox td {
      border: 1px solid #eaecf0; padding: 8px 10px; vertical-align: top;
    }
    .art table.infobox .infobox-above th,
    .art table.infobox .infobox-title th,
    .art table.infobox .infobox-header th {
      text-align: center; font-weight: bold;
    }
    .art table.infobox .infobox-image td { text-align: center; }
    .art table.infobox img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

    /* Tighter list & paragraph styling inside infobox —
       overrides the body-section defaults (16px / 26.4px / 16px margin) */
    .art table.infobox ul,
    .art table.infobox ol {
      padding-left: 16px;
      margin: 2px 0;
    }
    .art table.infobox li {
      font-size: 14.4px;
      line-height: 20px;
      margin-bottom: 2px;
    }
    .art table.infobox li:last-child { margin-bottom: 0; }
    .art table.infobox p { font-size: 14.4px; line-height: 20px; margin-bottom: 4px; }
    .art table.infobox p:last-child { margin-bottom: 0; }

    /* Infobox collapse */
    .infobox-wrap { position: relative; margin-bottom: 12px; }
    .infobox-wrap.collapsed { max-height: 750px; overflow: hidden; margin-bottom: 0; }
    .infobox-fade {
      position: absolute;
      bottom: 40px; left: 0; right: 0;
      height: 72px;
      background: linear-gradient(to bottom, transparent, #fff);
      pointer-events: none;
    }
    .infobox-read-more {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: #fff;
      border: 1px solid #eaecf0;
      color: #3366cc;
      font-size: 14px;
      font-weight: 600;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
      text-align: center;
    }
    .infobox-read-more:hover { background: #f8f9fa; }

    /* Blockquote */
    .art blockquote {
      border-left: 3px solid #c8ccd1;
      padding: 6px 32px 6px 40px;
      font-family: 'Charter', 'Bitstream Charter', Georgia, serif;
      font-size: 17.6px; line-height: 29.04px; color: #202122;
      margin: 8px 0;
    }

    /* Floated thumb images */
    .art .thumb, .art .tright {
      float: right; margin: 0 0 12px 16px; max-width: 220px; clear: right;
    }
    .art .tleft {
      float: left; margin: 0 16px 12px 0; max-width: 220px; clear: left;
    }
    .art .thumb img, .art .tright img, .art .tleft img,
    .art figure img {
      max-width: 100%; height: auto; display: block;
    }
    .art .thumbcaption, .art figcaption {
      font-size: 13px; line-height: 19.5px; color: #54595d; margin-top: 6px;
    }
    .art figure { margin: 10px 0; max-width: 220px; }

    /* Other Wikipedia tables */
    .art table:not(.infobox) {
      width: 100%; border-collapse: collapse;
      font-size: 14px; margin: 8px 0; overflow-x: auto; display: block;
    }
    .art table:not(.infobox) th,
    .art table:not(.infobox) td {
      border: 1px solid #eaecf0; padding: 6px 8px; font-size: 14px;
    }

    /* Wikipedia-specific noise to hide */
    .art .mw-editsection, .art .noprint, .art .navbox,
    .art .navigation-not-searchable, .art .geo-dms,
    .art .geo-nondefault, .art .mw-kartographer-map,
    .art .mbox-small, .art .ambox, .art .tmbox { display: none; }

    /* Clearfix */
    .art::after { content: ''; display: table; clear: both; }

    /* ── Accordion sections ────────────────────────────────── */
    .acc-section {}
    .acc-header {
      background: #fff;
    }
    .acc-section.open .acc-header {
      position: sticky;
      top: var(--control-bar-h, 38px);
      z-index: 10;
    }
    .acc-btn {
      width: 100%; display: flex; align-items: flex-start;
      background: none; border: none; padding: 12px 16px 8px;
      cursor: pointer; text-align: left;
    }
    .acc-chevron {
      width: 16px; height: 16px; flex-shrink: 0; margin-top: 7px;
      color: #54595d; transition: transform 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .acc-section.open .acc-chevron { transform: rotate(90deg); }
    .acc-title-group { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .acc-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px; line-height: 31.2px;
      color: #101418; font-weight: normal;
    }
    .acc-link-list {
      font-size: 14px; line-height: 20px;
      color: #54595d; overflow: hidden;
      max-height: 40px; /* 2 lines */
    }
    .acc-link-list a { color: #3366cc; text-decoration: none; }
    .acc-link-list a:hover { text-decoration: underline; }
    /* focused target in the article body */
    .art.body a:focus,
    .art.body h3:focus,
    .art.body h4:focus,
    .art.body h5:focus,
    .art.body h6:focus {
      outline: 2px solid #3366cc;
      outline-offset: 2px;
      border-radius: 1px;
    }
    .acc-divider { height: 1px; background: #dadde3; margin: 0 16px; }
    .acc-body { display: none; padding: 8px 0 0; }
    .acc-section.open .acc-body { display: block; }

    /* ── Footer ─────────────────────────────────────────────── */
    .article-footer { margin-top: 32px; }

    /* Last edited bar */
    .foot-lastedit {
      height: 36px; background: #eaecf0;
      border-top: 1px solid #c8ccd1; border-bottom: 1px solid #c8ccd1;
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
      cursor: pointer; overflow: hidden;
    }
    .foot-lastedit-icon { width: 20px; height: 20px; flex-shrink: 0; color: #54595d; }
    .foot-lastedit-text {
      flex: 1; font-size: 14px; color: #54595d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 19.6px;
    }
    .foot-lastedit-chev { width: 16px; height: 16px; color: #54595d; flex-shrink: 0; }

    /* Related pages */
    .foot-related { background: #eaecf0; padding: 42px 16px 0; }
    .foot-related-label {
      font-size: 13px; color: #54595d; letter-spacing: 0.9px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .related-item {
      display: flex; height: 80px; border: 1px solid #dadde3;
      overflow: hidden; cursor: pointer; background: #fff;
    }
    .related-item:not(:first-child) { border-top: none; }
    .related-item:first-child { border-radius: 2px 2px 0 0; }
    .related-item:last-child { border-radius: 0 0 2px 2px; }
    .related-thumb {
      width: 80px; height: 80px; object-fit: cover;
      flex-shrink: 0; mix-blend-mode: darken;
    }
    .related-thumb-ph {
      width: 80px; height: 80px; flex-shrink: 0; background: #eaecf0;
    }
    .related-text {
      flex: 1; display: flex; flex-direction: column;
      gap: 2px; justify-content: center; padding: 0 12px; min-width: 0;
    }
    .related-title {
      font-size: 16px; font-weight: bold; line-height: 20.8px;
      color: #202122; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .related-desc {
      font-size: 12.8px; line-height: 17.92px; color: #72777d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Generic footer */
    .foot-generic {
      background: #eaecf0; padding: 40px 16px 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .foot-wm { line-height: 0; }
    .foot-hr { height: 1px; background: #dadde3; border: none; }
    .foot-license {
      font-size: 14px; line-height: 19.6px; color: #202122;
    }
    .foot-license a { color: #3366cc; }
    .foot-links { font-size: 14px; line-height: 19.6px; color: #101418; }
    .foot-links a { color: #101418; text-decoration: none; }

    /* ── Page preview ───────────────────────────────────────── */
    #pp-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(255,255,255,0.75);
    }
    #pp-graph {
      position: fixed; inset: 0; z-index: 401;
      pointer-events: none; overflow: visible;
    }
    #graph-canvas {
      position: fixed; top: 0; left: 0; width: 0; height: 0;
      overflow: visible; z-index: 402;
      pointer-events: none;
      will-change: transform;
    }
    #pp-card {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 277px;
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.06), 0 0 16px rgba(0,0,0,0.06);
      z-index: 403;
      display: flex; flex-direction: column; align-items: flex-end;
      padding: 6px 12px 12px;
      animation: pp-fadein 0.18s ease-out;
    }
    @keyframes pp-fadein {
      from { opacity: 0; transform: translate(-50%, -47%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }
    #pp-card.pp-card-minimized {
      width: var(--pp-node-size, 100px);
      border: 1px solid #3366cc;  /* pp-node-seen: marks it as current article */
      box-shadow: none;
      padding: 0;
      overflow: hidden;
      align-items: stretch;
      cursor: pointer;
    }
    #pp-card.pp-card-minimized #pp-close-btn,
    #pp-card.pp-card-minimized #pp-readmore-row,
    #pp-card.pp-card-minimized #pp-card-quote { display: none; }
    #pp-card.pp-card-minimized #pp-card-body { gap: 0; }
    #pp-card.pp-card-minimized #pp-card-img-wrap {
      border-radius: 0;
      transition: height 280ms ease;
    }
    .pp-card-min-caption { display: none; }
    #pp-card.pp-card-minimized .pp-card-min-caption { display: block; }
    #pp-close-btn {
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; padding: 5px;
      border-radius: 2px; color: #54595d; font-size: 18px; line-height: 1;
    }
    #pp-close-btn:hover { background: rgba(0,0,0,0.04); }
    #pp-card-body { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    #pp-card-img-wrap {
      width: 100%; height: 138px;
      border-radius: 2px; overflow: hidden;
      background: #eaecf0; flex-shrink: 0;
    }
    #pp-card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #pp-card-quote { width: 100%; padding: 0 8px 4px; }
    .pp-quote-icon { display: block; margin-bottom: 3px; }
    #pp-card-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px; line-height: 22px; color: #202122;
    }
    #pp-card-text b { font-weight: bold; font-family: Georgia, 'Times New Roman', serif; }
    #pp-readmore-row {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 4px; width: 100%; padding-top: 6px;
    }
    #pp-readmore {
      color: #3366cc; font-size: 14px; line-height: 20px;
      text-decoration: none; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .pp-node {
      position: absolute; opacity: 0;
      background: #fff; border: 1px solid #c8ccd1;
      border-radius: 2px; overflow: hidden;
      will-change: transform, opacity;
      pointer-events: auto;
    }
    .pp-node-l2 { border-color: #a2a9b1; }
    .pp-node-l3 { border-color: #c8ccd1; opacity: 0; }
    .pp-node img { width: 100%; display: block; object-fit: cover; }
    .pp-caption {
      font-size: 11px; line-height: 14px; color: #202122;
      padding: 3px 4px;
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
      overflow: hidden;
    }
    @keyframes pp-bloom {
      0%   { opacity: 0; transform: scale(0.1) rotate(var(--bloom-rot, 0deg)); }
      65%  { opacity: 1; transform: scale(1.07) rotate(0deg); }
      100% { opacity: 1; transform: scale(1)    rotate(0deg); }
    }
    a.pp-active-link { background: rgba(51,102,204,0.1); }

    /* ── History chips bar ─────────────────────────────────── */
    #pp-history-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 404;
      display: flex; align-items: center; flex-direction: row;
      gap: 6px; padding: 8px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid #c8ccd1;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    #pp-history-bar::-webkit-scrollbar { display: none; }
    .pp-chip {
      flex-shrink: 0;
      display: inline-flex; align-items: center;
      background: #f8f9fa; border: 1px solid #c8ccd1;
      border-radius: 12px; padding: 4px 10px;
      font-size: 12px; line-height: 16px; color: #202122;
      cursor: pointer; white-space: nowrap;
      max-width: 140px; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .pp-chip:hover { background: #eaecf0; }
    .pp-chip-active { background: rgba(51,102,204,0.08) !important; border-color: #3366cc !important; color: #3366cc; }
    .pp-node-seen { border-color: #3366cc !important; }

    /* ── States ─────────────────────────────────────────────── */
    .state-loading {
      padding: 80px 16px; text-align: center;
      color: #54595d; font-size: 14px;
    }
    .state-error {
      padding: 40px 16px; text-align: center;
      color: #b32424; font-size: 14px; line-height: 22px;
    }
    .state-empty {
      padding: 80px 16px; text-align: center;
      color: #72777d; font-size: 14px; line-height: 22px;
    }
  </style>
</head>
<body>

<div id="control-bar">
  <a href="../index.html" id="home-link">home</a>
  <input id="lang-input" type="text" value="en" maxlength="10" autocomplete="off" spellcheck="false">
  <input id="article-input" type="text" value="" placeholder="Article title…" autocomplete="off" spellcheck="false">
  <button id="load-btn">Load</button>
  <span id="status-text"></span>
</div>

<div id="page-wrapper">
  <!-- Minerva header — always present -->
  <header class="mw-header">
    <button class="mw-menu-btn" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="4.5"  width="16" height="1.5" rx="0.75" fill="#54595d"/>
        <rect x="2" y="9.25" width="16" height="1.5" rx="0.75" fill="#54595d"/>
        <rect x="2" y="14"   width="16" height="1.5" rx="0.75" fill="#54595d"/>
      </svg>
    </button>

/* ────────────────────────────────────────────────────────────
   Utilities
──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  if (!iso) return 'recently';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d < 1)  return 'today';
  if (d < 2)  return '1 day ago';
  if (d < 30) return `${d} days ago`;
  const mo = Math.floor(d / 30.4);
  if (mo < 2)  return '1 month ago';
  if (mo < 12) return `${mo} months ago`;
  const y = Math.floor(mo / 12);
  return y < 2 ? '1 year ago' : `${y} years ago`;
}

function isDecorative(src) {
  if (!src) return true;
  if (/\.svg(\?|$)/i.test(src)) return true;
  if (/[?&](width|height)=\d{1,2}[^0-9]/i.test(src)) return true;
  if (/1x1|pixel|blank/i.test(src)) return true;
  const m = src.match(/\/(\d+)px-/);
  return m ? parseInt(m[1], 10) < 100 : false;
}

/* ────────────────────────────────────────────────────────────
   Parse full article HTML into lead + sections
──────────────────────────────────────────────────────────── */
function parseArticleHTML(rawHTML) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(rawHTML, 'text/html');
  const output = doc.querySelector('.mw-parser-output') ?? doc.body;

  // Remove noise
  output.querySelectorAll(
    '.mw-editsection, .noprint, .navbox, .navigation-not-searchable, ' +
    '.mbox-small, .ambox, .tmbox, .sistersitebox, style, .shortdescription, .toc'
  ).forEach(el => el.remove());

  // Modern Wikipedia wraps headings in <div class="mw-heading mw-heading2">
  // Older articles use bare <h2> tags — handle both.
  const isH2 = el =>
    el.tagName === 'H2' ||
    (el.tagName === 'DIV' && el.classList.contains('mw-heading2'));

  const leadNodes    = [];
  const sectionNodes = []; // [{title, nodes}]
  let   current      = null;

  for (const child of Array.from(output.children)) {
    if (isH2(child)) {
      // Extract the heading text, stripping edit-section spans
      const h2 = child.querySelector('h2') ?? child;
      h2.querySelectorAll('.mw-editsection').forEach(el => el.remove());
      const heading = h2.innerHTML.trim();
      current = { title: heading, nodes: [] };
      sectionNodes.push(current);
    } else if (current) {
      current.nodes.push(child);
    } else {
      leadNodes.push(child);
    }
  }

  // Hoist first non-empty paragraph above the infobox
  let firstPara = '';
  const firstParaIdx = leadNodes.findIndex(
    n => n.tagName === 'P' && n.textContent.trim().length > 0
  );
  if (firstParaIdx !== -1) {
    firstPara = leadNodes[firstParaIdx].outerHTML;
    leadNodes.splice(firstParaIdx, 1);
  }

  const leadHTML = leadNodes.map(n => n.outerHTML).join('');
  const sections = sectionNodes.map(s => ({
    title: s.title,
    html:  s.nodes.map(n => n.outerHTML).join(''),
  }));

  return { leadHTML, sections, firstPara };
}

/* ────────────────────────────────────────────────────────────
   Image extraction from DOM nodes
──────────────────────────────────────────────────────────── */
function collectImages(leadHTML, sections) {
  const parser = new DOMParser();
  const seen   = new Set();
  const out    = [];

  const chunks = [leadHTML, ...sections.map(s => s.html)];

  for (const html of chunks) {
    if (!html) continue;
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('.infobox img, table.infobox img, .sidebar img, .taxobox img').forEach(el => el.remove());

    doc.querySelectorAll('img').forEach(img => {
      let src = img.getAttribute('src') ?? '';
      if (!src) return;
      if (src.startsWith('//')) src = 'https:' + src;
      if (!src.startsWith('http')) return;
      if (isDecorative(src)) return;

      const big = src.replace(/\/(\d+)px-/, '/250px-');
      if (seen.has(big)) return;
      seen.add(big);
      out.push({ src: big, alt: img.getAttribute('alt') ?? '' });
    });
  }

  return out;
}

──────────────────────────────────────────────────────────── */
function renderChips(langCount, commentCount) {
  return `
    <div class="article-chips">
      ${langCount ? `<span class="infochip">${SVG.translate} ${langCount} language${langCount !== 1 ? 's' : ''}</span>` : ''}
      ${commentCount ? `<span class="infochip">${SVG.comment} ${commentCount} comment${commentCount !== 1 ? 's' : ''}</span>` : ''}
    </div>`;
}

function renderGallery(images) {
  if (!images.length) return '';
  const imgs = images.map(i =>
    `<img class="gallery-img" src="${esc(i.src)}" alt="${esc(i.alt)}" loading="lazy">`
  ).join('');
  return `<div class="gallery-scroll"><div class="gallery-track">${imgs}</div></div>`;
}

function collectSubsections(sectionHTML) {
  if (!sectionHTML) return [];
  const parser = new DOMParser();
  const doc    = parser.parseFromString(sectionHTML, 'text/html');
  const out    = [];

  // Query only the heading elements themselves — querySelectorAll finds them
  // whether they are bare or nested inside modern mw-heading wrapper divs.
  // Querying the wrappers *and* the headings would double-count every entry.
  doc.body.querySelectorAll('h3, h4, h5, h6').forEach((h, idx) => {
    h.querySelectorAll('.mw-editsection').forEach(n => n.remove());
    const text = h.textContent.trim();
    if (text) out.push({ type: 'subsection', text, idx });
  });

  return out;
}

function collectSectionLinks(sectionHTML) {
  if (!sectionHTML) return [];
  const parser = new DOMParser();
  const doc    = parser.parseFromString(sectionHTML, 'text/html');

  // Remove citations, infoboxes, navboxes so we don't pick up their links
  doc.querySelectorAll('sup, .reference, .reflist, .infobox, table.infobox, .taxobox, .sidebar, .navbox').forEach(el => el.remove());

  const seen = new Set();
  const out  = [];

  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') ?? '';
    if (!href.startsWith('/wiki/')) return;
    if (/^\/wiki\/(Help|Wikipedia|Special|File|Category|Template|Talk):/.test(href)) return;

    const text = a.textContent.trim();
    if (!text || /^\[\d+\]$/.test(text)) return;

    const key = href.split('#')[0];
    if (seen.has(key)) return;
    seen.add(key);

    const isItalic = !!a.closest('i, em') || !!a.querySelector('i, em');
    out.push({ text, href: key, isItalic });
  });

  return out;
}

function renderAccordions(sections) {
  return sections.map((sec, idx) => {
    // Subsections come first, then regular wiki links fill any remaining space
    const subsections = collectSubsections(sec.html);
    const links       = collectSectionLinks(sec.html).map(l => ({ type: 'link', ...l }));
    const items       = [...subsections, ...links];
    const itemsAttr   = items.length > 0 ? ` data-items="${esc(JSON.stringify(items))}"` : '';

    return `
    <div class="acc-section" data-i="${idx}">
      <div class="acc-header">
        <button class="acc-btn" aria-expanded="false">
          <span class="acc-chevron">${SVG.chevron}</span>
          <div class="acc-title-group">
            <span class="acc-title">${sec.title}</span>
            ${items.length > 0 ? `<div class="acc-link-list"${itemsAttr}></div>` : ''}
          </div>
        </button>
        <div class="acc-divider"></div>
      </div>
      <div class="acc-body">
        <div class="art body">${sec.html}</div>
      </div>
    </div>`;
  }).join('');
}

function measureAndTruncateLinkLists(root) {
  // Tag every sub-heading in each section body so we can scroll/focus to it later.
  // tabIndex=-1 makes headings programmatically focusable without entering tab order.
  root.querySelectorAll('.acc-section').forEach(sec => {
    const body = sec.querySelector('.acc-body .art.body');
    if (!body) return;
    body.querySelectorAll('h3, h4, h5, h6').forEach((h, idx) => {
      h.dataset.subheadIdx = idx;
      h.tabIndex = -1;
    });
  });

  root.querySelectorAll('.acc-link-list[data-items]').forEach(container => {
    let items;
    try { items = JSON.parse(container.dataset.items); } catch(_) { return; }
    if (!items.length) return;

    function buildHTML(visible, remaining) {
      const parts = visible.map(item => {
        if (item.type === 'subsection') {
          return `<a href="#" data-subhead-idx="${item.idx}">${esc(item.text)}</a>`;
        }
        const style = item.isItalic ? ' style="font-style:italic"' : '';
        return `<a href="${esc(item.href)}"${style}>${esc(item.text)}</a>`;
      });
      if (remaining > 0) parts.push(`and ${remaining} more...`);
      return parts.join(' \u2022 ');
    }

    const twoLineH = 41; // 2 × 20px line-height + 1px tolerance

    // Test if all items fit in 2 lines
    container.innerHTML = buildHTML(items, 0);
    if (container.scrollHeight <= twoLineH) {
      wireAccLinks(container);
      return;
    }

    // Binary search: find max count that fits in 2 lines
    let lo = 1, hi = items.length - 1;
    while (lo < hi) {
      const mid = Math.ceil((lo + hi) / 2);
      container.innerHTML = buildHTML(items.slice(0, mid), items.length - mid);
      if (container.scrollHeight <= twoLineH) lo = mid; else hi = mid - 1;
    }
    container.innerHTML = buildHTML(items.slice(0, lo), items.length - lo);
    wireAccLinks(container);
  });
}

function wireAccLinks(container) {
  const sec = container.closest('.acc-section');

  function openAndScroll(target, block) {
    const wasOpen = sec && sec.classList.contains('open');
    if (sec && !wasOpen) {
      sec.classList.add('open');
      sec.querySelector('.acc-btn').setAttribute('aria-expanded', 'true');
    }
    // Small delay when opening lets the body paint before we measure positions
    setTimeout(() => {
      if (block === 'center') {
        // center is safe — the element ends up in the middle of the viewport,
        // well clear of the sticky header at the top
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        // 'start' would place the element flush at the top of the viewport,
        // directly behind the sticky control bar + sticky section header.
        // Measure both sticky layers and offset manually.
        const controlBar = document.getElementById('control-bar');
        const accHeader  = sec && sec.querySelector('.acc-header');
        const stickyH    = (controlBar ? controlBar.offsetHeight : 0)
                         + (accHeader  ? accHeader.offsetHeight  : 0);
        const top = target.getBoundingClientRect().top + window.scrollY - stickyH - 12;
        window.scrollTo({ top, behavior: 'smooth' });
      }
      setTimeout(() => target.focus({ preventScroll: true }), 350);
    }, wasOpen ? 0 : 50);
  }

  // Subsection heading links — scroll to the tagged <h3>/<h4>/etc. in the body
  container.querySelectorAll('a[data-subhead-idx]').forEach(a => {
    const idx = a.dataset.subheadIdx;
    a.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const body   = sec && sec.querySelector('.acc-body');
      const target = body && body.querySelector(`[data-subhead-idx="${idx}"]`);
      if (target) openAndScroll(target, 'start');
    });
  });

  // Wiki-link anchors — scroll to the matching link in the body
  container.querySelectorAll('a[href^="/wiki/"]').forEach(a => {
    const wikiHref = a.getAttribute('href');
    a.href = '#';
    a.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const body   = sec && sec.querySelector('.acc-body');
      const target = body && body.querySelector(`[data-wiki-href="${CSS.escape(wikiHref)}"]`);
      if (target) openAndScroll(target, 'center');
    });
  });
}

function collapseInfoboxes(root) {
  root.querySelectorAll('.art .infobox').forEach(table => {
    if (table.offsetHeight <= 750) return;

    // Wrap the table in a collapse container
    const wrap = document.createElement('div');
    wrap.className = 'infobox-wrap collapsed';
    table.parentNode.insertBefore(wrap, table);
    wrap.appendChild(table);

    // Gradient fade overlay — sits above the Read more button
    const fade = document.createElement('div');
    fade.className = 'infobox-fade';
    wrap.appendChild(fade);

    // Read more button — absolutely positioned at the bottom of the 500px window
    const btn = document.createElement('button');
    btn.className = 'infobox-read-more';
    btn.textContent = 'Read more';
    wrap.appendChild(btn);

    btn.addEventListener('click', () => {
      wrap.classList.remove('collapsed');
      fade.remove();
      btn.remove();
    });
  });
}

function renderRelated(pages) {
  if (!pages?.length) return '';
  const items = pages.slice(0, 3).map(p => {
    const thumb = p.thumbnail?.source
      ? `<img class="related-thumb" src="${esc(p.thumbnail.source)}" alt="" loading="lazy">`
      : `<div class="related-thumb-ph"></div>`;
    return `
      <div class="related-item">
        ${thumb}
        <div class="related-text">
          <div class="related-title">${p.displaytitle ?? esc(p.title ?? '')}</div>
          ${p.description ? `<div class="related-desc">${esc(p.description)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="foot-related">
      <div class="foot-related-label">Related pages</div>
      <div class="related-list">${items}</div>
    </div>`;
}

function renderLastEdited(timestamp, user) {
  if (!timestamp) return '';
  const name = (user ?? '').length > 14 ? user.slice(0, 14) + '…' : (user ?? '');
  const by   = name ? ` by ${esc(name)}` : '';
  return `
    <div class="foot-lastedit">
      <span class="foot-lastedit-icon">${SVG.history}</span>
      <span class="foot-lastedit-text">
        <strong>Last edited ${timeAgo(timestamp)}</strong>${by}
      </span>
      <span class="foot-lastedit-chev">${SVG.chevron}</span>
    </div>`;
}

  root.querySelectorAll('a[href^="/wiki/"]').forEach(a => {

  root.querySelectorAll('a').forEach(a => {

      a.href = '#';

  root.querySelectorAll('.article-title, .art').forEach(el => { el.dir = dir ?? 'ltr'; });

  const bar = document.getElementById('control-bar');

  /* Populate and truncate section link lists */
  measureAndTruncateLinkLists(root);

  /* Collapse tall infoboxes */
  collapseInfoboxes(root);

async function fetchPageSummary(lang, title) {
  const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('summary fetch failed');
  return res.json();
}

function extractFirstSentence(extractHtml) {
  const div = document.createElement('div');
  div.innerHTML = extractHtml;
  div.querySelectorAll('a').forEach(a => a.replaceWith(document.createTextNode(a.textContent)));
  const p = div.querySelector('p');
  const html = p ? p.innerHTML : div.innerHTML;
  const m = html.search(/\.\s/);
  return m === -1 ? html : html.slice(0, m + 1);
}

function collectIntroLinks(firstPara, leadHTML) {
  const parser = new DOMParser();
  const seen = new Set();
  const links = [];
  [firstPara, leadHTML].forEach((html, chunkIdx) => {
    if (!html) return;
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('sup,.reference,.reflist,.infobox,table.infobox,.taxobox,.sidebar,.navbox').forEach(el => el.remove());
    doc.querySelectorAll('p').forEach((p, pIdx) => {
      p.querySelectorAll('a[href^="/wiki/"]').forEach(a => {
        const href = a.getAttribute('href');
        if (/\/wiki\/(Help|Wikipedia|Special|File|Category|Template|Talk):/.test(href)) return;
        const text = a.textContent.trim();
        if (!text || /^\[\d+\]$/.test(text)) return;
        const t = decodeURIComponent(href.split('#')[0].slice(6));
        if (seen.has(t)) return;
        seen.add(t);
        links.push({ title: t, text, paraIdx: chunkIdx * 100 + pIdx });
      });
    });
  });
  return links;
}

function scoreNode(summary) {
  const desc = (summary.description || '').toLowerCase();
  if (/\b(born|actor|actress|singer|musician|composer|politician|scientist|writer|poet|director|athlete|inventor|engineer|philosopher)\b/.test(desc)) return 3;
  if (/\b(city|town|village|country|nation|state|province|region|district|island|mountain|river|lake|municipality)\b/.test(desc)) return 2;
  if (summary.thumbnail) return 1;
  return 0;
}

function addToHistory(title) {
  const display = title.replace(/_/g, ' ');
  if (ppHistory.some(h => h.title === title)) return;
  ppHistory.push({ title, display });
  renderHistoryBar(title);
}

function renderHistoryBar(activeTitle) {
  let bar = document.getElementById('pp-history-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'pp-history-bar';
    document.body.appendChild(bar);
  }
  bar.innerHTML = '';
  ppHistory.forEach(h => {
    const chip = document.createElement('div');
    chip.className = 'pp-chip' + (h.title === activeTitle ? ' pp-chip-active' : '');
    chip.textContent = h.display;
    chip.title = h.display;
    chip.addEventListener('click', () => showPagePreview(h.title, chip, true));
    bar.appendChild(chip);
  });
  requestAnimationFrame(() => { bar.scrollLeft = bar.scrollWidth; });
}

function closePagePreview(anchorEl) {
  document.getElementById('pp-overlay')?.remove();
  document.getElementById('pp-graph')?.remove();
  document.getElementById('pp-card')?.remove();
  document.getElementById('graph-canvas')?.remove();
  _graphCanvas   = null;
  _graphEdges    = [];
  _graphNodeMap  = new Map();
  _pendingNodes  = [];
  _lineAnimDone   = false;
  _spawnedTitles  = new Set();
  _graphPanX      = 0;
  _graphPanY      = 0;
  _panDragging   = false;
  _panDidMove    = false;
  document.removeEventListener('mousemove', _onPanMove);
  document.removeEventListener('mouseup',   _onPanEnd);
  document.removeEventListener('touchmove', _onPanMove);
  document.removeEventListener('touchend',  _onPanEnd);
  if (anchorEl) anchorEl.classList.remove('pp-active-link');
  document.querySelectorAll('a.pp-active-link').forEach(a => a.classList.remove('pp-active-link'));
}

function showPagePreview(title, anchorEl, fromHistory = false) {
  const fromThumbnail = anchorEl?.classList.contains('pp-node');

  // History: when navigating via thumbnail, record both the departing preview and the destination
  if (fromThumbnail) {
    if (ppHistory.length === 0 && ppCurrentTitle) addToHistory(ppCurrentTitle);
    addToHistory(title);
  }

  closePagePreview();
  ppCurrentTitle = title;

  // Update active chip highlight
  if (ppHistory.length > 0) renderHistoryBar(title);

  const lang = (document.getElementById('lang-input').value.trim() || 'en').toLowerCase();
  const wikiUrl = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title)}`;
  anchorEl.classList.add('pp-active-link');

  const overlay = document.createElement('div');
  overlay.id = 'pp-overlay';
  overlay.setAttribute('aria-hidden', 'true');

  const graphSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  graphSvg.id = 'pp-graph';

  const card = document.createElement('div');
  card.id = 'pp-card';
  card.setAttribute('role', 'dialog');
  card.setAttribute('aria-label', 'Article preview');
  card.innerHTML = `
    <button id="pp-close-btn" aria-label="Close preview">&#x2715;</button>
    <div id="pp-card-body">
      <div id="pp-card-quote">
        <svg class="pp-quote-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.3 5.40001L7.2 3.60001H5.4C3.411 3.60001 1.8 6.11101 1.8 8.10001V14.4H8.1V8.10001H4.5C4.5 5.40001 6.3 5.40001 6.3 5.40001ZM12.6 8.10001C12.6 5.40001 14.4 5.40001 14.4 5.40001L15.3 3.60001H13.5C11.511 3.60001 9.9 6.11101 9.9 8.10001V14.4H16.2V8.10001H12.6Z" fill="#54595D"/></svg>
        <div id="pp-card-text">Loading\u2026</div>
      </div>
    </div>
    <div class="pp-caption pp-card-min-caption">${esc(title.replace(/_/g, ' '))}</div>
    <div id="pp-readmore-row">
      <a id="pp-readmore" href="${wikiUrl}" target="_blank" rel="noopener">
        Read more
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path d="M8 1h5v5" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 1 L6 8" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6 3 H2 a1 1 0 0 0-1 1 V12 a1 1 0 0 0 1 1 H10 a1 1 0 0 0 1-1 V8" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>`;

  // Graph canvas (pan target — contains all .pp-node elements)
  _graphCanvas = document.createElement('div');
  _graphCanvas.id = 'graph-canvas';
  _graphLang = lang;

  document.body.appendChild(overlay);
  document.body.appendChild(graphSvg);
  document.body.appendChild(_graphCanvas);
  document.body.appendChild(card);
  card.querySelector('#pp-close-btn').focus();

  const close = () => closePagePreview(anchorEl);
  // Only close on click if the user didn't drag
  overlay.addEventListener('mousedown', _onPanStart);
  overlay.addEventListener('touchstart', _onPanStart, { passive: false });
  overlay.addEventListener('click', () => { if (!_panDidMove) close(); });
  document.addEventListener('mousemove', _onPanMove);
  document.addEventListener('mouseup',   _onPanEnd);
  document.addEventListener('touchmove', _onPanMove, { passive: false });
  document.addEventListener('touchend',  _onPanEnd);
  card.querySelector('#pp-close-btn').addEventListener('click', close);

  // Populate card content
  fetchPageSummary(lang, title).then(data => {
    if (data.thumbnail?.source) {
      const imgWrap = document.createElement('div');
      imgWrap.id = 'pp-card-img-wrap';
      const img = document.createElement('img');
      img.id = 'pp-card-img';
      img.src = data.thumbnail.source;
      img.alt = '';
      imgWrap.appendChild(img);
      card.querySelector('#pp-card-body').insertBefore(imgWrap, card.querySelector('#pp-card-quote'));
    }
    const textEl = card.querySelector('#pp-card-text');
    if (data.extract_html) {
      textEl.innerHTML = extractFirstSentence(data.extract_html);
    } else if (data.extract) {
      const safe = data.extract.replace(/&/g,'&amp;').replace(/</g,'&lt;');
      const t = title.replace(/_/g,' ').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      textEl.innerHTML = (safe.replace(/\.\s[\s\S]*/,'.') || safe).replace(new RegExp(t), '<b>$&</b>');
    }
  }).catch(() => {
    card.querySelector('#pp-card-text').textContent = 'Preview unavailable.';
  });

  // Build knowledge graph from the previewed article's own first paragraph
  fetchArticleIntroLinks(lang, title).then(introLinks => {
    return Promise.allSettled(
      introLinks.slice(0, 30).map(lnk =>
        fetchPageSummary(lang, lnk.title)
          .then(s => ({ ...lnk, summary: s }))
          .catch(() => null)
      )
    );
  }).then(async results => {
    const nodes = results
      .filter(r => r.status === 'fulfilled' && r.value?.summary?.thumbnail)
      .map(r => r.value)
      .sort((a, b) => scoreNode(b.summary) - scoreNode(a.summary))
      .slice(0, 16);
    if (!nodes.length) return;
    const connections = await fetchNodeConnections(lang, nodes.map(n => n.summary.title || n.title));
    requestAnimationFrame(() => {
      if (!document.contains(graphSvg) || !document.contains(card)) return;
      renderGraphNodes(graphSvg, nodes, card.getBoundingClientRect(), connections);
    });
  }).catch(() => {});
}

async function fetchNodeConnections(lang, titles) {
  if (titles.length < 2) return new Set();
  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const enc = titles.slice(0, 50).map(encodeURIComponent).join('|');
  const res = await fetch(`${api}?action=query&prop=links&titles=${enc}&pllimit=500&format=json&origin=*`).catch(() => null);
  if (!res?.ok) return new Set();
  const data = await res.json().catch(() => null);
  if (!data?.query?.pages) return new Set();
  const titleSet = new Set(titles.map(t => t.toLowerCase().replace(/_/g, ' ')));
  const connections = new Set();
  for (const page of Object.values(data.query.pages)) {
    if (!page.links) continue;
    const from = page.title.toLowerCase();
    for (const lnk of page.links) {
      const to = lnk.title.toLowerCase();
      if (titleSet.has(to) && from !== to)
        connections.add([from, to].sort().join('|||'));
    }
  }
  return connections;
}

async function fetchArticleIntroLinks(lang, title) {
  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const res = await fetch(`${api}?action=parse&page=${encodeURIComponent(title)}&prop=text&section=0&format=json&origin=*`);
  if (!res.ok) return [];
  const data = await res.json().catch(() => null);
  const rawHTML = data?.parse?.text?.['*'];
  if (!rawHTML) return [];

  const parser = new DOMParser();
  const doc = parser.parseFromString(rawHTML, 'text/html');
  const output = doc.querySelector('.mw-parser-output') || doc.body;
  output.querySelectorAll('sup,.reference,.reflist,.infobox,table.infobox,.taxobox,.sidebar,.navbox,.mw-editsection').forEach(el => el.remove());

  const seen = new Set();
  const links = [];
  Array.from(output.querySelectorAll('p')).filter(p => p.textContent.trim()).forEach((p, pIdx) => {
    p.querySelectorAll('a[href^="/wiki/"]').forEach(a => {
      const href = a.getAttribute('href');
      if (/\/wiki\/(Help|Wikipedia|Special|File|Category|Template|Talk):/.test(href)) return;
      const text = a.textContent.trim();
      if (!text || /^\[\d+\]$/.test(text)) return;
      const t = decodeURIComponent(href.split('#')[0].slice(6));
      if (seen.has(t)) return;
      seen.add(t);
      links.push({ title: t, text, paraIdx: pIdx });
    });
  });
  return links;
}

function renderGraphNodes(svg, nodes, cardRect, connections) {
  if (!_graphCanvas) return;
  const MIN_SIZE  = 70;
  const CAPTION_H = 30;
  const GAP       = 8;
  const vpW = window.innerWidth;
  const vpH = window.innerHeight;

  const wrapper = document.getElementById('page-wrapper');
  const wRect = wrapper ? wrapper.getBoundingClientRect() : { left: 0, right: vpW };
  const xMin = Math.max(GAP, wRect.left + GAP);
  const xMax = Math.min(vpW - GAP, wRect.right - GAP);
  const bandW = xMax - xMin;

  const controlBarH = document.getElementById('control-bar')?.getBoundingClientRect().bottom ?? 0;
  const historyBarH = document.getElementById('pp-history-bar')?.getBoundingClientRect().height ?? 0;
  const topZone = { y1: Math.max(GAP, controlBarH + GAP), y2: cardRect.top    - GAP };
  const botZone = { y1: cardRect.bottom + GAP,            y2: vpH - historyBarH - GAP };
  const topH    = Math.max(0, topZone.y2 - topZone.y1);
  const botH    = Math.max(0, botZone.y2 - botZone.y1);

  const maxPerBand = Math.max(1, Math.floor(bandW / (MIN_SIZE + GAP)));
  const topCount   = Math.min(Math.ceil(nodes.length / 2), maxPerBand);
  const botCount   = Math.min(Math.floor(nodes.length / 2), maxPerBand);
  const shown      = nodes.slice(0, topCount + botCount);

  const topSlotW = topCount > 0 ? bandW / topCount : Infinity;
  const botSlotW = botCount > 0 ? bandW / botCount : Infinity;
  const sizeByW  = Math.min(topSlotW, botSlotW) - GAP;
  const sizeByH  = Math.min(
    topCount > 0 && topH > 0 ? topH - CAPTION_H - GAP : Infinity,
    botCount > 0 && botH > 0 ? botH - CAPTION_H - GAP : Infinity
  );
  const size  = Math.max(MIN_SIZE, Math.min(160, Math.floor(sizeByW), Math.floor(sizeByH)));
  const cardH = size + CAPTION_H;

  const Y_FRACS = [0.10, 0.55, 0.20, 0.70, 0.35, 0.80, 0.05, 0.60];
  const positions = [];

  const placeInBand = (n, zone, zoneH, slotW, offset) => {
    if (n === 0 || zoneH <= 0) return;
    const yRange = Math.max(0, zoneH - cardH);
    for (let i = 0; i < n; i++) {
      const cx = xMin + (i + 0.5) * slotW;
      positions.push({
        x: Math.round(cx - size / 2),
        y: Math.round(zone.y1 + Y_FRACS[i % 8] * yRange),
        node: shown[offset + i]
      });
    }
  };

  placeInBand(topCount, topZone, topH, topSlotW, 0);
  placeInBand(botCount, botZone, botH, botSlotW, topCount);

  // Register all L1 nodes in the graph map (world coords = screen coords when pan=0)
  const pcx = cardRect.left + cardRect.width  / 2;
  const pcy = cardRect.top  + cardRect.height / 2;

  positions.forEach(({ x, y, node }) => {
    const title = node.summary.title || node.title || '';
    const wx = x, wy = y;
    _graphNodeMap.set(title, { wx, wy, size, cardH, cx: wx + size / 2, cy: wy + cardH / 2, layer: 1, title, el: null });
    _graphEdges.push({ type: 'hub', title });
  });

  // Register L1 cross-connections
  const drawn = new Set();
  let lineCount = 0;
  for (let i = 0; i < positions.length - 1 && lineCount < 24; i++) {
    for (let j = i + 1; j < positions.length && lineCount < 24; j++) {
      const tI = (positions[i].node.summary.title || positions[i].node.title || '').toLowerCase();
      const tJ = (positions[j].node.summary.title || positions[j].node.title || '').toLowerCase();
      if (!connections?.has([tI, tJ].sort().join('|||'))) continue;
      const key = `${i}-${j}`;
      if (drawn.has(key)) continue;
      drawn.add(key); lineCount++;
      const titleI = positions[i].node.summary.title || positions[i].node.title || '';
      const titleJ = positions[j].node.summary.title || positions[j].node.title || '';
      _graphEdges.push({ type: 'cross', titleA: titleI, titleB: titleJ });
    }
  }

  // Animated initial draw of SVG lines (screen coords, pan=0)
  svg.setAttribute('viewBox', `0 0 ${vpW} ${vpH}`);
  const lineEls = [];

  const makeAnimLine = (x1, y1, x2, y2) => {
    const len = Math.hypot(x2 - x1, y2 - y1);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#3366cc');
    line.setAttribute('stroke-width', '1');
    line.style.opacity = '0';
    line.style.strokeDasharray = len;
    line.style.strokeDashoffset = len;
    svg.appendChild(line);
    lineEls.push(line);
  };

  positions.forEach(({ x, y }) => makeAnimLine(pcx, pcy, x + size / 2, y + cardH / 2));
  for (const e of _graphEdges) {
    if (e.type !== 'cross') continue;
    const a = _graphNodeMap.get(e.titleA), b = _graphNodeMap.get(e.titleB);
    if (!a || !b) continue;
    makeAnimLine(a.cx, a.cy, b.cx, b.cy);
  }

  // Nodes — appended to canvas (position:absolute, world coords = screen coords initially)
  const BLOOM_DUR  = 420;
  const BLOOM_STAG = 55;
  const ROTS = [-5, 4, -3, 6, -7, 3, -4, 5];

  positions.forEach(({ x, y, node }, idx) => {
    const el = document.createElement('div');
    const nodeTitle = node.summary.title || node.title || '';
    const seen = ppHistory.some(h => h.title === nodeTitle || h.title === nodeTitle.replace(/ /g, '_') || h.title.replace(/_/g, ' ') === nodeTitle);
    el.className = 'pp-node' + (seen ? ' pp-node-seen' : '');
    el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;`;
    el.style.transformOrigin = `${size / 2}px ${cardH / 2}px`;
    el.style.setProperty('--bloom-rot', `${ROTS[idx % 8]}deg`);

    const img = document.createElement('img');
    img.alt = '';
    img.style.height = `${size}px`;

    const caption = document.createElement('div');
    caption.className = 'pp-caption';
    caption.textContent = (node.summary.title || node.text || '').replace(/_/g, ' ');

    el.appendChild(img);
    el.appendChild(caption);
    _graphCanvas.appendChild(el);

    // Store DOM reference for physics simulation
    const mapEntry = _graphNodeMap.get(nodeTitle);
    if (mapEntry) mapEntry.el = el;

    const delay = idx * BLOOM_STAG;
    const bloom = () => {
      el.style.animation = `pp-bloom ${BLOOM_DUR}ms cubic-bezier(0.34,1.2,0.64,1) ${delay}ms forwards`;
    };
    img.addEventListener('load', bloom);
    img.addEventListener('error', () => { el.remove(); _graphNodeMap.delete(nodeTitle); });
    img.src = node.summary.thumbnail.source;
    if (img.complete && img.naturalWidth) bloom();

    el.style.cursor = 'pointer';
    el.addEventListener('click', () => showPagePreview(node.summary.title || node.title || '', el));
  });

  // Animate lines in, then run physics layout, then fetch extended layers
  if (positions.length > 0) {
    const lineStart = (positions.length - 1) * BLOOM_STAG + Math.round(BLOOM_DUR * 0.55);
    lineEls.forEach((line, li) => {
      setTimeout(() => {
        if (!document.contains(line)) return;
        line.style.transition = 'stroke-dashoffset 380ms ease-out, opacity 80ms ease-out';
        line.style.strokeDashoffset = '0';
        line.style.opacity = '1';
      }, lineStart + li * 30);
    });

    const animDoneAt = lineStart + lineEls.length * 30 + 400;
    const capturedCardRect = { top: cardRect.top, bottom: cardRect.bottom, left: cardRect.left, right: cardRect.right, width: cardRect.width, height: cardRect.height };
    setTimeout(() => {
      _lineAnimDone = true;
      // Run physics to fill the viewport, then kick off L2/L3 with settled positions
      _runPhysicsLayout(capturedCardRect, () => {
        const l1Infos = [..._graphNodeMap.values()]
          .filter(n => n.layer === 1)
          .map(n => ({ title: n.title, cx: n.cx, cy: n.cy }));
        _fetchLayerNodes(_graphLang, l1Infos, 2).then(l2Nodes => {
          if (!l2Nodes.length) return;
          const l2Infos = l2Nodes.map(n => ({ title: n.title, cx: n.wx + n.size / 2, cy: n.wy + n.cardH / 2 }));
          _fetchLayerNodes(_graphLang, l2Infos, 3);
        });
      });
    }, animDoneAt);
  }
}

/* ────────────────────────────────────────────────────────────
   Pan handlers
──────────────────────────────────────────────────────────── */
function _onPanStart(e) {
  if (e.target.closest('#pp-card')) return;
  _panDragging = true;
  _panDidMove  = false;
  const t = e.touches?.[0] ?? e;
  _panSX = t.clientX; _panSY = t.clientY;
  _panPX0 = _graphPanX; _panPY0 = _graphPanY;
}

function _onPanMove(e) {
  if (!_panDragging) return;
  const t = e.touches?.[0] ?? e;
  const dx = t.clientX - _panSX;
  const dy = t.clientY - _panSY;
  if (!_panDidMove && Math.hypot(dx, dy) > 5) {
    _panDidMove = true;
    _minimizeCard();
  }
  if (!_panDidMove) return;
  _graphPanX = _panPX0 + dx;
  _graphPanY = _panPY0 + dy;
  _applyPan();
  if (e.cancelable) e.preventDefault();
}

function _onPanEnd() { _panDragging = false; }

function _applyPan() {
  if (_graphCanvas) _graphCanvas.style.transform = `translate(${_graphPanX}px,${_graphPanY}px)`;
  _updateCardTransform();
  if (!_lineAnimDone) { _lineAnimDone = true; }
  _redrawLines();
  _checkViewportNodes();
}

function _updateCardTransform() {
  const card = document.getElementById('pp-card');
  if (!card) return;
  card.style.transform = `translate(calc(-50% + ${_graphPanX}px), calc(-50% + ${_graphPanY}px))`;
}

function _minimizeCard() {
  const card = document.getElementById('pp-card');
  if (!card || card.classList.contains('pp-card-minimized')) return;
  const l1Node = [..._graphNodeMap.values()].find(n => n.layer === 1);
  const nodeSize = l1Node?.size ?? 100;
  const imgWrap = card.querySelector('#pp-card-img-wrap');
  // Set the target width variable, enable transition, then apply class to trigger it.
  card.style.setProperty('--pp-node-size', nodeSize + 'px');
  card.style.transition = 'width 280ms ease, border-color 200ms ease, box-shadow 200ms ease';
  void card.offsetHeight; // flush so transition is active before class triggers width change
  card.classList.add('pp-card-minimized');
  if (imgWrap) imgWrap.style.height = nodeSize + 'px';
  card.addEventListener('transitionend', () => {
    card.style.transition = '';
    _redrawLines();
  }, { once: true });
  // Clicking the minimized card expands it back
  card.addEventListener('click', () => {
    card.style.transition = 'width 280ms ease, border-color 200ms ease, box-shadow 200ms ease';
    card.classList.remove('pp-card-minimized');
    if (imgWrap) imgWrap.style.height = '';
    card.addEventListener('transitionend', () => { card.style.transition = ''; _redrawLines(); }, { once: true });
  }, { once: true });
}

function _redrawLines() {
  const svg = document.getElementById('pp-graph');
  if (!svg) return;
  const vpW = window.innerWidth, vpH = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${vpW} ${vpH}`);
  svg.innerHTML = '';
  // Card is position:fixed left:50% top:50%, panned via translate offset.
  // Its visual center is always vpW/2 + panX, vpH/2 + panY.
  const pcx = vpW / 2 + _graphPanX;
  const pcy = vpH / 2 + _graphPanY;

  for (const e of _graphEdges) {
    if (e.type === 'hub') {
      const n = _graphNodeMap.get(e.title);
      if (!n) continue;
      _svgLine(svg, pcx, pcy, n.wx + _graphPanX + n.size / 2, n.wy + _graphPanY + n.cardH / 2);
    } else {
      const a = _graphNodeMap.get(e.titleA), b = _graphNodeMap.get(e.titleB);
      if (!a || !b) continue;
      _svgLine(svg,
        a.wx + _graphPanX + a.size / 2, a.wy + _graphPanY + a.cardH / 2,
        b.wx + _graphPanX + b.size / 2, b.wy + _graphPanY + b.cardH / 2);
    }
  }
}

function _svgLine(svg, x1, y1, x2, y2) {
  const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  l.setAttribute('stroke', '#3366cc');
  l.setAttribute('stroke-width', '1');
  l.style.opacity = '0.7';
  svg.appendChild(l);
}

/* ────────────────────────────────────────────────────────────
   Physics layout — spreads L1 nodes to fill the viewport
──────────────────────────────────────────────────────────── */
function _runPhysicsLayout(cardRect, onSettle) {
  if (!_graphCanvas) { onSettle?.(); return; }

  const vpW = window.innerWidth, vpH = window.innerHeight;
  const GAP = 10;
  const CTRL_H  = document.getElementById('control-bar')?.getBoundingClientRect().bottom ?? 0;
  const HIST_H  = document.getElementById('pp-history-bar')?.getBoundingClientRect().height ?? 0;

  // Card exclusion rectangle (with breathing room)
  const cPad = 14;
  const cL = cardRect.left - cPad, cR = cardRect.right  + cPad;
  const cT = cardRect.top  - cPad, cB = cardRect.bottom + cPad;
  const cCX = (cL + cR) / 2,      cCY = (cT + cB) / 2;

  // Collect L1 particles from the node map
  const particles = [..._graphNodeMap.values()]
    .filter(n => n.layer === 1 && n.el)
    .map(n => ({
      x: n.cx, y: n.cy, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
      hw: n.size / 2, hh: n.cardH / 2, title: n.title, el: n.el
    }));

  if (!particles.length) { onSettle?.(); return; }

  // Add smooth CSS transition so position updates animate between ticks
  particles.forEach(p => { p.el.style.transition = 'left 70ms linear, top 70ms linear'; });

  let tick = 0;

  const step = () => {
    if (!_graphCanvas || tick++ > 120) {
      // Settle: remove transition, update map with final positions, done
      particles.forEach(p => {
        p.el.style.transition = '';
        const entry = _graphNodeMap.get(p.title);
        if (entry) { entry.wx = p.x - p.hw; entry.wy = p.y - p.hh; entry.cx = p.x; entry.cy = p.y; }
      });
      if (_lineAnimDone) _redrawLines();
      onSettle?.();
      return;
    }

    let maxMove = 0;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      let fx = 0, fy = 0;

      // ── Node-node repulsion ──────────────────────────────
      for (let j = 0; j < particles.length; j++) {
        if (i === j) continue;
        const q = particles[j];
        const dx = p.x - q.x, dy = p.y - q.y;
        const dist = Math.hypot(dx, dy) || 0.1;
        const minD = p.hw + q.hw + GAP * 1.5;
        if (dist < minD) {
          const f = ((minD - dist) / minD) * 5;
          fx += (dx / dist) * f;
          fy += (dy / dist) * f;
        }
      }

      // ── Card exclusion (push out of card rectangle) ──────
      const ox = Math.max(0, p.hw + (cR - cL) / 2 - Math.abs(p.x - cCX));
      const oy = Math.max(0, p.hh + (cB - cT) / 2 - Math.abs(p.y - cCY));
      if (ox > 0 && oy > 0) {
        const pen = Math.min(ox, oy) + 1;
        const cdx = p.x - cCX, cdy = p.y - cCY;
        const cd  = Math.hypot(cdx, cdy) || 0.1;
        fx += (cdx / cd) * pen * 0.7;
        fy += (cdy / cd) * pen * 0.7;
      }

      // ── Soft viewport walls ──────────────────────────────
      const xMin = p.hw + GAP, xMax = vpW - p.hw - GAP;
      const yMin = CTRL_H + p.hh + GAP, yMax = vpH - HIST_H - p.hh - GAP;
      if (p.x < xMin) fx += (xMin - p.x) * 0.6;
      if (p.x > xMax) fx -= (p.x - xMax) * 0.6;
      if (p.y < yMin) fy += (yMin - p.y) * 0.6;
      if (p.y > yMax) fy -= (p.y - yMax) * 0.6;

      // ── Weak centering gravity (pulls nodes toward viewport
      //    centre so they don't bunch at edges) ─────────────
      const gravX = vpW / 2, gravY = vpH / 2;
      fx += (gravX - p.x) * 0.004;
      fy += (gravY - p.y) * 0.004;

      p.vx = (p.vx + fx) * 0.72;
      p.vy = (p.vy + fy) * 0.72;
      maxMove = Math.max(maxMove, Math.abs(p.vx), Math.abs(p.vy));
    }

    // Integrate and update DOM
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.el.style.left = (p.x - p.hw) + 'px';
      p.el.style.top  = (p.y - p.hh) + 'px';
      // Keep node map in sync so lines follow
      const entry = _graphNodeMap.get(p.title);
      if (entry) { entry.wx = p.x - p.hw; entry.wy = p.y - p.hh; entry.cx = p.x; entry.cy = p.y; }
    }

    if (_lineAnimDone) _redrawLines();

    if (maxMove < 0.3) {
      // Early settle
      particles.forEach(p => {
        p.el.style.transition = '';
        const entry = _graphNodeMap.get(p.title);
        if (entry) { entry.wx = p.x - p.hw; entry.wy = p.y - p.hh; entry.cx = p.x; entry.cy = p.y; }
      });
      if (_lineAnimDone) _redrawLines();
      onSettle?.();
      return;
    }

    requestAnimationFrame(step);
  };

  requestAnimationFrame(step);
}

/* ────────────────────────────────────────────────────────────
   Layer 2 / 3 extended network
──────────────────────────────────────────────────────────── */
async function _fetchLayerNodes(lang, parentInfos, layer) {
  if (!_graphCanvas) return [];
  const NODE_SIZE = layer === 2 ? 80 : 65;
  const CAPTION_H = 30;
  const NODE_CARDH = NODE_SIZE + CAPTION_H;
  const EXTEND_DIST = 300;

  const vpW = window.innerWidth, vpH = window.innerHeight;
  // Card world center: it's always at screen center (fixed), so in world space with pan:
  // cardWorldCX = vpW/2 − _graphPanX at time of fetch, but we want the initial layout center.
  // Use viewport center as origin — matches where card renders at pan=0.
  const cardCX = vpW / 2;
  const cardCY = vpH / 2;

  const results = await Promise.allSettled(
    parentInfos.map(async parent => {
      try {
        const introLinks = await fetchArticleIntroLinks(lang, parent.title);
        if (!introLinks.length) return null;
        const firstLink = introLinks.find(l => !_graphNodeMap.has(l.title));
        if (!firstLink) return null;
        const summary = await fetchPageSummary(lang, firstLink.title);
        if (!summary?.thumbnail) return null;

        // Direction: card center → parent center, then extend beyond parent
        const dx = parent.cx - cardCX;
        const dy = parent.cy - cardCY;
        const dist = Math.hypot(dx, dy) || 1;
        const nx = dx / dist, ny = dy / dist;
        const wx = parent.cx + nx * EXTEND_DIST - NODE_SIZE / 2;
        const wy = parent.cy + ny * EXTEND_DIST - NODE_CARDH / 2;

        return { title: summary.title || firstLink.title, summary, wx, wy,
                 size: NODE_SIZE, cardH: NODE_CARDH, layer, parentTitle: parent.title };
      } catch { return null; }
    })
  );

  const seenTitles = new Set();
  const newNodes = results
    .filter(r => r.status === 'fulfilled' && r.value)
    .map(r => r.value)
    .filter(n => {
      if (_graphNodeMap.has(n.title) || seenTitles.has(n.title)) return false;
      seenTitles.add(n.title);
      return true;
    });

  for (const node of newNodes) {
    _graphNodeMap.set(node.title, {
      wx: node.wx, wy: node.wy, size: node.size, cardH: node.cardH,
      cx: node.wx + node.size / 2, cy: node.wy + node.cardH / 2, layer
    });
    _graphEdges.push({ type: 'cross', titleA: node.parentTitle, titleB: node.title });
  }

  _pendingNodes.push(...newNodes);
  _checkViewportNodes();
  if (_lineAnimDone) _redrawLines();
  return newNodes;
}

function _checkViewportNodes() {
  if (!_pendingNodes.length || !_graphCanvas) return;
  const vpW = window.innerWidth, vpH = window.innerHeight;
  const BUFFER = 200;
  const still = [];
  for (const n of _pendingNodes) {
    const sx = n.wx + _graphPanX, sy = n.wy + _graphPanY;
    if (sx + n.size > -BUFFER && sx < vpW + BUFFER && sy + n.cardH > -BUFFER && sy < vpH + BUFFER) {
      _renderExtNode(n);
    } else {
      still.push(n);
    }
  }
  _pendingNodes = still;
}

function _renderExtNode(node) {
  if (!_graphCanvas || !document.contains(_graphCanvas)) return;
  const { title, summary, wx, wy, size, cardH, layer } = node;
  const el = document.createElement('div');
  const seen = ppHistory.some(h => {
    const ht = h.title.toLowerCase().replace(/_/g, ' ');
    return ht === title.toLowerCase().replace(/_/g, ' ');
  });
  el.className = 'pp-node pp-node-l' + layer + (seen ? ' pp-node-seen' : '');
  el.style.cssText = `left:${wx}px;top:${wy}px;width:${size}px;`;
  el.style.transformOrigin = `${size / 2}px ${cardH / 2}px`;
  el.style.setProperty('--bloom-rot', `${(Math.random() * 14 - 7).toFixed(1)}deg`);

  const img = document.createElement('img');
  img.alt = '';
  img.style.height = `${size}px`;
  const caption = document.createElement('div');
  caption.className = 'pp-caption';
  caption.textContent = (summary.title || title).replace(/_/g, ' ');
  el.appendChild(img);
  el.appendChild(caption);
  _graphCanvas.appendChild(el);

  const bloom = () => {
    el.style.animation = `pp-bloom 420ms cubic-bezier(0.34,1.2,0.64,1) 0ms forwards`;
  };
  img.addEventListener('load', bloom);
  img.addEventListener('error', () => { el.remove(); _graphNodeMap.delete(title); });
  img.src = summary.thumbnail.source;
  if (img.complete && img.naturalWidth) bloom();

  el.style.cursor = 'pointer';
  el.addEventListener('click', () => showPagePreview(summary.title || title, el));
  if (_lineAnimDone) _redrawLines();

  // Spawn 2 more generations outward from this node as it enters the viewport
  if (layer < _MAX_LAYER && !_spawnedTitles.has(title)) {
    _spawnedTitles.add(title);
    const nodeInfo = { title, cx: wx + size / 2, cy: wy + cardH / 2 };
    _fetchLayerNodes(_graphLang, [nodeInfo], layer + 1).then(children => {
      if (!children.length) return;
      const childInfos = children.map(c => ({
        title: c.title, cx: c.wx + c.size / 2, cy: c.wy + c.cardH / 2
      }));
      _fetchLayerNodes(_graphLang, childInfos, layer + 2);
    });
  }
}

/* ────────────────────────────────────────────────────────────
   Fetch & load  (uses MediaWiki Action API — CORS-safe)
──────────────────────────────────────────────────────────── */
async function loadArticle() {
  const lang  = (document.getElementById('lang-input').value.trim() || 'en').toLowerCase();
  const raw   = document.getElementById('article-input').value.trim();
  if (!raw) return;

  const title  = raw.replace(/ /g, '_');
  const root   = document.getElementById('article-root');
  const status = document.getElementById('status-text');

  root.innerHTML = '<div class="state-loading">Loading…</div>';
  status.textContent = '';
  ppHistory.length = 0;
  ppCurrentTitle = null;
  document.getElementById('pp-history-bar')?.remove();
  closePagePreview();

  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const enc = encodeURIComponent(title);

  try {
    // Fetch article HTML + metadata in parallel
    const [parseRes, metaRes, relRes, talkRes] = await Promise.allSettled([
      fetch(`${api}?action=parse&page=${enc}&prop=text|langlinks|displaytitle&format=json&origin=*`).then(r => r.json()),
      fetch(`${api}?action=query&prop=revisions|pageprops&titles=${enc}&rvprop=timestamp|user&rvlimit=1&format=json&origin=*`).then(r => r.json()),
      fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/related/${enc}`).then(r => r.ok ? r.json() : { pages: [] }).catch(() => ({ pages: [] })),
      fetch(`${api}?action=parse&page=Talk:${enc}&prop=sections&format=json&origin=*`).then(r => r.json()).catch(() => null),
    ]);

    if (parseRes.status === 'rejected') throw new Error('Network error');
    const parseData = parseRes.value;
    if (parseData.error) throw new Error(parseData.error.info ?? 'Article not found');

    const p          = parseData.parse;
    // Rewrite protocol-relative URLs so images load over both http:// and file://
    const rawHTML    = p.text['*'].replace(/\/\/upload\.wikimedia\.org/g, 'https://upload.wikimedia.org');
    const langCount  = p.langlinks?.length ?? 0;
    const displayTitle = p.displaytitle ?? title;

    // Metadata
    let timestamp = null, user = null, dir = 'ltr';
    if (metaRes.status === 'fulfilled') {
      const page = Object.values(metaRes.value?.query?.pages ?? {})[0];
      timestamp  = page?.revisions?.[0]?.timestamp ?? null;
      user       = page?.revisions?.[0]?.user ?? null;
      dir        = page?.pagelanguagehtmlcode === 'ar' ? 'rtl' : (page?.pageprops?.['wgPageContentLanguage'] ?? 'ltr');
    }

    // Detect RTL from lang code
    const rtlLangs = ['ar','he','fa','ur','yi','ckb','ps','sd','ug'];
    if (rtlLangs.includes(lang)) dir = 'rtl';

    // Related pages
    const related = relRes.status === 'fulfilled' ? (relRes.value?.pages ?? []) : [];

    // Talk page comment count (number of top-level sections on Talk page)
    const commentCount = talkRes.status === 'fulfilled'
      ? (talkRes.value?.parse?.sections?.length ?? 0)
      : 0;

    // Parse HTML into lead + sections
    const { leadHTML, firstPara, sections } = parseArticleHTML(rawHTML);

    renderArticle({ title, displayTitle, langCount, commentCount, leadHTML, firstPara, sections, timestamp, user, related, dir, lang });
    status.textContent = `✓ ${title.replace(/_/g, ' ')}`;

  } catch (err) {
    root.innerHTML = `
      <div class="state-error">
        <strong>Could not load article</strong><br>
        ${esc(err.message)}<br><br>
        <small>Check the language code and article title.<br>
        (Example: lang <code>en</code>, title <code>Hedy_Lamarr</code>)</small>
      </div>`;
    status.textContent = '✗ error';
  }
}
