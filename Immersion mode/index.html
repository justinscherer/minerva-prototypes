<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wikipedia Minerva Tester</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────── */
    body {
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #e9ebee;
    }

    /* ── Control bar ───────────────────────────────────────── */
    #control-bar {
      background: #1d1f23;
      padding: 7px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 300;
    }
    #home-link { color: #888; font-size: 11px; font-family: monospace; flex-shrink: 0; text-decoration: none; }
    #home-link:hover { color: #aaa; text-decoration: underline; }
    #lang-input {
      width: 48px; padding: 5px 7px;
      background: #2d2f35; border: 1px solid #555; color: #eee;
      font-size: 13px; border-radius: 4px; font-family: monospace;
    }
    #article-input {
      flex: 1; min-width: 160px; padding: 5px 8px;
      background: #2d2f35; border: 1px solid #555; color: #eee;
      font-size: 13px; border-radius: 4px;
    }
    #load-btn {
      padding: 5px 16px; background: #3366cc; color: #fff;
      border: none; border-radius: 4px; font-size: 13px;
      font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    #load-btn:hover { background: #1a4fbf; }
    #status-text { color: #888; font-size: 11px; font-family: monospace; }

    /* ── Page wrapper ──────────────────────────────────────── */
    #page-wrapper {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: calc(100vh - 38px);
      overflow-x: hidden;
    }

    /* ── Minerva header ────────────────────────────────────── */
    .mw-header {
      height: 54px;
      background: #f8f9fa;
      border-bottom: 1px solid #dadde3;
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      flex-shrink: 0;
    }
    .mw-menu-btn, .mw-search-btn {
      background: none; border: none; cursor: pointer;
      color: #54595d; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mw-wordmark {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      text-decoration: none;
      display: flex;
      align-items: center;
      line-height: 0;
    }
    .mw-search-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Article outer wrapper ─────────────────────────────── */
    .article-outer {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Title section ─────────────────────────────────────── */
    .article-title-section { padding: 30px 16px 0; }
    .article-title-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }
    .article-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 27.2px; line-height: 36px;
      color: #101418; font-weight: normal;
      flex: 1; min-width: 0;
    }
    .article-actions {
      display: flex; align-items: center;
      gap: 0; flex-shrink: 0; padding-top: 6px;
    }
    .article-action-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: #3366cc; border-radius: 2px;
    }

    /* ── InfoChips ─────────────────────────────────────────── */
    .article-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; margin-top: 8px;
    }
    .infochip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e8eeff; color: #3366cc;
      border-radius: 9999px; padding: 1px 6px;
      font-size: 12px; line-height: 20px;
      cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .infochip svg { flex-shrink: 0; }

    /* ── Image gallery ─────────────────────────────────────── */
    .gallery-scroll {
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-left: 16px;
    }
    .gallery-scroll::-webkit-scrollbar { display: none; }
    .gallery-track { display: flex; gap: 4px; }
    .gallery-img {
      width: 175px; height: 175px;
      flex-shrink: 0; object-fit: cover;
      display: block; background: #f8f9fa;
    }

    /* ── Article text (shared base) ────────────────────────── */
    .art {
      padding: 0 16px;
      color: #202122;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .art a { color: #3366cc; text-decoration: none; }
    .art a:hover { text-decoration: underline; }
    .art sup { font-size: 9px; vertical-align: super; line-height: 0; }
    .art sup a { color: #3366cc; }
    .art small { font-size: 12px; }

    /* Lead uses same sizing as body — no separate overrides */

    /* Body sections — 16px */
    .art.body p, .art.body li { font-size: 16px; line-height: 26.4px; margin-bottom: 16px; }
    .art.body p:last-child { margin-bottom: 0; }
    .art.body ul, .art.body ol { padding-left: 22px; margin-bottom: 16px; }
    .art.body h3 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px; line-height: 26px; font-weight: normal;
      color: #101418; margin: 16px 0 8px;
    }
    .art.body h4 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px; line-height: 23px; font-weight: normal;
      color: #101418; margin: 12px 0 6px;
    }

    /* Infobox */
    .art table.infobox {
      width: 100%; border-collapse: collapse;
      font-size: 14.4px; line-height: 24px;
      color: #202122; margin: 0 0 12px;
    }
    .art table.infobox caption {
      font-weight: bold; text-align: center; font-size: 14.4px;
      padding: 8px 10px; border: 1px solid #eaecf0; border-bottom: none;
    }
    .art table.infobox th,
    .art table.infobox td {
      border: 1px solid #eaecf0; padding: 8px 10px; vertical-align: top;
    }
    .art table.infobox .infobox-above th,
    .art table.infobox .infobox-title th,
    .art table.infobox .infobox-header th {
      text-align: center; font-weight: bold;
    }
    .art table.infobox .infobox-image td { text-align: center; }
    .art table.infobox img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

    /* Blockquote */
    .art blockquote {
      border-left: 3px solid #c8ccd1;
      padding: 6px 32px 6px 40px;
      font-family: 'Charter', 'Bitstream Charter', Georgia, serif;
      font-size: 17.6px; line-height: 29.04px; color: #202122;
      margin: 8px 0;
    }

    /* Floated thumb images */
    .art .thumb, .art .tright {
      float: right; margin: 0 0 12px 16px; max-width: 220px; clear: right;
    }
    .art .tleft {
      float: left; margin: 0 16px 12px 0; max-width: 220px; clear: left;
    }
    .art .thumb img, .art .tright img, .art .tleft img,
    .art figure img {
      max-width: 100%; height: auto; display: block;
    }
    .art .thumbcaption, .art figcaption {
      font-size: 13px; line-height: 19.5px; color: #54595d; margin-top: 6px;
    }
    .art figure { margin: 10px 0; max-width: 220px; }

    /* Other Wikipedia tables */
    .art table:not(.infobox) {
      width: 100%; border-collapse: collapse;
      font-size: 14px; margin: 8px 0; overflow-x: auto; display: block;
    }
    .art table:not(.infobox) th,
    .art table:not(.infobox) td {
      border: 1px solid #eaecf0; padding: 6px 8px; font-size: 14px;
    }

    /* Wikipedia-specific noise to hide */
    .art .mw-editsection, .art .noprint, .art .navbox,
    .art .navigation-not-searchable, .art .geo-dms,
    .art .geo-nondefault, .art .mw-kartographer-map,
    .art .mbox-small, .art .ambox, .art .tmbox { display: none; }

    /* Clearfix */
    .art::after { content: ''; display: table; clear: both; }

    /* ── Accordion sections ────────────────────────────────── */
    .acc-section {}
    .acc-btn {
      width: 100%; display: flex; align-items: center;
      background: none; border: none; padding: 12px 16px 0;
      cursor: pointer; text-align: left;
    }
    .acc-chevron {
      width: 16px; height: 16px; flex-shrink: 0;
      color: #54595d; transition: transform 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .acc-section.open .acc-chevron { transform: rotate(90deg); }
    .acc-title {
      flex: 1;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px; line-height: 31.2px;
      color: #101418; font-weight: normal;
      padding-left: 0;
    }
    .acc-divider { height: 1px; background: #dadde3; margin: 11px 16px 0; }
    .acc-body { display: none; padding: 8px 0 0; }
    .acc-section.open .acc-body { display: block; }

    /* ── Footer ─────────────────────────────────────────────── */
    .article-footer { margin-top: 32px; }

    /* Last edited bar */
    .foot-lastedit {
      height: 36px; background: #eaecf0;
      border-top: 1px solid #c8ccd1; border-bottom: 1px solid #c8ccd1;
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
      cursor: pointer; overflow: hidden;
    }
    .foot-lastedit-icon { width: 20px; height: 20px; flex-shrink: 0; color: #54595d; }
    .foot-lastedit-text {
      flex: 1; font-size: 14px; color: #54595d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 19.6px;
    }
    .foot-lastedit-chev { width: 16px; height: 16px; color: #54595d; flex-shrink: 0; }

    /* Related pages */
    .foot-related { background: #eaecf0; padding: 42px 16px 0; }
    .foot-related-label {
      font-size: 13px; color: #54595d; letter-spacing: 0.9px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .related-item {
      display: flex; height: 80px; border: 1px solid #dadde3;
      overflow: hidden; cursor: pointer; background: #fff;
    }
    .related-item:not(:first-child) { border-top: none; }
    .related-item:first-child { border-radius: 2px 2px 0 0; }
    .related-item:last-child { border-radius: 0 0 2px 2px; }
    .related-thumb {
      width: 80px; height: 80px; object-fit: cover;
      flex-shrink: 0; mix-blend-mode: darken;
    }
    .related-thumb-ph {
      width: 80px; height: 80px; flex-shrink: 0; background: #eaecf0;
    }
    .related-text {
      flex: 1; display: flex; flex-direction: column;
      gap: 2px; justify-content: center; padding: 0 12px; min-width: 0;
    }
    .related-title {
      font-size: 16px; font-weight: bold; line-height: 20.8px;
      color: #202122; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .related-desc {
      font-size: 12.8px; line-height: 17.92px; color: #72777d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Generic footer */
    .foot-generic {
      background: #eaecf0; padding: 40px 16px 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .foot-wm { line-height: 0; }
    .foot-hr { height: 1px; background: #dadde3; border: none; }
    .foot-license {
      font-size: 14px; line-height: 19.6px; color: #202122;
    }
    .foot-license a { color: #3366cc; }
    .foot-links { font-size: 14px; line-height: 19.6px; color: #101418; }
    .foot-links a { color: #101418; text-decoration: none; }

    /* ── States ─────────────────────────────────────────────── */
    .state-loading {
      padding: 80px 16px; text-align: center;
      color: #54595d; font-size: 14px;
    }
    .state-error {
      padding: 40px 16px; text-align: center;
      color: #b32424; font-size: 14px; line-height: 22px;
    }
    .state-empty {
      padding: 80px 16px; text-align: center;
      color: #72777d; font-size: 14px; line-height: 22px;
    }

    /* ── Immersion dark mode ───────────────────────────────── */
    body.tts-playing #page-wrapper { background: #101418; }
    body.tts-playing .mw-header { background: #101418; border-bottom-color: #27292d; }
    body.tts-playing .mw-menu-btn svg rect,
    body.tts-playing .mw-search-btn svg circle,
    body.tts-playing .mw-search-btn svg path { stroke: #a2a9b1; fill: none; }
    body.tts-playing .mw-menu-btn svg rect { fill: #a2a9b1; stroke: none; }
    body.tts-playing .article-title { color: #f8f9fa; }
    body.tts-playing .art { color: #eaecf0; }
    body.tts-playing .art a { color: inherit !important; text-decoration: none !important; pointer-events: none; }
    body.tts-playing .art sup { display: none; }
    body.tts-playing .acc-title { color: #f8f9fa; }
    body.tts-playing .acc-divider { background: #404244; }
    body.tts-playing .acc-chevron { color: #a2a9b1; }
    body.tts-playing .art table.infobox,
    body.tts-playing .art table.infobox th,
    body.tts-playing .art table.infobox td,
    body.tts-playing .art table.infobox caption { border-color: #27292d; color: #eaecf0; }
    body.tts-playing .infochip { background: #1b223d; color: #88a3e8; }
    body.tts-playing .infochip svg path { fill: #88a3e8; }
    body.tts-playing .art blockquote { color: #eaecf0; border-left-color: #404244; }
    body.tts-playing .foot-lastedit { background: #27292d; border-color: #404244; }
    body.tts-playing .foot-lastedit-text { color: #a2a9b1; }
    body.tts-playing .foot-related { background: #27292d; }
    body.tts-playing .foot-generic { background: #27292d; }
    body.tts-playing .foot-hr { background: #404244; }
    body.tts-playing .related-item { background: #1a1c20; border-color: #404244; }
    body.tts-playing .related-title { color: #eaecf0; }
    body.tts-playing .related-desc { color: #a2a9b1; }
    body.tts-playing .foot-license { color: #eaecf0; }
    body.tts-playing .foot-links a { color: #eaecf0; }
    body.tts-playing .foot-related-label { color: #a2a9b1; }
    body.tts-playing .article-action-btn { color: #a2a9b1; }
    body.tts-playing #tts-play-btn { color: #88a3e8; }

    /* ── TTS Transport Bar ─────────────────────────────────── */
    #tts-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      flex-direction: column;
      background: #27292d;
      border-top: 1px solid #404244;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #tts-bar[hidden] { display: none; }

    #tts-progress-track {
      height: 3px; background: rgba(255,255,255,0.1);
      width: 100%; flex-shrink: 0;
    }
    #tts-progress-fill {
      height: 100%; background: #88a3e8;
      width: 0%; transition: width 0.3s ease;
    }

    #tts-controls-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px;
      max-width: 480px; margin: 0 auto; width: 100%;
    }

    #tts-speed-btn {
      background: transparent; border: none;
      color: #88a3e8; font-size: 14px; font-weight: 700;
      font-family: inherit; padding: 0 16px;
      height: 44px; min-width: 44px;
      cursor: pointer; border-radius: 2px; white-space: nowrap;
    }
    #tts-speed-btn:active { background: rgba(255,255,255,0.08); }

    #tts-transport-btns { display: flex; align-items: center; }

    .tts-bar-btn {
      flex-shrink: 0; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: #c8cacd; border-radius: 2px; cursor: pointer;
    }
    .tts-bar-btn:active { background: rgba(255,255,255,0.1); }
    .tts-bar-btn--primary { background: transparent; color: #c8cacd; }

    /* ── Speed popover ─────────────────────────────────────── */
    #tts-speed-popover {
      position: fixed; bottom: 70px; left: 16px;
      background: #1a1c20; border: 1px solid #404244;
      border-radius: 8px; overflow: hidden;
      z-index: 600; min-width: 110px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #tts-speed-popover[hidden] { display: none; }
    .tts-speed-option {
      display: block; width: 100%;
      padding: 11px 20px;
      background: transparent; border: none;
      color: #eaecf0; font-size: 14px; font-family: inherit;
      text-align: left; cursor: pointer;
    }
    .tts-speed-option:hover { background: rgba(255,255,255,0.06); }
    .tts-speed-option.tts-speed-active { color: #88a3e8; font-weight: 700; }

    /* ── Overlay panels ────────────────────────────────────── */
    .tts-overlay-panel {
      position: fixed; left: 0; right: 0;
      background: rgba(16, 20, 24, 0.82);
      pointer-events: none; z-index: 100;
      transition: height 0.25s ease, top 0.25s ease;
    }
    #tts-overlay-top  { top: 0; height: 0; }
    #tts-overlay-bottom { top: 0; height: 0; }

    /* ── Word & paragraph highlight ────────────────────────── */
    .tts-word { border-radius: 2px; transition: background 0.05s; }
    .tts-word.tts-active {
      background: rgba(136, 163, 232, 0.28);
      color: #eaecf0; text-decoration: underline;
    }
    .tts-para-active {
      background: #1b223d; border-radius: 4px;
      position: relative; z-index: 150;
      transition: background 0.2s;
    }

    /* ── Play button active state ──────────────────────────── */
    #tts-play-btn.tts-btn-active { color: #e8622a; }

    /* ── Bottom padding when bar is visible ────────────────── */
    body.tts-playing { padding-bottom: 60px; }
  </style>
</head>
<body>

<div id="control-bar">
  <a href="../index.html" id="home-link">home</a>
  <input id="lang-input" type="text" value="en" maxlength="10" autocomplete="off" spellcheck="false">
  <input id="article-input" type="text" value="" placeholder="Article title…" autocomplete="off" spellcheck="false">
  <button id="load-btn">Load</button>
  <span id="status-text"></span>
</div>

<div id="page-wrapper">
  <!-- Minerva header — always present -->
  <header class="mw-header">
    <button class="mw-menu-btn" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="4.5"  width="16" height="1.5" rx="0.75" fill="#54595d"/>
        <rect x="2" y="9.25" width="16" height="1.5" rx="0.75" fill="#54595d"/>
        <rect x="2" y="14"   width="16" height="1.5" rx="0.75" fill="#54595d"/>
      </svg>

/* ────────────────────────────────────────────────────────────
   Utilities
──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  if (!iso) return 'recently';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d < 1)  return 'today';
  if (d < 2)  return '1 day ago';
  if (d < 30) return `${d} days ago`;
  const mo = Math.floor(d / 30.4);
  if (mo < 2)  return '1 month ago';
  if (mo < 12) return `${mo} months ago`;
  const y = Math.floor(mo / 12);
  return y < 2 ? '1 year ago' : `${y} years ago`;
}

function isDecorative(src) {
  if (!src) return true;
  if (/\.svg(\?|$)/i.test(src)) return true;
  if (/[?&](width|height)=\d{1,2}[^0-9]/i.test(src)) return true;
  if (/1x1|pixel|blank/i.test(src)) return true;
  const m = src.match(/\/(\d+)px-/);
  return m ? parseInt(m[1], 10) < 100 : false;
}

/* ────────────────────────────────────────────────────────────
   Parse full article HTML into lead + sections
──────────────────────────────────────────────────────────── */
function parseArticleHTML(rawHTML) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(rawHTML, 'text/html');
  const output = doc.querySelector('.mw-parser-output') ?? doc.body;

  // Remove noise
  output.querySelectorAll(
    '.mw-editsection, .noprint, .navbox, .navigation-not-searchable, ' +
    '.mbox-small, .ambox, .tmbox, .sistersitebox, style, .shortdescription, .toc'
  ).forEach(el => el.remove());

  // Modern Wikipedia wraps headings in <div class="mw-heading mw-heading2">
  // Older articles use bare <h2> tags — handle both.
  const isH2 = el =>
    el.tagName === 'H2' ||
    (el.tagName === 'DIV' && el.classList.contains('mw-heading2'));

  const leadNodes    = [];
  const sectionNodes = []; // [{title, nodes}]
  let   current      = null;

  for (const child of Array.from(output.children)) {
    if (isH2(child)) {
      // Extract the heading text, stripping edit-section spans
      const h2 = child.querySelector('h2') ?? child;
      h2.querySelectorAll('.mw-editsection').forEach(el => el.remove());
      const heading = h2.innerHTML.trim();
      current = { title: heading, nodes: [] };
      sectionNodes.push(current);
    } else if (current) {
      current.nodes.push(child);
    } else {
      leadNodes.push(child);
    }
  }

  // Hoist first non-empty paragraph above the infobox
  let firstPara = '';
  const firstParaIdx = leadNodes.findIndex(
    n => n.tagName === 'P' && n.textContent.trim().length > 0
  );
  if (firstParaIdx !== -1) {
    firstPara = leadNodes[firstParaIdx].outerHTML;
    leadNodes.splice(firstParaIdx, 1);
  }

  const leadHTML = leadNodes.map(n => n.outerHTML).join('');
  const sections = sectionNodes.map(s => ({
    title: s.title,
    html:  s.nodes.map(n => n.outerHTML).join(''),
  }));

  return { leadHTML, sections, firstPara };
}

/* ────────────────────────────────────────────────────────────
   Image extraction from DOM nodes
──────────────────────────────────────────────────────────── */
function collectImages(leadHTML, sections) {
  const parser = new DOMParser();
  const seen   = new Set();
  const out    = [];

  const chunks = [leadHTML, ...sections.map(s => s.html)];

  for (const html of chunks) {
    if (!html) continue;
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('.infobox img, table.infobox img, .sidebar img, .taxobox img').forEach(el => el.remove());

    doc.querySelectorAll('img').forEach(img => {
      let src = img.getAttribute('src') ?? '';
      if (!src) return;
      if (src.startsWith('//')) src = 'https:' + src;
      if (!src.startsWith('http')) return;
      if (isDecorative(src)) return;

      const big = src.replace(/\/(\d+)px-/, '/250px-');
      if (seen.has(big)) return;
      seen.add(big);
      out.push({ src: big, alt: img.getAttribute('alt') ?? '' });
    });
  }

  return out;
}

/* ────────────────────────────────────────────────────────────
   Render helpers
──────────────────────────────────────────────────────────── */
function renderChips(langCount, commentCount) {
  return `
    <div class="article-chips">
      ${langCount ? `<span class="infochip">${SVG.translate} ${langCount} language${langCount !== 1 ? 's' : ''}</span>` : ''}
      ${commentCount ? `<span class="infochip">${SVG.comment} ${commentCount} comment${commentCount !== 1 ? 's' : ''}</span>` : ''}
    </div>`;
}

function renderGallery(images) {
  if (!images.length) return '';
  const imgs = images.map(i =>
    `<img class="gallery-img" src="${esc(i.src)}" alt="${esc(i.alt)}" loading="lazy">`
  ).join('');
  return `<div class="gallery-scroll"><div class="gallery-track">${imgs}</div></div>`;
}

function renderAccordions(sections) {
  return sections.map((sec, idx) => `
    <div class="acc-section" data-i="${idx}">
      <button class="acc-btn" aria-expanded="false">
        <span class="acc-chevron">${SVG.chevron}</span>
        <span class="acc-title">${sec.title}</span>
      </button>
      <div class="acc-divider"></div>
      <div class="acc-body">
        <div class="art body">${sec.html}</div>
      </div>
    </div>`
  ).join('');
}

function renderRelated(pages) {
  if (!pages?.length) return '';
  const items = pages.slice(0, 3).map(p => {
    const thumb = p.thumbnail?.source
      ? `<img class="related-thumb" src="${esc(p.thumbnail.source)}" alt="" loading="lazy">`
      : `<div class="related-thumb-ph"></div>`;
    return `
      <div class="related-item">
        ${thumb}
        <div class="related-text">
          <div class="related-title">${p.displaytitle ?? esc(p.title ?? '')}</div>
          ${p.description ? `<div class="related-desc">${esc(p.description)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="foot-related">
      <div class="foot-related-label">Related pages</div>
      <div class="related-list">${items}</div>
    </div>`;
}

function renderLastEdited(timestamp, user) {
  if (!timestamp) return '';
  const name = (user ?? '').length > 14 ? user.slice(0, 14) + '…' : (user ?? '');
  const by   = name ? ` by ${esc(name)}` : '';
  return `
    <div class="foot-lastedit">
      <span class="foot-lastedit-icon">${SVG.history}</span>
      <span class="foot-lastedit-text">
        <strong>Last edited ${timeAgo(timestamp)}</strong>${by}
      </span>
      <span class="foot-lastedit-chev">${SVG.chevron}</span>
    </div>`;
}

/* ────────────────────────────────────────────────────────────
   TTS helpers
──────────────────────────────────────────────────────────── */
function getParagraphText(p) {
  const clone = p.cloneNode(true);
  clone.querySelectorAll('sup, .reference').forEach(el => el.remove());
  return clone.textContent.trim();
}

function buildParagraphList() {
  const list = [];
  const outer = document.querySelector('.article-outer');
  if (!outer) return list;

  // Lead: direct .art.body children before .acc-sections
  for (const child of outer.children) {
    if (child.classList.contains('acc-sections')) break;
    if (child.classList.contains('art') && child.classList.contains('body')) {
      for (const p of child.querySelectorAll('p')) {
        const text = getParagraphText(p);
        if (text.length > 20) list.push({ el: p, text, sectionIdx: -1 });
      }
    }
  }

  // Accordion sections
  outer.querySelectorAll('.acc-section').forEach(sec => {
    const idx = parseInt(sec.dataset.i, 10);
    const body = sec.querySelector('.acc-body .art.body');
    if (!body) return;
    for (const p of body.querySelectorAll('p')) {
      const text = getParagraphText(p);
      if (text.length > 20) list.push({ el: p, text, sectionIdx: idx });
    }
  });

  return list;
}

function wrapWordsInParagraph(p) {
  TTS.savedHTML = p.innerHTML;
  TTS.activeEl = p;

  const walker = document.createTreeWalker(p, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      let anc = node.parentElement;
      while (anc && anc !== p) {
        if (anc.tagName === 'SUP' || anc.tagName === 'SMALL') return NodeFilter.FILTER_REJECT;
        anc = anc.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });

  const textNodes = [];
  let node;
  while ((node = walker.nextNode())) textNodes.push(node);

  for (const tn of textNodes) {
    const frag = document.createDocumentFragment();
    const re = /(\S+|\s+)/g;
    let m;
    while ((m = re.exec(tn.nodeValue)) !== null) {
      if (/\S/.test(m[0])) {
        const span = document.createElement('span');
        span.className = 'tts-word';
        span.textContent = m[0];
        frag.appendChild(span);
      } else {
        frag.appendChild(document.createTextNode(m[0]));
      }
    }
    tn.parentNode.replaceChild(frag, tn);
  }
}

function buildOffsetIndex(p, utteranceText) {
  const spans = Array.from(p.querySelectorAll('.tts-word'));
  const index = [];
  let pos = 0;
  for (const span of spans) {
    const word = span.textContent;
    const found = utteranceText.indexOf(word, pos);
    if (found === -1) { pos += word.length; continue; }
    index.push({ start: found, end: found + word.length, span });
    pos = found + word.length;
  }
  return index;
}

function unwrapParagraph() {
  if (!TTS.activeEl) return;
  TTS.activeEl.innerHTML = TTS.savedHTML;
  TTS.activeEl.classList.remove('tts-para-active');
  TTS.activeEl = null;
  TTS.savedHTML = '';
  TTS.offsetIndex = [];
  ttsUpdateOverlay(null);
}

function ttsUpdateOverlay(el) {
  if (!TTS.overlayTop || !TTS.overlayBottom) return;
  if (!el) {
    TTS.overlayTop.style.height    = '0px';
    TTS.overlayBottom.style.height = '0px';
    return;
  }
  const rect = el.getBoundingClientRect();
  const pad  = 16;
  TTS.overlayTop.style.height    = Math.max(0, rect.top - pad) + 'px';
  TTS.overlayBottom.style.top    = (rect.bottom + pad) + 'px';
  TTS.overlayBottom.style.height = Math.max(0, window.innerHeight - rect.bottom - pad) + 'px';
}

function ttsToggleSpeedPopover() {
  const pop = document.getElementById('tts-speed-popover');
  if (pop) pop.hidden = !pop.hidden;
}

function ttsSetSpeed(rate) {
  TTS.rate = rate;
  const btn = document.getElementById('tts-speed-btn');
  if (btn) btn.textContent = rate === 1 ? '1×' : rate + '×';
  document.querySelectorAll('.tts-speed-option').forEach(opt => {
    opt.classList.toggle('tts-speed-active', parseFloat(opt.dataset.rate) === rate);
  });
  const pop = document.getElementById('tts-speed-popover');
  if (pop) pop.hidden = true;
  if (speechSynthesis.speaking) {
    const cur = TTS.cursor;
    speechSynthesis.cancel();
    setTimeout(() => ttsStartParagraph(cur), 50);
  }
}

function ttsExpandSection(sectionIdx) {
  if (sectionIdx < 0) return;
  const sec = document.querySelector(`.acc-section[data-i="${sectionIdx}"]`);
  if (!sec) return;
  if (!sec.classList.contains('open')) {
    sec.classList.add('open');
    const btn = sec.querySelector('.acc-btn');
    if (btn) btn.setAttribute('aria-expanded', 'true');
  }
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function ttsUpdateBar() {
  const fill = document.getElementById('tts-progress-fill');
  if (fill) fill.style.width = `${((TTS.cursor + 1) / TTS.paragraphs.length) * 100}%`;
}

function ttsStartParagraph(idx) {
  if (idx >= TTS.paragraphs.length) { ttsStop(); return; }

  unwrapParagraph();
  TTS.cursor = idx;
  ttsUpdateBar();

  const para = TTS.paragraphs[idx];

  // Auto-expand section if we've crossed a section boundary
  const prevSec = TTS.paragraphs[idx - 1]?.sectionIdx ?? -2;
  if (para.sectionIdx !== prevSec) {
    ttsExpandSection(para.sectionIdx);
  }

  para.el.classList.add('tts-para-active');
  para.el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  // Defer overlay positioning one frame so scroll/layout settles
  requestAnimationFrame(() => ttsUpdateOverlay(para.el));

  wrapWordsInParagraph(para.el);
  TTS.offsetIndex = buildOffsetIndex(para.el, para.text);

  const utt = new SpeechSynthesisUtterance(para.text);
  utt.rate = TTS.rate;

  utt.onboundary = (e) => {
    if (e.name !== 'word' || e.charLength === 0) return;
    const prev = TTS.activeEl?.querySelector('.tts-word.tts-active');
    if (prev) prev.classList.remove('tts-active');
    const ci = e.charIndex;
    for (const entry of TTS.offsetIndex) {
      if (ci >= entry.start && ci < entry.end) {
        entry.span.classList.add('tts-active');
        entry.span.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        break;
      }
    }
  };

  utt.onend = () => ttsStartParagraph(idx + 1);
  utt.onerror = (e) => { if (e.error !== 'interrupted') ttsStartParagraph(idx + 1); };

  TTS.utterance = utt;
  speechSynthesis.speak(utt);
}

function ttsStart() {
  TTS.paragraphs = buildParagraphList();
  if (!TTS.paragraphs.length) return;

  TTS.bar.hidden = false;
  if (TTS.overlayTop)    TTS.overlayTop.hidden    = false;
  if (TTS.overlayBottom) TTS.overlayBottom.hidden = false;
  document.body.classList.add('tts-playing');
  if (TTS.playBtn) {
    TTS.playBtn.classList.add('tts-btn-active');
    TTS.playBtn.innerHTML = SVG.speakerActive;
  }

  // Chrome keep-alive: re-ping every 10s to prevent silent cutoff
  TTS.keepAliveInterval = setInterval(() => {
    if (speechSynthesis.speaking && !TTS.paused) {
      speechSynthesis.pause();
      speechSynthesis.resume();
    }
  }, 10000);

  ttsStartParagraph(0);
}

function ttsStop() {
  clearInterval(TTS.keepAliveInterval);
  TTS.keepAliveInterval = null;
  speechSynthesis.cancel();
  unwrapParagraph();

  TTS.bar.hidden = true;
  if (TTS.overlayTop)    TTS.overlayTop.hidden    = true;
  if (TTS.overlayBottom) TTS.overlayBottom.hidden = true;
  document.body.classList.remove('tts-playing');
  TTS.paused = false;
  TTS.cursor = 0;
  TTS.paragraphs = [];

  if (TTS.playBtn) {
    TTS.playBtn.classList.remove('tts-btn-active');
    TTS.playBtn.innerHTML = SVG.speaker;
  }
  const ppBtn = document.getElementById('tts-playpause');
  if (ppBtn) ppBtn.innerHTML = SVG.playIcon;
}

function ttsPause() {
  speechSynthesis.pause();
  TTS.paused = true;
  const ppBtn = document.getElementById('tts-playpause');
  if (ppBtn) ppBtn.innerHTML = SVG.playIcon;
}

function ttsResume() {
  speechSynthesis.resume();
  TTS.paused = false;
  const ppBtn = document.getElementById('tts-playpause');
  if (ppBtn) ppBtn.innerHTML = SVG.pauseIcon;
}

function ttsTogglePlay() {
  if (!speechSynthesis.speaking && !TTS.paused) {
    ttsStart();
  } else if (TTS.paused) {
    ttsResume();
  } else {
    ttsPause();
  }
}

function ttsGoPrev() {
  const target = Math.max(0, TTS.cursor - 1);
  speechSynthesis.cancel();
  setTimeout(() => ttsStartParagraph(target), 50);
}

function ttsGoNext() {
  const target = TTS.cursor + 1;
  speechSynthesis.cancel();
  setTimeout(() => ttsStartParagraph(target), 50);
}

function ttsInit() {
  speechSynthesis.cancel();
  unwrapParagraph();

  TTS.paused = false;
  TTS.cursor = 0;
  TTS.paragraphs = [];
  clearInterval(TTS.keepAliveInterval);
  TTS.keepAliveInterval = null;

  TTS.playBtn = document.getElementById('tts-play-btn');
  if (TTS.playBtn) {
    const fresh = TTS.playBtn.cloneNode(true);
    TTS.playBtn.parentNode.replaceChild(fresh, TTS.playBtn);
    TTS.playBtn = fresh;
    TTS.playBtn.addEventListener('click', ttsTogglePlay);
  }

  // Transport bar (one-time creation)
  if (!TTS.bar) {
    const bar = document.createElement('div');
    bar.id = 'tts-bar';
    bar.hidden = true;
    bar.innerHTML = `
      <div id="tts-progress-track"><div id="tts-progress-fill"></div></div>
      <div id="tts-controls-row">
        <button id="tts-speed-btn" aria-label="Playback speed">1×</button>
        <div id="tts-transport-btns">
          <button id="tts-prev"      class="tts-bar-btn" aria-label="Previous paragraph">${SVG.prevPara}</button>
          <button id="tts-stop"      class="tts-bar-btn" aria-label="Stop">${SVG.stopIcon}</button>
          <button id="tts-playpause" class="tts-bar-btn tts-bar-btn--primary" aria-label="Pause">${SVG.pauseIcon}</button>
          <button id="tts-next"      class="tts-bar-btn" aria-label="Next paragraph">${SVG.nextPara}</button>
        </div>
      </div>`;
    document.body.appendChild(bar);
    TTS.bar = bar;

    bar.querySelector('#tts-prev').addEventListener('click', ttsGoPrev);
    bar.querySelector('#tts-stop').addEventListener('click', ttsStop);
    bar.querySelector('#tts-playpause').addEventListener('click', ttsTogglePlay);
    bar.querySelector('#tts-next').addEventListener('click', ttsGoNext);
    bar.querySelector('#tts-speed-btn').addEventListener('click', ttsToggleSpeedPopover);
  }

  // Overlay panels (one-time creation)
  if (!TTS.overlayTop) {
    const top = document.createElement('div');
    top.id = 'tts-overlay-top';
    top.className = 'tts-overlay-panel';
    top.hidden = true;
    document.body.appendChild(top);
    TTS.overlayTop = top;

    const btm = document.createElement('div');
    btm.id = 'tts-overlay-bottom';
    btm.className = 'tts-overlay-panel';
    btm.hidden = true;
    document.body.appendChild(btm);
    TTS.overlayBottom = btm;
  }

  // Speed popover (one-time creation)
  if (!document.getElementById('tts-speed-popover')) {
    const pop = document.createElement('div');
    pop.id = 'tts-speed-popover';
    pop.hidden = true;
    pop.innerHTML = SPEED_OPTIONS.map(r =>
      `<button class="tts-speed-option${r === 1 ? ' tts-speed-active' : ''}" data-rate="${r}">${r === 1 ? '1×' : r + '×'}</button>`
    ).join('');
    document.body.appendChild(pop);
    pop.addEventListener('click', e => {
      const btn = e.target.closest('.tts-speed-option');
      if (btn) ttsSetSpeed(parseFloat(btn.dataset.rate));
    });
    // Dismiss on outside click (registered once)
    document.addEventListener('click', e => {
      const p = document.getElementById('tts-speed-popover');
      if (p && !p.hidden && !p.contains(e.target) && e.target.id !== 'tts-speed-btn') {
        p.hidden = true;
      }
    }, true);
  }
}

/* ────────────────────────────────────────────────────────────
   Fetch & load  (uses MediaWiki Action API — CORS-safe)
──────────────────────────────────────────────────────────── */
async function loadArticle() {
  const lang  = (document.getElementById('lang-input').value.trim() || 'en').toLowerCase();
  const raw   = document.getElementById('article-input').value.trim();
  if (!raw) return;

  const title  = raw.replace(/ /g, '_');
  const root   = document.getElementById('article-root');
  const status = document.getElementById('status-text');

  root.innerHTML = '<div class="state-loading">Loading…</div>';
  status.textContent = '';

  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const enc = encodeURIComponent(title);

  try {
    // Fetch article HTML + metadata in parallel
    const [parseRes, metaRes, relRes, talkRes] = await Promise.allSettled([
      fetch(`${api}?action=parse&page=${enc}&prop=text|langlinks|displaytitle&format=json&origin=*`).then(r => r.json()),
      fetch(`${api}?action=query&prop=revisions|pageprops&titles=${enc}&rvprop=timestamp|user&rvlimit=1&format=json&origin=*`).then(r => r.json()),
      fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/related/${enc}`).then(r => r.ok ? r.json() : { pages: [] }).catch(() => ({ pages: [] })),
      fetch(`${api}?action=parse&page=Talk:${enc}&prop=sections&format=json&origin=*`).then(r => r.json()).catch(() => null),
    ]);

    if (parseRes.status === 'rejected') throw new Error('Network error');
    const parseData = parseRes.value;
    if (parseData.error) throw new Error(parseData.error.info ?? 'Article not found');

    const p          = parseData.parse;
    // Rewrite protocol-relative URLs so images load over both http:// and file://
    const rawHTML    = p.text['*'].replace(/\/\/upload\.wikimedia\.org/g, 'https://upload.wikimedia.org');
    const langCount  = p.langlinks?.length ?? 0;
    const displayTitle = p.displaytitle ?? title;

    // Metadata
    let timestamp = null, user = null, dir = 'ltr';
    if (metaRes.status === 'fulfilled') {
      const page = Object.values(metaRes.value?.query?.pages ?? {})[0];
      timestamp  = page?.revisions?.[0]?.timestamp ?? null;
      user       = page?.revisions?.[0]?.user ?? null;
      dir        = page?.pagelanguagehtmlcode === 'ar' ? 'rtl' : (page?.pageprops?.['wgPageContentLanguage'] ?? 'ltr');
    }

    // Detect RTL from lang code
    const rtlLangs = ['ar','he','fa','ur','yi','ckb','ps','sd','ug'];
    if (rtlLangs.includes(lang)) dir = 'rtl';

    // Related pages
    const related = relRes.status === 'fulfilled' ? (relRes.value?.pages ?? []) : [];

    // Talk page comment count (number of top-level sections on Talk page)
    const commentCount = talkRes.status === 'fulfilled'
      ? (talkRes.value?.parse?.sections?.length ?? 0)
      : 0;

    // Parse HTML into lead + sections
    const { leadHTML, firstPara, sections } = parseArticleHTML(rawHTML);

    renderArticle({ title, displayTitle, langCount, commentCount, leadHTML, firstPara, sections, timestamp, user, related, dir });
    status.textContent = `✓ ${title.replace(/_/g, ' ')}`;

  } catch (err) {
    root.innerHTML = `
      <div class="state-error">
        <strong>Could not load article</strong><br>
        ${esc(err.message)}<br><br>
        <small>Check the language code and article title.<br>
        (Example: lang <code>en</code>, title <code>Hedy_Lamarr</code>)</small>
      </div>`;
    status.textContent = '✗ error';
  }
}

/* ────────────────────────────────────────────────────────────
   Event wiring
──────────────────────────────────────────────────────────── */
document.getElementById('load-btn').addEventListener('click', loadArticle);
document.getElementById('article-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadArticle();
});

// Auto-load a random vital article on open
const randomArticle = VITAL_ARTICLES[Math.floor(Math.random() * VITAL_ARTICLES.length)];
document.getElementById('article-input').value = randomArticle;
loadArticle();
</script>
