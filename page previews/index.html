<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wikipedia Minerva Tester</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────── */
    body {
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #e9ebee;
    }

    /* ── Control bar ───────────────────────────────────────── */
    #control-bar {
      background: #1d1f23;
      padding: 7px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 300;
    }
    #home-link { color: #888; font-size: 11px; font-family: monospace; flex-shrink: 0; text-decoration: none; }
    #home-link:hover { color: #aaa; text-decoration: underline; }
    #lang-input {
      width: 48px; padding: 5px 7px;
      background: #2d2f35; border: 1px solid #555; color: #eee;
      font-size: 13px; border-radius: 4px; font-family: monospace;
    }
    #article-input {
      flex: 1; min-width: 160px; padding: 5px 8px;
      background: #2d2f35; border: 1px solid #555; color: #eee;
      font-size: 13px; border-radius: 4px;
    }
    #load-btn {
      padding: 5px 16px; background: #3366cc; color: #fff;
      border: none; border-radius: 4px; font-size: 13px;
      font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    #load-btn:hover { background: #1a4fbf; }
    #status-text { color: #888; font-size: 11px; font-family: monospace; }

    /* ── Page wrapper ──────────────────────────────────────── */
    #page-wrapper {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: calc(100vh - 38px);
      overflow-x: clip;
    }

    /* ── Minerva header ────────────────────────────────────── */
    .mw-header {
      height: 54px;
      background: #f8f9fa;
      border-bottom: 1px solid #dadde3;
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: relative;
      flex-shrink: 0;
    }
    .mw-menu-btn, .mw-search-btn {
      background: none; border: none; cursor: pointer;
      color: #54595d; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mw-wordmark {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      text-decoration: none;
      display: flex;
      align-items: center;
      line-height: 0;
    }
    .mw-search-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Article outer wrapper ─────────────────────────────── */
    .article-outer {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Title section ─────────────────────────────────────── */
    .article-title-section { padding: 30px 16px 0; }
    .article-title-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }
    .article-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 27.2px; line-height: 36px;
      color: #101418; font-weight: normal;
      flex: 1; min-width: 0;
    }
    .article-actions {
      display: flex; align-items: center;
      gap: 0; flex-shrink: 0; padding-top: 6px;
    }
    .article-action-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: #3366cc; border-radius: 2px;
    }

    /* ── InfoChips ─────────────────────────────────────────── */
    .article-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; margin-top: 8px;
    }
    .infochip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e8eeff; color: #3366cc;
      border-radius: 9999px; padding: 1px 6px;
      font-size: 12px; line-height: 20px;
      cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .infochip svg { flex-shrink: 0; }

    /* ── Image gallery ─────────────────────────────────────── */
    .gallery-scroll {
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-left: 16px;
    }
    .gallery-scroll::-webkit-scrollbar { display: none; }
    .gallery-track { display: flex; gap: 4px; }
    .gallery-img {
      width: 175px; height: 175px;
      flex-shrink: 0; object-fit: cover;
      display: block; background: #f8f9fa;
    }
    /* ── Article text (shared base) ────────────────────────── */
    .art {
      padding: 0 16px;
      color: #202122;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .art a { color: #3366cc; text-decoration: none; }
    .art a:hover { text-decoration: underline; }
    .art sup { font-size: 9px; vertical-align: super; line-height: 0; }
    .art sup a { color: #3366cc; }
    .art small { font-size: 12px; }

    /* Lead uses same sizing as body — no separate overrides */

    /* Body sections — 16px */
    .art.body p, .art.body li { font-size: 16px; line-height: 26.4px; margin-bottom: 16px; }
    .art.body p:last-child { margin-bottom: 0; }
    .art.body ul, .art.body ol { padding-left: 22px; margin-bottom: 16px; }
    .art.body h3 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px; line-height: 26px; font-weight: normal;
      color: #101418; margin: 16px 0 8px;
    }
    .art.body h4 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px; line-height: 23px; font-weight: normal;
      color: #101418; margin: 12px 0 6px;
    }

    /* Infobox */
    .art table.infobox {
      width: 100%; border-collapse: collapse;
      font-size: 14.4px; line-height: 24px;
      color: #202122; margin: 0 0 12px;
    }
    .art table.infobox caption {
      font-weight: bold; text-align: center; font-size: 14.4px;
      padding: 8px 10px; border: 1px solid #eaecf0; border-bottom: none;
    }
    .art table.infobox th,
    .art table.infobox td {
      border: 1px solid #eaecf0; padding: 8px 10px; vertical-align: top;
    }
    .art table.infobox .infobox-above th,
    .art table.infobox .infobox-title th,
    .art table.infobox .infobox-header th {
      text-align: center; font-weight: bold;
    }
    .art table.infobox .infobox-image td { text-align: center; }
    .art table.infobox img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

    /* Tighter list & paragraph styling inside infobox —
       overrides the body-section defaults (16px / 26.4px / 16px margin) */
    .art table.infobox ul,
    .art table.infobox ol {
      padding-left: 16px;
      margin: 2px 0;
    }
    .art table.infobox li {
      font-size: 14.4px;
      line-height: 20px;
      margin-bottom: 2px;
    }
    .art table.infobox li:last-child { margin-bottom: 0; }
    .art table.infobox p { font-size: 14.4px; line-height: 20px; margin-bottom: 4px; }
    .art table.infobox p:last-child { margin-bottom: 0; }

    /* Infobox collapse */
    .infobox-wrap { position: relative; margin-bottom: 12px; }
    .infobox-wrap.collapsed { max-height: 750px; overflow: hidden; margin-bottom: 0; }
    .infobox-fade {
      position: absolute;
      bottom: 40px; left: 0; right: 0;
      height: 72px;
      background: linear-gradient(to bottom, transparent, #fff);
      pointer-events: none;
    }
    .infobox-read-more {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: #fff;
      border: 1px solid #eaecf0;
      color: #3366cc;
      font-size: 14px;
      font-weight: 600;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
      text-align: center;
    }
    .infobox-read-more:hover { background: #f8f9fa; }

    /* Blockquote */
    .art blockquote {
      border-left: 3px solid #c8ccd1;
      padding: 6px 32px 6px 40px;
      font-family: 'Charter', 'Bitstream Charter', Georgia, serif;
      font-size: 17.6px; line-height: 29.04px; color: #202122;
      margin: 8px 0;
    }

    /* Floated thumb images */
    .art .thumb, .art .tright {
      float: right; margin: 0 0 12px 16px; max-width: 220px; clear: right;
    }
    .art .tleft {
      float: left; margin: 0 16px 12px 0; max-width: 220px; clear: left;
    }
    .art .thumb img, .art .tright img, .art .tleft img,
    .art figure img {
      max-width: 100%; height: auto; display: block;
    }
    .art .thumbcaption, .art figcaption {
      font-size: 13px; line-height: 19.5px; color: #54595d; margin-top: 6px;
    }
    .art figure { margin: 10px 0; max-width: 220px; }

    /* Other Wikipedia tables */
    .art table:not(.infobox) {
      width: 100%; border-collapse: collapse;
      font-size: 14px; margin: 8px 0; overflow-x: auto; display: block;
    }
    .art table:not(.infobox) th,
    .art table:not(.infobox) td {
      border: 1px solid #eaecf0; padding: 6px 8px; font-size: 14px;
    }

    /* Wikipedia-specific noise to hide */
    .art .mw-editsection, .art .noprint, .art .navbox,
    .art .navigation-not-searchable, .art .geo-dms,
    .art .geo-nondefault, .art .mw-kartographer-map,
    .art .mbox-small, .art .ambox, .art .tmbox { display: none; }

    /* Clearfix */
    .art::after { content: ''; display: table; clear: both; }

    /* ── Accordion sections ────────────────────────────────── */
    .acc-section {}
    .acc-header {
      background: #fff;
    }
    .acc-section.open .acc-header {
      position: sticky;
      top: var(--control-bar-h, 38px);
      z-index: 10;
    }
    .acc-btn {
      width: 100%; display: flex; align-items: flex-start;
      background: none; border: none; padding: 12px 16px 8px;
      cursor: pointer; text-align: left;
    }
    .acc-chevron {
      width: 16px; height: 16px; flex-shrink: 0; margin-top: 7px;
      color: #54595d; transition: transform 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .acc-section.open .acc-chevron { transform: rotate(90deg); }
    .acc-title-group { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .acc-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 24px; line-height: 31.2px;
      color: #101418; font-weight: normal;
    }
    .acc-link-list {
      font-size: 14px; line-height: 20px;
      color: #54595d; overflow: hidden;
      max-height: 40px; /* 2 lines */
    }
    .acc-link-list a { color: #3366cc; text-decoration: none; }
    .acc-link-list a:hover { text-decoration: underline; }
    /* focused target in the article body */
    .art.body a:focus,
    .art.body h3:focus,
    .art.body h4:focus,
    .art.body h5:focus,
    .art.body h6:focus {
      outline: 2px solid #3366cc;
      outline-offset: 2px;
      border-radius: 1px;
    }
    .acc-divider { height: 1px; background: #dadde3; margin: 0 16px; }
    .acc-body { display: none; padding: 8px 0 0; }
    .acc-section.open .acc-body { display: block; }

    /* ── Footer ─────────────────────────────────────────────── */
    .article-footer { margin-top: 32px; }

    /* Last edited bar */
    .foot-lastedit {
      height: 36px; background: #eaecf0;
      border-top: 1px solid #c8ccd1; border-bottom: 1px solid #c8ccd1;
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
      cursor: pointer; overflow: hidden;
    }
    .foot-lastedit-icon { width: 20px; height: 20px; flex-shrink: 0; color: #54595d; }
    .foot-lastedit-text {
      flex: 1; font-size: 14px; color: #54595d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 19.6px;
    }
    .foot-lastedit-chev { width: 16px; height: 16px; color: #54595d; flex-shrink: 0; }

    /* Related pages */
    .foot-related { background: #eaecf0; padding: 42px 16px 0; }
    .foot-related-label {
      font-size: 13px; color: #54595d; letter-spacing: 0.9px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .related-item {
      display: flex; height: 80px; border: 1px solid #dadde3;
      overflow: hidden; cursor: pointer; background: #fff;
    }
    .related-item:not(:first-child) { border-top: none; }
    .related-item:first-child { border-radius: 2px 2px 0 0; }
    .related-item:last-child { border-radius: 0 0 2px 2px; }
    .related-thumb {
      width: 80px; height: 80px; object-fit: cover;
      flex-shrink: 0; mix-blend-mode: darken;
    }
    .related-thumb-ph {
      width: 80px; height: 80px; flex-shrink: 0; background: #eaecf0;
    }
    .related-text {
      flex: 1; display: flex; flex-direction: column;
      gap: 2px; justify-content: center; padding: 0 12px; min-width: 0;
    }
    .related-title {
      font-size: 16px; font-weight: bold; line-height: 20.8px;
      color: #202122; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .related-desc {
      font-size: 12.8px; line-height: 17.92px; color: #72777d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Generic footer */
    .foot-generic {
      background: #eaecf0; padding: 40px 16px 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .foot-wm { line-height: 0; }
    .foot-hr { height: 1px; background: #dadde3; border: none; }
    .foot-license {
      font-size: 14px; line-height: 19.6px; color: #202122;
    }
    .foot-license a { color: #3366cc; }
    .foot-links { font-size: 14px; line-height: 19.6px; color: #101418; }
    .foot-links a { color: #101418; text-decoration: none; }

    /* ── Page preview canvas ─────────────────────────────────── */
    #pp-backdrop {
      position: fixed; inset: 0; z-index: 399;
      background: rgba(240, 244, 250, 0.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      touch-action: none;
      animation: pp-backdrop-in 0.22s ease-out;
    }
    #pp-backdrop.pp-dragging { cursor: grabbing; }
    @keyframes pp-backdrop-in {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* ── Peek card (progressive disclosure) ───────────────── */
    #pp-peek-overlay {
      position: fixed; inset: 0; z-index: 408;
      background: rgba(255,255,255,0.65);
      animation: pp-backdrop-in 0.22s ease-out;
      pointer-events: auto; cursor: default;
    }
    #pp-peek {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 410;
      background: #fff;
      border-top: 1px solid #c8ccd1;
      box-shadow: 0 -4px 8px rgba(0,0,0,0.06), 0 0 16px rgba(0,0,0,0.06);
      animation: pp-peek-in 0.30s cubic-bezier(0.4,0,0.2,1);
      padding: 8px 0;
      cursor: grab; user-select: none; touch-action: pan-x;
    }
    #pp-peek.pp-peek-dragging { cursor: grabbing; }
    @keyframes pp-peek-in {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    #pp-peek-grabber-row {
      display: flex; align-items: center; justify-content: center;
      padding: 0 0 8px; cursor: grab;
    }
    #pp-peek-grabber-pill {
      width: 36px; height: 5px;
      background: #72777d; border-radius: 100px;
    }
    #pp-peek-body {
      display: flex; gap: 8px; padding: 0 16px;
      align-items: flex-start;
    }
    #pp-peek-thumb-wrap {
      width: 128px; height: 128px;
      border: 1px solid #c8ccd1; border-radius: 2px;
      overflow: hidden; flex-shrink: 0;
      background: #eaecf0;
    }
    #pp-peek-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    #pp-peek-text-wrap {
      flex: 1; min-width: 0; height: 128px;
      display: flex; align-items: flex-start; overflow: hidden;
    }
    #pp-peek-text {
      font-family: Georgia,'Times New Roman',serif;
      font-size: 14px; line-height: 22px; color: #202122;
      display: -webkit-box; -webkit-box-orient: vertical;
      -webkit-line-clamp: 5; overflow: hidden;
    }
    #pp-peek-text b { font-weight: bold; font-family: Georgia,'Times New Roman',serif; }
    #pp-peek-footer {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 6px 16px 4px;
    }
    #pp-peek-readmore {
      display: flex; align-items: center; gap: 4px;
      color: #3366cc; font-size: 14px; line-height: 20px;
      text-decoration: none; white-space: nowrap;
      cursor: pointer;
    }

    #pp-canvas {
      position: fixed; inset: 0; pointer-events: none;
      overflow: visible; z-index: 400;
      will-change: transform;
    }
    #pp-canvas.pp-panning {
      transition: transform 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    /* Morph transitions: fire when pp-zoom-morphing is active */
    #pp-canvas.pp-zoom-morphing .pp-card {
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1),
                  border-radius 0.45s ease,
                  background-color 0.4s ease,
                  box-shadow 0.4s ease,
                  padding 0.4s ease;
    }
    #pp-canvas.pp-zoom-morphing .pp-card-img-wrap {
      transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    #pp-canvas.pp-zoom-morphing .pp-close-btn,
    #pp-canvas.pp-zoom-morphing .pp-card-quote,
    #pp-canvas.pp-zoom-morphing .pp-readmore-row {
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
    }
    #pp-canvas.pp-zoom-morphing .pp-card-thumb-label {
      transition: opacity 0.35s ease, max-height 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    #pp-canvas.pp-zoom-morphing .pp-card-dot-label {
      transition: opacity 0.35s ease 0.35s;
    }
    #pp-canvas.pp-zoom-morphing .pp-node {
      transition: background-color 0.35s ease, border-color 0.35s ease;
    }
    #pp-canvas.pp-zoom-morphing .pp-node img {
      transition: opacity 0.3s ease, max-height 0.4s cubic-bezier(0.4,0,0.2,1),
                  width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #pp-canvas.pp-zoom-morphing .pp-node-dot {
      transition: width 0.45s cubic-bezier(0.34,1.1,0.64,1),
                  height 0.45s cubic-bezier(0.34,1.1,0.64,1),
                  opacity 0.3s ease;
    }
    #pp-canvas.pp-zoom-morphing .pp-caption {
      transition: opacity 0.3s ease;
    }
    @media (prefers-reduced-motion: reduce) {
      #pp-canvas.pp-zoom-morphing .pp-card,
      #pp-canvas.pp-zoom-morphing .pp-card-img-wrap,
      #pp-canvas.pp-zoom-morphing .pp-close-btn,
      #pp-canvas.pp-zoom-morphing .pp-card-quote,
      #pp-canvas.pp-zoom-morphing .pp-readmore-row,
      #pp-canvas.pp-zoom-morphing .pp-card-thumb-label,
      #pp-canvas.pp-zoom-morphing .pp-card-dot-label,
      #pp-canvas.pp-zoom-morphing .pp-node,
      #pp-canvas.pp-zoom-morphing .pp-node img,
      #pp-canvas.pp-zoom-morphing .pp-node-dot,
      #pp-canvas.pp-zoom-morphing .pp-caption { transition: none; }
      #pp-canvas.pp-panning { transition: none; }
    }
    #pp-graph {
      position: absolute; left: 0; top: 0;
      width: 1px; height: 1px; overflow: visible; pointer-events: none;
    }
    .pp-card-anchor { position: absolute; width: 0; height: 0; overflow: visible; }
    .pp-card {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 277px;
      background: #fff;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.06), 0 0 16px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; align-items: flex-end;
      padding: 6px 12px 12px;
      pointer-events: auto;
      animation: pp-fadein 0.18s ease-out;
    }
    @keyframes pp-fadein {
      from { opacity: 0; transform: translate(-50%, -48%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }
    .pp-close-btn {
      width: 32px; height: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; padding: 5px;
      border-radius: 2px; color: #54595d; font-size: 18px; line-height: 1;
      overflow: hidden; max-height: 42px;
    }
    .pp-close-btn:hover { background: rgba(0,0,0,0.04); }
    .pp-card-body { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .pp-card-img-wrap {
      width: 100%; height: 138px;
      border-radius: 2px; overflow: hidden;
      background: #eaecf0; flex-shrink: 0;
    }
    .pp-card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pp-card-quote { width: 100%; padding: 0 8px 4px; overflow: hidden; max-height: 220px; }
    .pp-quote-icon { display: block; margin-bottom: 3px; }
    .pp-card-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px; line-height: 22px; color: #202122;
    }
    .pp-card-text b { font-weight: bold; font-family: Georgia, 'Times New Roman', serif; }
    .pp-readmore-row {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 4px; width: 100%; padding-top: 6px;
      overflow: hidden; max-height: 42px;
    }
    .pp-readmore {
      color: #3366cc; font-size: 14px; line-height: 20px;
      text-decoration: none; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .pp-node {
      position: absolute; opacity: 0;
      background: #fff; border: 1px solid #c8ccd1;
      border-radius: 2px; overflow: hidden;
      will-change: transform, opacity;
      pointer-events: auto;
    }
    .pp-node img { width: 100%; display: block; object-fit: cover; max-height: 500px; overflow: hidden; }
    .pp-caption {
      font-size: 11px; line-height: 14px; color: #202122;
      padding: 3px 4px;
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
      overflow: hidden;
    }
    @keyframes pp-bloom {
      0%   { opacity: 0; transform: scale(0.1) rotate(var(--bloom-rot, 0deg)); }
      65%  { opacity: 1; transform: scale(1.07) rotate(0deg); }
      100% { opacity: 1; transform: scale(1)    rotate(0deg); }
    }
    a.pp-active-link { background: rgba(51,102,204,0.1); }

    /* ── Zoom control button ───────────────────────────────── */
    #pp-close-graph {
      position: fixed; top: 16px; right: 16px; z-index: 410;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: #f8f9fa; border: 1px solid #72777d;
      border-radius: 2px; cursor: pointer;
      color: #202122; font-size: 16px; line-height: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      transition: background 0.1s;
    }
    #pp-close-graph:hover { background: #eaecf0; }
    #pp-close-graph:active { background: #dadde3; }
    #pp-zoom-ctrl {
      position: fixed; bottom: 66px; right: 16px; z-index: 406;
      display: flex; flex-direction: row;
      background: #fff; border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      overflow: hidden; border: 1px solid #c8ccd1;
    }
    #pp-zoom-in, #pp-zoom-out {
      width: 40px; height: 36px; border: none; background: transparent;
      font-size: 18px; cursor: pointer; color: #202122;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }
    #pp-zoom-in { border-right: 1px solid #c8ccd1; }
    #pp-zoom-in:hover:not(:disabled), #pp-zoom-out:hover:not(:disabled) { background: #f8f9fa; }
    #pp-zoom-in:disabled, #pp-zoom-out:disabled { opacity: 0.3; cursor: default; }

    /* ── Zoom level representations ────────────────────────── */

    /* Node dot: hidden at zoom 0, grows into view at zoom -1/-2 */
    .pp-node-dot {
      width: 0; height: 0; opacity: 0;
      border-radius: 50%; background: #3366cc; flex-shrink: 0;
    }
    /* Thumb label on compact card: hidden at zoom 0 */
    .pp-card-thumb-label {
      font-size: 11px; line-height: 14px;
      padding: 4px 6px; color: #202122;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      opacity: 0; max-height: 0;
    }
    /* Dot label beside shrunken card: always flex, hidden at zoom 0/-1 */
    .pp-card-dot-label {
      display: flex; align-items: center; gap: 5px;
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      white-space: nowrap; font-size: 11px; color: #3366cc; pointer-events: none;
      background: rgba(255,255,255,0.92); padding: 2px 5px; border-radius: 3px;
      opacity: 0;
    }

    /* Zoom −1: card → compact thumb */
    .pp-zoom-m1 .pp-card { width: 130px; padding: 4px; }
    .pp-zoom-m1 .pp-close-btn { max-height: 0; opacity: 0; pointer-events: none; }
    .pp-zoom-m1 .pp-card-quote { max-height: 0; opacity: 0; pointer-events: none; }
    .pp-zoom-m1 .pp-readmore-row { max-height: 0; opacity: 0; pointer-events: none; }
    .pp-zoom-m1 .pp-card-img-wrap { height: 88px; }
    .pp-zoom-m1 .pp-card-thumb-label { opacity: 1; max-height: 30px; }

    /* Zoom −1: node → labeled dot */
    .pp-zoom-m1 .pp-node {
      background: transparent; border-color: transparent; overflow: visible;
      display: flex !important; align-items: center; gap: 5px;
      width: auto !important; height: auto !important;
    }
    .pp-zoom-m1 .pp-node img { opacity: 0; max-height: 0; width: 0; overflow: hidden; }
    .pp-zoom-m1 .pp-node-dot { width: 12px; height: 12px; opacity: 1; }
    .pp-zoom-m1 .pp-caption {
      -webkit-line-clamp: 1; color: #3366cc; white-space: nowrap; overflow: hidden;
      background: rgba(255,255,255,0.92); padding: 2px 4px; border-radius: 3px;
    }

    /* Zoom −2: card → dot */
    .pp-zoom-m2 .pp-card {
      width: 14px; height: 14px; border-radius: 50%;
      background: #3366cc; box-shadow: none; border: none;
      padding: 0; overflow: visible;
    }
    .pp-zoom-m2 .pp-card > * { opacity: 0; pointer-events: none; }
    .pp-zoom-m2 .pp-card-dot-label { opacity: 1; pointer-events: auto; cursor: pointer; }

    /* Zoom −2: node → bare dot */
    .pp-zoom-m2 .pp-node {
      background: transparent; border-color: transparent; overflow: visible;
      display: flex !important; align-items: center;
      width: auto !important; height: auto !important;
    }
    .pp-zoom-m2 .pp-node img { opacity: 0; max-height: 0; width: 0; overflow: hidden; }
    .pp-zoom-m2 .pp-node-dot { width: 12px; height: 12px; opacity: 1; }
    .pp-zoom-m2 .pp-caption { opacity: 0; }

    /* ── History chips bar ─────────────────────────────────── */
    #pp-history-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 404;
      height: 54px;
      display: flex; align-items: flex-start; flex-direction: row;
      gap: 6px; padding: 8px 12px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      scroll-behavior: smooth;
      background: rgba(255,255,255,0.95);
      border-top: 1px solid #c8ccd1;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    #pp-history-bar::-webkit-scrollbar { display: none; }
    #pp-global-progress {
      position: absolute; top: 0; left: 0; height: 3px;
      background: #3366cc; width: 0%;
      transition: width 0.28s ease-out;
      pointer-events: none;
    }
    #pp-global-progress.pp-progress-done {
      opacity: 0;
      transition: width 0.28s ease-out, opacity 0.55s ease-out 0.35s;
    }
    .pp-chip {
      flex-shrink: 0;
      display: inline-flex; align-items: center;
      background: #f8f9fa; border: 1px solid #c8ccd1;
      border-radius: 12px; padding: 4px 10px;
      font-size: 12px; line-height: 16px; color: #202122;
      cursor: pointer; white-space: nowrap;
      max-width: 140px; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .pp-chip:hover { background: #eaecf0; }
    .pp-chip-active { background: rgba(51,102,204,0.08) !important; border-color: #3366cc !important; color: #3366cc; }
    .pp-node-seen { border-color: #3366cc !important; }

    /* ── States ─────────────────────────────────────────────── */
    .state-loading {
      padding: 80px 16px; text-align: center;
      color: #54595d; font-size: 14px;
    }
    .state-error {
      padding: 40px 16px; text-align: center;
      color: #b32424; font-size: 14px; line-height: 22px;
    }
    .state-empty {
      padding: 80px 16px; text-align: center;
      color: #72777d; font-size: 14px; line-height: 22px;
    }

    /* ── Explore onboarding dialog ──────────────────────────── */
    #explore-dlg-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.42);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      animation: pp-backdrop-in 0.22s ease-out;
    }
    #explore-dlg {
      width: 100%; max-width: 320px;
      background: #fff;
      border: 1px solid #dadde3;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      animation: explore-dlg-in 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes explore-dlg-in {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    #explore-dlg-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 0;
    }
    #explore-dlg-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px; line-height: 28px;
      color: #101418; font-weight: normal; margin: 0;
    }
    #explore-dlg-close {
      width: 32px; height: 32px; flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: #54595d; font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 2px;
    }
    #explore-dlg-close:hover { background: #f8f9fa; }
    #explore-dlg-preview {
      width: 100%; height: 192px;
      margin-top: 12px; overflow: hidden; position: relative;
    }
    #explore-dlg-body { padding: 16px; }
    #explore-dlg-text {
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 17px; line-height: 26.5px; color: #202122;
      margin: 0 0 16px;
    }
    #explore-dlg-btn {
      width: 100%; padding: 13px 16px;
      background: #3366cc; color: #fff;
      border: none; border-radius: 4px;
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.1s;
    }
    #explore-dlg-btn:hover  { background: #1a4fbf; }
    #explore-dlg-btn:active { background: #1040b0; }
  </style>
</head>

/* ────────────────────────────────────────────────────────────
   Utilities
──────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  if (!iso) return 'recently';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d < 1)  return 'today';
  if (d < 2)  return '1 day ago';
  if (d < 30) return `${d} days ago`;
  const mo = Math.floor(d / 30.4);
  if (mo < 2)  return '1 month ago';
  if (mo < 12) return `${mo} months ago`;
  const y = Math.floor(mo / 12);
  return y < 2 ? '1 year ago' : `${y} years ago`;
}

function isDecorative(src) {
  if (!src) return true;
  if (/\.svg(\?|$)/i.test(src)) return true;
  if (/[?&](width|height)=\d{1,2}[^0-9]/i.test(src)) return true;
  if (/1x1|pixel|blank/i.test(src)) return true;
  const m = src.match(/\/(\d+)px-/);
  return m ? parseInt(m[1], 10) < 100 : false;
}

/* ────────────────────────────────────────────────────────────
   Parse full article HTML into lead + sections
──────────────────────────────────────────────────────────── */
function parseArticleHTML(rawHTML) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(rawHTML, 'text/html');
  const output = doc.querySelector('.mw-parser-output') ?? doc.body;

  // Remove noise
  output.querySelectorAll(
    '.mw-editsection, .noprint, .navbox, .navigation-not-searchable, ' +
    '.mbox-small, .ambox, .tmbox, .sistersitebox, style, .shortdescription, .toc'
  ).forEach(el => el.remove());

  // Modern Wikipedia wraps headings in <div class="mw-heading mw-heading2">
  // Older articles use bare <h2> tags — handle both.
  const isH2 = el =>
    el.tagName === 'H2' ||
    (el.tagName === 'DIV' && el.classList.contains('mw-heading2'));

  const leadNodes    = [];
  const sectionNodes = []; // [{title, nodes}]
  let   current      = null;

  for (const child of Array.from(output.children)) {
    if (isH2(child)) {
      // Extract the heading text, stripping edit-section spans
      const h2 = child.querySelector('h2') ?? child;
      h2.querySelectorAll('.mw-editsection').forEach(el => el.remove());
      const heading = h2.innerHTML.trim();
      current = { title: heading, nodes: [] };
      sectionNodes.push(current);
    } else if (current) {
      current.nodes.push(child);
    } else {
      leadNodes.push(child);
    }
  }

  // Hoist first non-empty paragraph above the infobox
  let firstPara = '';
  const firstParaIdx = leadNodes.findIndex(
    n => n.tagName === 'P' && n.textContent.trim().length > 0
  );
  if (firstParaIdx !== -1) {
    firstPara = leadNodes[firstParaIdx].outerHTML;
    leadNodes.splice(firstParaIdx, 1);
  }

  const leadHTML = leadNodes.map(n => n.outerHTML).join('');
  const sections = sectionNodes.map(s => ({
    title: s.title,
    html:  s.nodes.map(n => n.outerHTML).join(''),
  }));

  return { leadHTML, sections, firstPara };
}

/* ────────────────────────────────────────────────────────────
   Image extraction from DOM nodes
──────────────────────────────────────────────────────────── */
function collectImages(leadHTML, sections) {
  const parser = new DOMParser();
  const seen   = new Set();
  const out    = [];

  const chunks = [leadHTML, ...sections.map(s => s.html)];

  for (const html of chunks) {
    if (!html) continue;
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('.infobox img, table.infobox img, .sidebar img, .taxobox img').forEach(el => el.remove());

    doc.querySelectorAll('img').forEach(img => {
      let src = img.getAttribute('src') ?? '';
      if (!src) return;
      if (src.startsWith('//')) src = 'https:' + src;
      if (!src.startsWith('http')) return;
      if (isDecorative(src)) return;

      const big = src.replace(/\/(\d+)px-/, '/250px-');
      if (seen.has(big)) return;
      seen.add(big);
      out.push({ src: big, alt: img.getAttribute('alt') ?? '' });
    });
  }

  return out;
}

/* ────────────────────────────────────────────────────────────
   Render helpers
──────────────────────────────────────────────────────────── */
function renderChips(langCount, commentCount) {
  return `
    <div class="article-chips">
      ${langCount ? `<span class="infochip">${SVG.translate} ${langCount} language${langCount !== 1 ? 's' : ''}</span>` : ''}
      ${commentCount ? `<span class="infochip">${SVG.comment} ${commentCount} comment${commentCount !== 1 ? 's' : ''}</span>` : ''}
    </div>`;
}

function renderGallery(images) {
  if (!images.length) return '';
  const imgs = images.map(i =>
    `<img class="gallery-img" src="${esc(i.src)}" alt="${esc(i.alt)}" loading="lazy">`
  ).join('');
  return `<div class="gallery-scroll"><div class="gallery-track">${imgs}</div></div>`;
}

function collectSubsections(sectionHTML) {
  if (!sectionHTML) return [];
  const parser = new DOMParser();
  const doc    = parser.parseFromString(sectionHTML, 'text/html');
  const out    = [];

  // Query only the heading elements themselves — querySelectorAll finds them
  // whether they are bare or nested inside modern mw-heading wrapper divs.
  // Querying the wrappers *and* the headings would double-count every entry.
  doc.body.querySelectorAll('h3, h4, h5, h6').forEach((h, idx) => {
    h.querySelectorAll('.mw-editsection').forEach(n => n.remove());
    const text = h.textContent.trim();
    if (text) out.push({ type: 'subsection', text, idx });
  });

  return out;
}

function collectSectionLinks(sectionHTML) {
  if (!sectionHTML) return [];
  const parser = new DOMParser();
  const doc    = parser.parseFromString(sectionHTML, 'text/html');

  // Remove citations, infoboxes, navboxes so we don't pick up their links
  doc.querySelectorAll('sup, .reference, .reflist, .infobox, table.infobox, .taxobox, .sidebar, .navbox').forEach(el => el.remove());

  const seen = new Set();
  const out  = [];

  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') ?? '';
    if (!href.startsWith('/wiki/')) return;
    if (/^\/wiki\/(Help|Wikipedia|Special|File|Category|Template|Talk):/.test(href)) return;

    const text = a.textContent.trim();
    if (!text || /^\[\d+\]$/.test(text)) return;

    const key = href.split('#')[0];
    if (seen.has(key)) return;
    seen.add(key);

    const isItalic = !!a.closest('i, em') || !!a.querySelector('i, em');
    out.push({ text, href: key, isItalic });
  });

  return out;
}

function renderAccordions(sections) {
  return sections.map((sec, idx) => {
    // Subsections come first, then regular wiki links fill any remaining space
    const subsections = collectSubsections(sec.html);
    const links       = collectSectionLinks(sec.html).map(l => ({ type: 'link', ...l }));
    const items       = [...subsections, ...links];
    const itemsAttr   = items.length > 0 ? ` data-items="${esc(JSON.stringify(items))}"` : '';

    return `
    <div class="acc-section" data-i="${idx}">
      <div class="acc-header">
        <button class="acc-btn" aria-expanded="false">
          <span class="acc-chevron">${SVG.chevron}</span>
          <div class="acc-title-group">
            <span class="acc-title">${sec.title}</span>
            ${items.length > 0 ? `<div class="acc-link-list"${itemsAttr}></div>` : ''}
          </div>
        </button>
        <div class="acc-divider"></div>
      </div>
      <div class="acc-body">
        <div class="art body">${sec.html}</div>
      </div>
    </div>`;
  }).join('');
}

function measureAndTruncateLinkLists(root) {
  // Tag every sub-heading in each section body so we can scroll/focus to it later.
  // tabIndex=-1 makes headings programmatically focusable without entering tab order.
  root.querySelectorAll('.acc-section').forEach(sec => {
    const body = sec.querySelector('.acc-body .art.body');
    if (!body) return;
    body.querySelectorAll('h3, h4, h5, h6').forEach((h, idx) => {
      h.dataset.subheadIdx = idx;
      h.tabIndex = -1;
    });
  });

  root.querySelectorAll('.acc-link-list[data-items]').forEach(container => {
    let items;
    try { items = JSON.parse(container.dataset.items); } catch(_) { return; }
    if (!items.length) return;

    function buildHTML(visible, remaining) {
      const parts = visible.map(item => {
        if (item.type === 'subsection') {
          return `<a href="#" data-subhead-idx="${item.idx}">${esc(item.text)}</a>`;
        }
        const style = item.isItalic ? ' style="font-style:italic"' : '';
        return `<a href="${esc(item.href)}"${style}>${esc(item.text)}</a>`;
      });
      if (remaining > 0) parts.push(`and ${remaining} more...`);
      return parts.join(' \u2022 ');
    }

    const twoLineH = 41; // 2 × 20px line-height + 1px tolerance

    // Test if all items fit in 2 lines
    container.innerHTML = buildHTML(items, 0);
    if (container.scrollHeight <= twoLineH) {
      wireAccLinks(container);
      return;
    }

    // Binary search: find max count that fits in 2 lines
    let lo = 1, hi = items.length - 1;
    while (lo < hi) {
      const mid = Math.ceil((lo + hi) / 2);
      container.innerHTML = buildHTML(items.slice(0, mid), items.length - mid);
      if (container.scrollHeight <= twoLineH) lo = mid; else hi = mid - 1;
    }
    container.innerHTML = buildHTML(items.slice(0, lo), items.length - lo);
    wireAccLinks(container);
  });
}

function wireAccLinks(container) {
  const sec = container.closest('.acc-section');

  function openAndScroll(target, block) {
    const wasOpen = sec && sec.classList.contains('open');
    if (sec && !wasOpen) {
      sec.classList.add('open');
      sec.querySelector('.acc-btn').setAttribute('aria-expanded', 'true');
    }
    // Small delay when opening lets the body paint before we measure positions
    setTimeout(() => {
      if (block === 'center') {
        // center is safe — the element ends up in the middle of the viewport,
        // well clear of the sticky header at the top
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        // 'start' would place the element flush at the top of the viewport,
        // directly behind the sticky control bar + sticky section header.
        // Measure both sticky layers and offset manually.
        const controlBar = document.getElementById('control-bar');
        const accHeader  = sec && sec.querySelector('.acc-header');
        const stickyH    = (controlBar ? controlBar.offsetHeight : 0)
                         + (accHeader  ? accHeader.offsetHeight  : 0);
        const top = target.getBoundingClientRect().top + window.scrollY - stickyH - 12;
        window.scrollTo({ top, behavior: 'smooth' });
      }
      setTimeout(() => target.focus({ preventScroll: true }), 350);
    }, wasOpen ? 0 : 50);
  }

  // Subsection heading links — scroll to the tagged <h3>/<h4>/etc. in the body
  container.querySelectorAll('a[data-subhead-idx]').forEach(a => {
    const idx = a.dataset.subheadIdx;
    a.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const body   = sec && sec.querySelector('.acc-body');
      const target = body && body.querySelector(`[data-subhead-idx="${idx}"]`);
      if (target) openAndScroll(target, 'start');
    });
  });

  // Wiki-link anchors — scroll to the matching link in the body
  container.querySelectorAll('a[href^="/wiki/"]').forEach(a => {
    const wikiHref = a.getAttribute('href');
    a.href = '#';
    a.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const body   = sec && sec.querySelector('.acc-body');
      const target = body && body.querySelector(`[data-wiki-href="${CSS.escape(wikiHref)}"]`);
      if (target) openAndScroll(target, 'center');
    });
  });
}

function collapseInfoboxes(root) {
  root.querySelectorAll('.art .infobox').forEach(table => {
    if (table.offsetHeight <= 750) return;

    // Wrap the table in a collapse container
    const wrap = document.createElement('div');
    wrap.className = 'infobox-wrap collapsed';
    table.parentNode.insertBefore(wrap, table);
    wrap.appendChild(table);

    // Gradient fade overlay — sits above the Read more button
    const fade = document.createElement('div');
    fade.className = 'infobox-fade';
    wrap.appendChild(fade);

    // Read more button — absolutely positioned at the bottom of the 500px window
    const btn = document.createElement('button');
    btn.className = 'infobox-read-more';
    btn.textContent = 'Read more';
    wrap.appendChild(btn);

    btn.addEventListener('click', () => {
      wrap.classList.remove('collapsed');
      fade.remove();
      btn.remove();
    });
  });
}

function renderRelated(pages) {
  if (!pages?.length) return '';
  const items = pages.slice(0, 3).map(p => {
    const thumb = p.thumbnail?.source
      ? `<img class="related-thumb" src="${esc(p.thumbnail.source)}" alt="" loading="lazy">`
      : `<div class="related-thumb-ph"></div>`;
    return `
      <div class="related-item">
        ${thumb}
        <div class="related-text">
          <div class="related-title">${p.displaytitle ?? esc(p.title ?? '')}</div>
          ${p.description ? `<div class="related-desc">${esc(p.description)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="foot-related">
      <div class="foot-related-label">Related pages</div>
      <div class="related-list">${items}</div>
    </div>`;
}

function renderLastEdited(timestamp, user) {
  if (!timestamp) return '';
  const name = (user ?? '').length > 14 ? user.slice(0, 14) + '…' : (user ?? '');
  const by   = name ? ` by ${esc(name)}` : '';
  return `
    <div class="foot-lastedit">
      <span class="foot-lastedit-icon">${SVG.history}</span>
      <span class="foot-lastedit-text">
        <strong>Last edited ${timeAgo(timestamp)}</strong>${by}
      </span>
      <span class="foot-lastedit-chev">${SVG.chevron}</span>
    </div>`;
}

/* ────────────────────────────────────────────────────────────
   Main render
──────────────────────────────────────────────────────────── */
function renderArticle({ title, displayTitle, langCount, commentCount, leadHTML, firstPara, sections, timestamp, user, related, dir, lang }) {
  _articleCtx = { lang, leadHTML, firstPara };
