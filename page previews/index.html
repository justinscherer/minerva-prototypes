/* ────────────────────────────────────────────────────────────
   Page preview knowledge graph
──────────────────────────────────────────────────────────── */
let _articleCtx = { lang: 'en', leadHTML: '', firstPara: '' };

const ppHistory = []; // { title, display } in visit order, populated on first thumbnail click
let ppCurrentTitle = null;

// ── Canvas world state ────────────────────────────────────────
let ppFocusX = 0, ppFocusY = 0;                      // world point currently at viewport centre
let ppZoomLevel = 0;                                  // 0, -1, or -2
let ppUserHasPanned = false;                          // true once user manually drags the canvas
let ppPanCleanup = null;                              // removes window pan listeners on clearCanvas
let ppPeekTitle  = null;                              // title currently shown in peek card (null = no peek)
let ppZoomAnimRAF = null;                             // RAF handle for in-progress zoom position animation

// ── Global loading progress ───────────────────────────────────
let ppTasksTotal = 0, ppTasksDone = 0;

function ppBeginLoad(n) {
  ppTasksTotal += (n || 1);
  renderGlobalProgress();
}
function ppEndLoad(n) {
  ppTasksDone = Math.min(ppTasksDone + (n || 1), ppTasksTotal);
  renderGlobalProgress();
}
function renderGlobalProgress() {
  const bar = document.getElementById('pp-global-progress');
  if (!bar) return;
  const pct = ppTasksTotal === 0 ? 0 : Math.min(100, Math.round((ppTasksDone / ppTasksTotal) * 100));
  bar.style.width = pct + '%';
  if (pct >= 100) bar.classList.add('pp-progress-done');
  else bar.classList.remove('pp-progress-done');
}
const ppCardMap  = new Map();  // title → { x, y, anchor }  (x,y = world centre of card)
const ppThumbMap = new Map();  // title → { x, y, size, cardH, parentTitle, el }
const ppAllConnections = new Set(); // every "t1|||t2" pair ever fetched

async function fetchPageSummary(lang, title) {
  const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('summary fetch failed');
  return res.json();
}

function extractFirstSentence(extractHtml) {
  const div = document.createElement('div');
  div.innerHTML = extractHtml;
  div.querySelectorAll('a').forEach(a => a.replaceWith(document.createTextNode(a.textContent)));
  const p = div.querySelector('p');
  const html = p ? p.innerHTML : div.innerHTML;
  const m = html.search(/\.\s/);
  return m === -1 ? html : html.slice(0, m + 1);
}

function collectIntroLinks(firstPara, leadHTML) {
  const parser = new DOMParser();
  const seen = new Set();
  const links = [];
  [firstPara, leadHTML].forEach((html, chunkIdx) => {
    if (!html) return;
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('sup,.reference,.reflist,.infobox,table.infobox,.taxobox,.sidebar,.navbox').forEach(el => el.remove());
    doc.querySelectorAll('p').forEach((p, pIdx) => {
      p.querySelectorAll('a[href^="/wiki/"]').forEach(a => {
        const href = a.getAttribute('href');
        if (/\/wiki\/(Help|Wikipedia|Special|File|Category|Template|Talk):/.test(href)) return;
        const text = a.textContent.trim();
        if (!text || /^\[\d+\]$/.test(text)) return;
        const t = decodeURIComponent(href.split('#')[0].slice(6));
        if (seen.has(t)) return;
        seen.add(t);
        links.push({ title: t, text, paraIdx: chunkIdx * 100 + pIdx });
      });
    });
  });
  return links;
}

function scoreNode(summary) {
  const desc = (summary.description || '').toLowerCase();
  if (/\b(born|actor|actress|singer|musician|composer|politician|scientist|writer|poet|director|athlete|inventor|engineer|philosopher)\b/.test(desc)) return 3;
  if (/\b(city|town|village|country|nation|state|province|region|district|island|mountain|river|lake|municipality)\b/.test(desc)) return 2;
  if (summary.thumbnail) return 1;
  return 0;
}

function addToHistory(title) {
  const display = title.replace(/_/g, ' ');
  if (ppHistory.some(h => h.title === title)) return;
  ppHistory.push({ title, display });
  renderHistoryBar(title);
}

function renderHistoryBar(activeTitle) {
  let bar = document.getElementById('pp-history-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'pp-history-bar';
    const progressEl = document.createElement('div');
    progressEl.id = 'pp-global-progress';
    bar.appendChild(progressEl);
    document.body.appendChild(bar);
    // Convert vertical mouse-wheel to horizontal scroll
    bar.addEventListener('wheel', e => {
      if (e.deltaY !== 0) {
        e.preventDefault();
        bar.scrollLeft += e.deltaY;
      }
    }, { passive: false });
  }
  // Remove only chips — preserve the progress bar element
  bar.querySelectorAll('.pp-chip').forEach(c => c.remove());
  ppHistory.forEach(h => {
    const chip = document.createElement('div');
    chip.className = 'pp-chip' + (h.title === activeTitle ? ' pp-chip-active' : '');
    chip.textContent = h.display;
    chip.title = h.display;
    chip.addEventListener('click', () => showPagePreview(h.title, chip, true));
    bar.appendChild(chip);
  });
  requestAnimationFrame(() => { bar.scrollLeft = bar.scrollWidth; });
}

// ── Canvas management ─────────────────────────────────────────

function ensureCanvas() {
  if (document.getElementById('pp-canvas')) return;

  const backdrop = document.createElement('div');
  backdrop.id = 'pp-backdrop';

  // ── Pan-by-drag (mouse + touch) + pinch-to-zoom ─────────────
  // Pan works anywhere in the graph area (cards, nodes, dots, empty space).
  // A movement threshold separates drag-to-pan from tap-to-interact.
  let dragging = false, panMoved = false, startX = 0, startY = 0, focusX0 = 0, focusY0 = 0;
  let pinching = false, pinchStartDist = 0, pinchLevelAtStart = 0;
  let mouseDidPan = false; // used to swallow the post-drag click

  const PAN_THRESHOLD = 6; // px before drag is confirmed as a pan
  const getPinchDist = t => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);

  // Returns true when the event target is inside the pannable graph area
  // (excludes fixed UI controls that must handle their own interactions)
  const isGraphArea = el => {
    for (let cur = el; cur && cur !== document.body; cur = cur.parentElement) {
      const id = cur.id;
      if (id === 'pp-history-bar' || id === 'pp-close-graph' || id === 'pp-zoom-ctrl') return false;
    }
    return true;
  };

  const beginDrag = (cx, cy) => {
    dragging = true; panMoved = false;
    startX = cx; startY = cy;
    focusX0 = ppFocusX; focusY0 = ppFocusY;
    document.body.style.userSelect = 'none';
  };
  const moveDrag = (cx, cy) => {
    if (!dragging) return;
    const dx = cx - startX, dy = cy - startY;
    if (!panMoved) {
      if (Math.hypot(dx, dy) < PAN_THRESHOLD) return;
      panMoved = true;
      mouseDidPan = true;
      document.body.style.cursor = 'grabbing';
    }
    ppUserHasPanned = true;
    ppFocusX = focusX0 - dx;
    ppFocusY = focusY0 - dy;
    applyCanvasTransform(false);
  };
  const endDrag = () => {
    const wasPanning = panMoved;
    dragging = false; panMoved = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // If no movement happened mouseDidPan is already false; if it happened
    // let onClickCapture reset it (with safety timeout fallback)
    if (!wasPanning) mouseDidPan = false;
    else setTimeout(() => { mouseDidPan = false; }, 300);
  };

  // Mouse: listen at window level so drag works starting from any element
  const onMouseDown = e => {
    if (e.button !== 0 || !isGraphArea(e.target)) return;
    beginDrag(e.clientX, e.clientY);
  };
  const onMouseMove = e => moveDrag(e.clientX, e.clientY);
  const onMouseUp   = () => endDrag();

  // Swallow the click that fires after a mouse drag-pan (capture phase runs first)
  const onClickCapture = e => {
    if (mouseDidPan && isGraphArea(e.target)) {
      e.stopPropagation();
      e.preventDefault();
      mouseDidPan = false;
    }
  };

  // Touch: listen on document so all elements are covered
  const onDocTouchStart = e => {
    if (!isGraphArea(e.target)) return;
    if (e.touches.length === 1) {
      pinching = false;
      beginDrag(e.touches[0].clientX, e.touches[0].clientY);
    } else if (e.touches.length === 2) {
      dragging = false; panMoved = false;
      pinching = true;
      pinchStartDist = getPinchDist(e.touches);
      pinchLevelAtStart = ppZoomLevel;
      e.preventDefault(); // prevent browser native pinch-zoom
    }
  };
  const onTouchMove = e => {
    if (e.touches.length === 1 && dragging && !pinching) {
      moveDrag(e.touches[0].clientX, e.touches[0].clientY);
      if (panMoved) e.preventDefault(); // lock in pan, suppress synthetic click
    } else if (e.touches.length === 2 && pinching) {
      const ratio = getPinchDist(e.touches) / pinchStartDist;
      const newLevel = ratio > 1.35 ? Math.min(0, pinchLevelAtStart + 1)
                     : ratio < 0.72 ? Math.max(-2, pinchLevelAtStart - 1)
                     : pinchLevelAtStart;
      if (newLevel !== ppZoomLevel) setZoomLevel(newLevel);
      e.preventDefault();
    }
  };
  const onTouchEnd = e => {
    if (e.touches.length < 2) pinching = false;
    if (e.touches.length === 0) endDrag();
  };

  window.addEventListener('mousedown',  onMouseDown);
  window.addEventListener('mousemove',  onMouseMove);
  window.addEventListener('mouseup',    onMouseUp);
  window.addEventListener('touchmove',  onTouchMove,      { passive: false });
  window.addEventListener('touchend',   onTouchEnd);
  document.addEventListener('touchstart',  onDocTouchStart, { passive: false });
  document.addEventListener('click',       onClickCapture,  true);

  ppPanCleanup = () => {
    window.removeEventListener('mousedown',  onMouseDown);
    window.removeEventListener('mousemove',  onMouseMove);
    window.removeEventListener('mouseup',    onMouseUp);
    window.removeEventListener('touchmove',  onTouchMove);
    window.removeEventListener('touchend',   onTouchEnd);
    document.removeEventListener('touchstart',  onDocTouchStart);
    document.removeEventListener('click',       onClickCapture, true);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  };
  // ─────────────────────────────────────────────────────────────

  document.body.appendChild(backdrop);
  const canvas = document.createElement('div');
  canvas.id = 'pp-canvas';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'pp-graph';
  canvas.appendChild(svg);
  document.body.appendChild(canvas);

  // Zoom control buttons
  const closeGraph = document.createElement('button');
  closeGraph.id = 'pp-close-graph';
  closeGraph.setAttribute('aria-label', 'Close graph');
  closeGraph.innerHTML = '&#x2715;';
  closeGraph.addEventListener('click', closePagePreview);
  document.body.appendChild(closeGraph);

  const zoomCtrl = document.createElement('div');
  zoomCtrl.id = 'pp-zoom-ctrl';
  zoomCtrl.innerHTML = '<button id="pp-zoom-in" aria-label="Zoom in">+</button><button id="pp-zoom-out" aria-label="Zoom out">−</button>';
  document.body.appendChild(zoomCtrl);
  document.getElementById('pp-zoom-in').addEventListener('click', () => setZoomLevel(ppZoomLevel + 1));
  document.getElementById('pp-zoom-out').addEventListener('click', () => setZoomLevel(ppZoomLevel - 1));
  setZoomLevel(0);

  // Ensure history bar exists with global progress bar from the start
  if (!document.getElementById('pp-history-bar')) {
    const bar = document.createElement('div');
    bar.id = 'pp-history-bar';
    const progressEl = document.createElement('div');
    progressEl.id = 'pp-global-progress';
    bar.appendChild(progressEl);
    document.body.appendChild(bar);
  }
}

function applyCanvasTransform(animate) {
  const canvas = document.getElementById('pp-canvas');
  if (!canvas) return;
  const vpW = window.innerWidth, vpH = window.innerHeight;
  if (animate) {
    canvas.classList.add('pp-panning');
    canvas.addEventListener('transitionend', e => {
      if (e.propertyName === 'transform') canvas.classList.remove('pp-panning');
    }, { once: true });
  } else {
    canvas.classList.remove('pp-panning');
  }
  canvas.style.transform = `translate(${vpW / 2 - ppFocusX}px, ${vpH / 2 - ppFocusY}px)`;
}

function panTo(wx, wy) {
  ppFocusX = wx; ppFocusY = wy;
  applyCanvasTransform(true);
}

function fitCardAndChildren(title) {
  const card = title ? ppCardMap.get(title) : null;
  if (!card || card.animating) { fitElementsInView(); return; }
  let minX = card.x - CARD_W / 2, maxX = card.x + CARD_W / 2;
  let minY = card.y - CARD_H_EST / 2, maxY = card.y + CARD_H_EST / 2;
  for (const [, thumb] of ppThumbMap) {
    if (thumb.parentTitle !== title || !thumb.bloomed) continue;
    minX = Math.min(minX, thumb.x); maxX = Math.max(maxX, thumb.x + thumb.size);
    minY = Math.min(minY, thumb.y); maxY = Math.max(maxY, thumb.y + thumb.cardH);
  }
  panTo((minX + maxX) / 2, (minY + maxY) / 2);
}

function fitElementsInView() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const [, card] of ppCardMap) {
    if (card.animating) continue;
    minX = Math.min(minX, card.x - CARD_W / 2); maxX = Math.max(maxX, card.x + CARD_W / 2);
    minY = Math.min(minY, card.y - CARD_H_EST / 2); maxY = Math.max(maxY, card.y + CARD_H_EST / 2);
  }
  for (const [, thumb] of ppThumbMap) {
    if (!thumb.bloomed) continue;
    minX = Math.min(minX, thumb.x); maxX = Math.max(maxX, thumb.x + thumb.size);
    minY = Math.min(minY, thumb.y); maxY = Math.max(maxY, thumb.y + thumb.cardH);
  }
  if (minX === Infinity) return;
  panTo((minX + maxX) / 2, (minY + maxY) / 2);
}

function repositionLabels() {
  if (ppZoomLevel !== -1) return;
  // Reset any previous nudges so we measure from baseline positions
  document.querySelectorAll('#pp-canvas .pp-node .pp-caption').forEach(el => {
    el.style.transform = '';
  });

  const nodes = [...document.querySelectorAll('#pp-canvas .pp-node')];

  // Labels — can be nudged vertically
  const labels = nodes.map(node => {
    const caption = node.querySelector('.pp-caption');
    if (!caption) return null;
    const r = caption.getBoundingClientRect();
    if (r.width === 0 && r.height === 0) return null;
    return { caption, x: r.left, y: r.top, w: r.width, h: r.height, nudge: 0 };
  }).filter(Boolean);

  // Dots — fixed obstacles (never move)
  const dots = nodes.map(node => {
    const dot = node.querySelector('.pp-node-dot');
    if (!dot) return null;
    const r = dot.getBoundingClientRect();
    if (r.width === 0 && r.height === 0) return null;
    return { x: r.left, y: r.top, w: r.width, h: r.height };
  }).filter(Boolean);

  if (labels.length < 1) return;

  const PAD = 3;
  const xOverlap = (ax, aw, bx, bw) => ax < bx + bw + PAD && ax + aw + PAD > bx;

  for (let iter = 0; iter < 100; iter++) {
    let moved = false;

    // Label ↔ label: push both equally
    for (let i = 0; i < labels.length; i++) {
      for (let j = i + 1; j < labels.length; j++) {
        const a = labels[i], b = labels[j];
        if (!xOverlap(a.x, a.w, b.x, b.w)) continue;
        const aTop = a.y + a.nudge, bTop = b.y + b.nudge;
        const aBot = aTop + a.h,    bBot = bTop + b.h;
        if (aTop >= bBot + PAD || bTop >= aBot + PAD) continue;
        const overlap = (Math.min(aBot, bBot) - Math.max(aTop, bTop) + PAD) / 2;
        if (aTop <= bTop) { a.nudge -= overlap; b.nudge += overlap; }
        else              { a.nudge += overlap; b.nudge -= overlap; }
        moved = true;
      }
    }

    // Label ↔ dot: label moves, dot stays fixed
    for (const label of labels) {
      for (const dot of dots) {
        if (!xOverlap(label.x, label.w, dot.x, dot.w)) continue;
        const lTop = label.y + label.nudge, lBot = lTop + label.h;
        if (lTop >= dot.y + dot.h + PAD || dot.y >= lBot + PAD) continue;
        // Full overlap pushed onto label alone
        const overlap = Math.min(lBot, dot.y + dot.h) - Math.max(lTop, dot.y) + PAD;
        const lCy = lTop + label.h / 2, dCy = dot.y + dot.h / 2;
        label.nudge += lCy <= dCy ? -overlap : overlap;
        moved = true;
      }
    }

    if (!moved) break;
  }

  labels.forEach(({ caption, nudge }) => {
    caption.style.transform = Math.abs(nudge) > 0.5 ? `translateY(${nudge}px)` : '';
  });
}

function setZoomLevel(level) {
  const oldLevel = ppZoomLevel;
  const oldScale = ZOOM_POSITION_SCALES[-ppZoomLevel];
  ppZoomLevel = Math.max(-2, Math.min(0, level));
  const newScale = ZOOM_POSITION_SCALES[-ppZoomLevel];

  const canvas = document.getElementById('pp-canvas');

  const btnIn  = document.getElementById('pp-zoom-in');
  const btnOut = document.getElementById('pp-zoom-out');
  if (btnIn)  btnIn.disabled  = ppZoomLevel >= 0;
  if (btnOut) btnOut.disabled = ppZoomLevel <= -2;

  if (oldScale === newScale) return;
  if (!canvas) return;

  // Cancel any in-progress zoom animation
  if (ppZoomAnimRAF) { cancelAnimationFrame(ppZoomAnimRAF); ppZoomAnimRAF = null; }
  // Remove CSS canvas transition — we drive the transform manually in the RAF loop
  canvas.classList.remove('pp-panning');

  // Compute target focus:
  // if user hasn't manually panned → snap to last-opened card at new scale
  // otherwise → preserve the logical centre (scale focus proportionally)
  let tFocusX = (ppFocusX / oldScale) * newScale;
  let tFocusY = (ppFocusY / oldScale) * newScale;
  if (!ppUserHasPanned && ppCurrentTitle) {
    const anchor = ppCardMap.get(ppCurrentTitle);
    if (anchor && !anchor.animating) {
      tFocusX = anchor.logicalX * newScale;
      tFocusY = anchor.logicalY * newScale;
    }
  }

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const DURATION = reducedMotion ? 0 : 620;

  // Snapshot start state (may be mid-animation from a previous zoom)
  const sFocusX = ppFocusX, sFocusY = ppFocusY;
  const cardStarts  = new Map([...ppCardMap ].filter(([,c]) => !c.animating).map(([t,c])  => [t, {x:c.x,  y:c.y }]));
  const thumbStarts = new Map([...ppThumbMap].map(([t,th]) => [t, {x:th.x, y:th.y}]));

  // Compute exact target positions for each element
  const cardTargets  = new Map([...ppCardMap ].filter(([,c]) => !c.animating).map(([t,c])  => [t, {x:c.logicalX*newScale,              y:c.logicalY*newScale}]));
  const thumbTargets = new Map([...ppThumbMap].map(([t,th]) => [t, {
    x:    Math.round(th.logicalX    * newScale),
    y:    Math.round(th.logicalY    * newScale),
    size: Math.round(th.logicalSize * newScale),
    cardH:Math.round(th.logicalCardH* newScale)
  }]));

  // Pre-update size/cardH in live map so thumbCtr() in redrawAllLines is correct
  for (const [t, tgt] of thumbTargets) {
    const th = ppThumbMap.get(t); if (th) { th.size = tgt.size; th.cardH = tgt.cardH; }
  }

  // Clear label nudge transforms when leaving zoom -1
  if (oldLevel === -1) {
    document.querySelectorAll('#pp-canvas .pp-node .pp-caption').forEach(el => el.style.transform = '');
  }

  // Enable CSS shape-morph transitions (width/border-radius/dot grow/img collapse etc.)
  if (!reducedMotion) canvas.classList.add('pp-zoom-morphing');

  const vpW = window.innerWidth, vpH = window.innerHeight;
  const easeInOut = t => t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
  const lerp = (a, b, t) => a + (b - a) * t;

  // Writes a single interpolated frame (0=start, 1=end) to DOM + lines
  function applyIntermediate(t) {
    ppFocusX = lerp(sFocusX, tFocusX, t);
    ppFocusY = lerp(sFocusY, tFocusY, t);
    canvas.style.transform = `translate(${vpW/2 - ppFocusX}px, ${vpH/2 - ppFocusY}px)`;

    for (const [title, tgt] of cardTargets) {
      const card = ppCardMap.get(title); if (!card) continue;
      const s = cardStarts.get(title);  if (!s) continue;
      card.x = lerp(s.x, tgt.x, t);
      card.y = lerp(s.y, tgt.y, t);
      card.anchor.style.left = card.x + 'px';
      card.anchor.style.top  = card.y + 'px';
    }
    for (const [title, tgt] of thumbTargets) {
      const th = ppThumbMap.get(title); if (!th) continue;
      const s = thumbStarts.get(title); if (!s) continue;
      th.x = lerp(s.x, tgt.x, t);
      th.y = lerp(s.y, tgt.y, t);
      th.el.style.left = th.x + 'px';
      th.el.style.top  = th.y + 'px';
    }

    redrawAllLines();
  }

  // Snaps everything to exact final values and cleans up
  function finalize() {
    ppFocusX = tFocusX; ppFocusY = tFocusY;
    canvas.style.transform = `translate(${vpW/2 - ppFocusX}px, ${vpH/2 - ppFocusY}px)`;
    for (const [t, tgt] of cardTargets) {
      const card = ppCardMap.get(t); if (!card) continue;
      card.x = tgt.x; card.y = tgt.y;
      card.anchor.style.left = card.x + 'px';
      card.anchor.style.top  = card.y + 'px';
    }
    for (const [t, tgt] of thumbTargets) {
      const th = ppThumbMap.get(t); if (!th) continue;
      th.x = tgt.x; th.y = tgt.y;
      th.el.style.left  = th.x + 'px';
      th.el.style.top   = th.y + 'px';
      th.el.style.width = th.size + 'px';
      const img = th.el.querySelector('img');
      if (img) img.style.height = th.size + 'px';
    }
    canvas.classList.remove('pp-zoom-morphing');
    redrawAllLines();
    if (ppZoomLevel === -1) repositionLabels();
    ppZoomAnimRAF = null;
  }

  // Switch zoom class one frame AFTER pp-zoom-morphing is committed, so the
  // browser sees the "before" state first and CSS transitions fire correctly
  requestAnimationFrame(() => {
    canvas.classList.remove('pp-zoom-0', 'pp-zoom-m1', 'pp-zoom-m2');
    canvas.classList.add(['pp-zoom-0', 'pp-zoom-m1', 'pp-zoom-m2'][-ppZoomLevel]);

    if (DURATION === 0) { finalize(); return; }

    const startTime = performance.now();
    function tick(now) {
      const raw = Math.min((now - startTime) / DURATION, 1);
      applyIntermediate(easeInOut(raw));
      if (raw < 1) {
        ppZoomAnimRAF = requestAnimationFrame(tick);
      } else {
        finalize();
      }
    }
    ppZoomAnimRAF = requestAnimationFrame(tick);
  });
}

function clearCanvas() {
  ppPanCleanup?.(); ppPanCleanup = null;
  document.getElementById('pp-backdrop')?.remove();
  document.getElementById('pp-canvas')?.remove();
  document.getElementById('pp-close-graph')?.remove();
  document.getElementById('pp-zoom-ctrl')?.remove();
  ppCardMap.clear();
  ppThumbMap.clear();
  ppAllConnections.clear();
  ppFocusX = 0; ppFocusY = 0;
  ppZoomLevel = 0;
  ppUserHasPanned = false;
  ppTasksTotal = 0; ppTasksDone = 0;
  document.querySelectorAll('a.pp-active-link').forEach(a => a.classList.remove('pp-active-link'));
}

function closePagePreview() { clearCanvas(); }

function removeCard(title) {
  const entry = ppCardMap.get(title);
  if (!entry) return;
  entry.anchor.remove();
  ppCardMap.delete(title);
  for (const [t, thumb] of ppThumbMap) {
    if (thumb.parentTitle === title) { thumb.el.remove(); ppThumbMap.delete(t); }
  }
  redrawAllLines();
  if (ppCardMap.size === 0) clearCanvas();
}

function redrawAllLines() {
  const svg = document.getElementById('pp-graph');
  if (!svg) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const addLine = (x1, y1, x2, y2, stroke = '#3366cc', width = 1, opacity = 0.65) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', stroke);
    line.setAttribute('stroke-width', width);
    line.setAttribute('opacity', opacity);
    svg.appendChild(line);
  };

  const norm = t => t.toLowerCase().replace(/_/g, ' ');
  const connected = (a, b) => ppAllConnections.has([norm(a), norm(b)].sort().join('|||'));

  // Only draw lines to/from thumbs that have fully bloomed (visible on canvas)
  const bloomedThumbs = new Map([...ppThumbMap].filter(([, t]) => t.bloomed));
  // Only draw lines to/from cards that have finished their expansion animation
  const settledCards  = new Map([...ppCardMap].filter(([, c]) => !c.animating));

  const thumbCtr = th => ppZoomLevel <= -1
    ? { cx: th.x + 6, cy: th.y + 6 }
    : { cx: th.x + th.size / 2, cy: th.y + th.cardH / 2 };

  // Card → its bloomed thumb nodes
  for (const [, thumb] of bloomedThumbs) {
    const pc = settledCards.get(thumb.parentTitle);
    if (!pc) continue;
    const { cx, cy } = thumbCtr(thumb);
    addLine(pc.x, pc.y, cx, cy);
  }

  // Thumb ↔ thumb within same parent (Wikipedia-connected, both bloomed)
  const byParent = new Map();
  for (const [t, thumb] of bloomedThumbs) {
    if (!settledCards.has(thumb.parentTitle)) continue;
    const arr = byParent.get(thumb.parentTitle) || [];
    arr.push({ t, thumb }); byParent.set(thumb.parentTitle, arr);
  }
  for (const thumbs of byParent.values()) {
    for (let i = 0; i < thumbs.length - 1; i++)
      for (let j = i + 1; j < thumbs.length; j++) {
        if (!connected(thumbs[i].t, thumbs[j].t)) continue;
        const ac = thumbCtr(thumbs[i].thumb), bc = thumbCtr(thumbs[j].thumb);
        addLine(ac.cx, ac.cy, bc.cx, bc.cy);
      }
  }

  // Card ↔ card (settled cards only)
  const cardTitles = [...settledCards.keys()];
  for (let i = 0; i < cardTitles.length - 1; i++)
    for (let j = i + 1; j < cardTitles.length; j++) {
      if (!connected(cardTitles[i], cardTitles[j])) continue;
      const c1 = settledCards.get(cardTitles[i]), c2 = settledCards.get(cardTitles[j]);
      addLine(c1.x, c1.y, c2.x, c2.y, '#3366cc', 2, 0.85);
    }

  // Settled card ↔ bloomed thumb of a different settled card
  for (const [thumbTitle, thumb] of bloomedThumbs)
    for (const [cardTitle, card] of settledCards) {
      if (cardTitle === thumb.parentTitle) continue;
      if (!connected(thumbTitle, cardTitle)) continue;
      const { cx, cy } = thumbCtr(thumb);
      addLine(card.x, card.y, cx, cy, '#3366cc', 1, 0.45);
    }

  // Structural parent → child card connections (always drawn regardless of Wikipedia links)
  for (const [, childCard] of settledCards) {
    if (!childCard.parentCardTitle) continue;
    const parentCard = settledCards.get(childCard.parentCardTitle);
    if (!parentCard) continue;
    addLine(childCard.x, childCard.y, parentCard.x, parentCard.y, '#3366cc', 2, 0.85);
  }
}

// ── Collision detection helpers ───────────────────────────────

const CARD_W = 277, CARD_H_EST = 380;
const ZOOM_POSITION_SCALES = [1.0, 0.55, 0.30]; // indexed by -ppZoomLevel

function rectsOverlap(a, b, pad) {
  pad = pad || 0;
  return !(a.x + a.w + pad <= b.x || b.x + b.w + pad <= a.x ||
           a.y + a.h + pad <= b.y || b.y + b.h + pad <= a.y);
}

// Returns world-space bounding rects for all cards + thumbs,
// optionally excluding one card title (the one being placed).
function getOccupiedRects(excludeCardTitle) {
  const rects = [];
  const _zs = ZOOM_POSITION_SCALES[-ppZoomLevel];
  const cw = CARD_W * _zs, ch = CARD_H_EST * _zs;
  for (const [t, c] of ppCardMap) {
    if (t === excludeCardTitle) continue;
    rects.push({ x: c.x - cw / 2, y: c.y - ch / 2, w: cw, h: ch });
  }
  for (const [, th] of ppThumbMap) {
    rects.push({ x: th.x, y: th.y, w: th.size, h: th.cardH });
  }
  return rects;
}

// Finds nearest free world position for a new card.
function findFreeCardPos(preferX, preferY, excludeTitle) {
  const _zs = ZOOM_POSITION_SCALES[-ppZoomLevel];
  const PAD = 20 * _zs;
  const cardW = CARD_W * _zs, cardH = CARD_H_EST * _zs;
  // Step size slightly larger than card so adjacent ring slots never overlap
  const stepX = cardW + PAD, stepY = cardH + PAD;
  const existing = getOccupiedRects(excludeTitle);
  const tryPos = (cx, cy) => {
    const r = { x: cx - cardW / 2, y: cy - cardH / 2, w: cardW, h: cardH };
    return !existing.some(e => rectsOverlap(r, e, PAD));
  };
  if (tryPos(preferX, preferY)) return { wx: preferX, wy: preferY };
  // Sweep outward in rings; 24 angular samples per ring gives ~15° resolution
  // so valid gaps between closely-packed cards are reliably found.
  const ANGLES = 24;
  for (let ring = 1; ring <= 20; ring++) {
    for (let ai = 0; ai < ANGLES; ai++) {
      const angle = (2 * Math.PI * ai) / ANGLES;
      const dx = Math.round(Math.cos(angle) * ring * stepX);
      const dy = Math.round(Math.sin(angle) * ring * stepY);
      if (tryPos(preferX + dx, preferY + dy)) return { wx: preferX + dx, wy: preferY + dy };
    }
  }
  return { wx: preferX, wy: preferY };
}

// ── Open a single card at world position (wx, wy) ─────────────

// fromThumb: { x, y, size, cardH } world bbox of the thumbnail being expanded, or null
function openCard(title, wx, wy, lang, fromThumb, parentCardTitle) {
  if (ppCardMap.has(title)) { panTo(ppCardMap.get(title).x, ppCardMap.get(title).y); return; }

  const canvas = document.getElementById('pp-canvas');
  if (!canvas) return;
  const wikiUrl = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title)}`;

  const anchor = document.createElement('div');
  anchor.className = 'pp-card-anchor';
  anchor.style.left = wx + 'px';
  anchor.style.top  = wy + 'px';

  const card = document.createElement('div');
  card.className = 'pp-card';
  card.setAttribute('role', 'dialog');
  card.setAttribute('aria-label', 'Article preview');
  card.innerHTML = `
    <button class="pp-close-btn" aria-label="Close preview">&#x2715;</button>
    <div class="pp-card-body">
      <div class="pp-card-quote">
        <svg class="pp-quote-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.3 5.40001L7.2 3.60001H5.4C3.411 3.60001 1.8 6.11101 1.8 8.10001V14.4H8.1V8.10001H4.5C4.5 5.40001 6.3 5.40001 6.3 5.40001ZM12.6 8.10001C12.6 5.40001 14.4 5.40001 14.4 5.40001L15.3 3.60001H13.5C11.511 3.60001 9.9 6.11101 9.9 8.10001V14.4H16.2V8.10001H12.6Z" fill="#54595D"/></svg>
        <div class="pp-card-text">Loading\u2026</div>
      </div>
    </div>
    <div class="pp-readmore-row">
      <a class="pp-readmore" href="${wikiUrl}" target="_blank" rel="noopener">
        Read more
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path d="M8 1h5v5" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 1 L6 8" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6 3 H2 a1 1 0 0 0-1 1 V12 a1 1 0 0 0 1 1 H10 a1 1 0 0 0 1-1 V8" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
    <div class="pp-card-thumb-label">${title.replace(/_/g, ' ')}</div>
    <div class="pp-card-dot-label">${title.replace(/_/g, ' ')}</div>`;

  if (fromThumb) {
    // Anchor sits at final world pos; offset it to start above the thumbnail
    const thumbCX = fromThumb.x + fromThumb.size / 2;
    const thumbCY = fromThumb.y + fromThumb.cardH / 2;
    anchor.style.transform = `translate(${thumbCX - wx}px, ${thumbCY - wy}px)`;
    const scaleStart = Math.max(0.05, fromThumb.size / CARD_W);
    card.style.cssText += `animation:none; transform:translate(-50%,-50%) scale(${scaleStart}); opacity:0;`;
    anchor.appendChild(card);
    canvas.appendChild(anchor);
    // Mark animating so redrawAllLines skips this card until it settles
    { const _zs = ZOOM_POSITION_SCALES[-ppZoomLevel];
      ppCardMap.set(title, { x: wx, y: wy, logicalX: wx / _zs, logicalY: wy / _zs, anchor, animating: true, parentCardTitle: parentCardTitle || null }); }
    requestAnimationFrame(() => requestAnimationFrame(() => {
      anchor.style.transition = 'transform 0.52s cubic-bezier(0.4,0,0.2,1)';
      anchor.style.transform  = 'translate(0,0)';
      card.style.transition   = 'transform 0.52s cubic-bezier(0.34,1.06,0.64,1), opacity 0.22s ease-out';
      card.style.transform    = 'translate(-50%,-50%) scale(1)';
      card.style.opacity      = '1';
      card.addEventListener('transitionend', () => {
        card.style.transition = '';
        anchor.style.transition = '';
        const entry = ppCardMap.get(title);
        if (entry) { entry.animating = false; redrawAllLines(); }
      }, { once: true });
    }));
  } else {
    anchor.appendChild(card);
    canvas.appendChild(anchor);
    { const _zs = ZOOM_POSITION_SCALES[-ppZoomLevel];
      ppCardMap.set(title, { x: wx, y: wy, logicalX: wx / _zs, logicalY: wy / _zs, anchor, animating: false, parentCardTitle: parentCardTitle || null }); }
  }

  card.querySelector('.pp-close-btn').addEventListener('click', e => { e.stopPropagation(); removeCard(title); });
  card.querySelector('.pp-readmore').addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); navigateToArticle(title); });

  // At zoom -1/-2 the card is a compact thumb or dot — tapping it zooms back to
  // full view and centres on this card
  card.addEventListener('click', () => {
    if (ppZoomLevel === 0) return;
    ppCurrentTitle = title;
    ppUserHasPanned = false;
    setZoomLevel(0);
  });

  // Count this card's loading tasks globally: 1 summary + intro links batch + 1 connections fetch
  ppBeginLoad(2); // summary + connections; node batch added after intro links resolve

  // Populate card content; keep the promise so thumbs can wait on it.
  // Use then(ok, err) — NOT .then().catch() — so errors thrown inside the ok
  // handler don't fall into the error branch and falsely show "Preview unavailable."
  const summaryReady = fetchPageSummary(lang, title).then(
    data => {
      if (!document.contains(card)) return;
      try {
        if (data?.thumbnail?.source) {
          const imgWrap = document.createElement('div');
          imgWrap.className = 'pp-card-img-wrap';
          const img = document.createElement('img');
          img.className = 'pp-card-img';
          img.src = data.thumbnail.source; img.alt = '';
          imgWrap.appendChild(img);
          const body = card.querySelector('.pp-card-body');
          body?.insertBefore(imgWrap, card.querySelector('.pp-card-quote'));
        }
        const textEl = card.querySelector('.pp-card-text');
        if (textEl) {
          if (data?.extract_html) {
            textEl.innerHTML = extractFirstSentence(data.extract_html);
          } else if (data?.extract) {
            const safe = data.extract.replace(/&/g,'&amp;').replace(/</g,'&lt;');
            const t = title.replace(/_/g,' ').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            textEl.innerHTML = (safe.replace(/\.\s[\s\S]*/,'.') || safe).replace(new RegExp(t), '<b>$&</b>');
          }
        }
      } catch (_) { /* DOM error — don't show "Preview unavailable." */ }
      ppEndLoad(1);
    },
    () => {
      // Only real fetch/HTTP failures reach here
      if (document.contains(card)) {
        const textEl = card.querySelector('.pp-card-text');
        if (textEl) textEl.textContent = 'Preview unavailable.';
      }
      ppEndLoad(1);
    }
  );

  // Build knowledge graph — wait for summary before blooming thumbs
  fetchArticleIntroLinks(lang, title).then(introLinks => {
    const nodeCount = Math.min(30, introLinks.length);
    ppBeginLoad(nodeCount); // register each node summary as a task
    return Promise.allSettled(
      introLinks.slice(0, 30).map(lnk =>
        fetchPageSummary(lang, lnk.title)
          .then(s => { ppEndLoad(1); return { ...lnk, summary: s }; })
          .catch(() => { ppEndLoad(1); return null; })
      )
    );
  }).then(async results => {
    // Card content must be visible AND card animation must be done before thumbnails appear
    await summaryReady;
    if (!document.contains(card)) return;
    const animEntry = ppCardMap.get(title);
    if (animEntry?.animating) {
      await new Promise(resolve => card.addEventListener('transitionend', resolve, { once: true }));
    }
    if (!document.contains(card)) return;
    const nodes = results
      .filter(r => r.status === 'fulfilled' && r.value?.summary?.thumbnail)
      .map(r => r.value)
      .sort((a, b) => scoreNode(b.summary) - scoreNode(a.summary))
      .slice(0, 16);
    // Always fetch connections — even with no thumbnails, card-to-card lines still need it
    const nodeTitles = nodes.map(n => n.summary.title || n.title);
    const allTitles  = [...new Set([...nodeTitles, ...ppCardMap.keys(), ...ppThumbMap.keys()])];
    const conns = await fetchNodeConnections(lang, allTitles);
    conns.forEach(c => ppAllConnections.add(c));
    ppEndLoad(1); // connections done
    if (!document.contains(card)) return;
    // Draw card-to-card lines immediately (don't wait for thumb bloom)
    redrawAllLines();
    if (!nodes.length) return;
    requestAnimationFrame(() => {
      if (!document.contains(card)) return;
      const _cardEntry = ppCardMap.get(title);
      const _curWx = _cardEntry ? _cardEntry.x : wx;
      const _curWy = _cardEntry ? _cardEntry.y : wy;
      renderThumbNodes(nodes, _curWx, _curWy, title);
    });
  }).catch(() => { ppEndLoad(1); });
}

// ── Peek card (progressive disclosure) ───────────────────────

function hidePeekCard() {
  const peek = document.getElementById('pp-peek');
  if (peek?._dragCleanup) peek._dragCleanup();
  peek?.remove();
  document.getElementById('pp-peek-overlay')?.remove();
  ppPeekTitle = null;
}

function showPeekCard(title, lang, anchorEl) {
  hidePeekCard();
  ppPeekTitle = title;
  const wikiUrl = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title)}`;

  // Overlay (light frosted; click to dismiss)
  const overlay = document.createElement('div');
  overlay.id = 'pp-peek-overlay';
  overlay.addEventListener('click', () => {
    hidePeekCard();
    anchorEl?.classList.remove('pp-active-link');
  });
  document.body.appendChild(overlay);

  // Peek card
  const peek = document.createElement('div');
  peek.id = 'pp-peek';
  peek.innerHTML = `
    <div id="pp-peek-grabber-row">
      <div id="pp-peek-grabber-pill"></div>
    </div>
    <div id="pp-peek-body">
      <div id="pp-peek-thumb-wrap"></div>
      <div id="pp-peek-text-wrap">
        <p id="pp-peek-text">Loading…</p>
      </div>
    </div>
    <div id="pp-peek-footer">
      <a id="pp-peek-readmore" href="${wikiUrl}" target="_blank" rel="noopener">
        Read more
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path d="M8 1h5v5" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 1 L6 8" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6 3 H2 a1 1 0 0 0-1 1 V12 a1 1 0 0 0 1 1 H10 a1 1 0 0 0 1-1 V8" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>`;
  document.body.appendChild(peek);

  // ── Drag-to-expand / drag-to-dismiss gesture ─────────────
  const EXPAND_THRESHOLD  = -55;   // px up  → expand to graph
  const DISMISS_THRESHOLD =  55;   // px down → dismiss
  const ANIM_DUR = 280;            // ms for snap/fly animation

  let dragStartY = 0, dragDeltaY = 0, dragging = false, dragStartTime = 0;

  const startDrag = y => {
    dragging = true;
    dragStartY = y; dragDeltaY = 0; dragStartTime = Date.now();
    peek.style.transition = 'none';
    peek.classList.add('pp-peek-dragging');
  };
  const moveDrag = y => {
    if (!dragging) return;
    dragDeltaY = y - dragStartY;
    // Free upward, clamp downward to 160px
    peek.style.transform = `translateY(${Math.min(160, dragDeltaY)}px)`;
  };
  const endDrag = () => {
    if (!dragging) return;
    dragging = false;
    peek.classList.remove('pp-peek-dragging');
    const elapsed = Math.max(1, Date.now() - dragStartTime);
    const vel = dragDeltaY / elapsed; // px/ms (+= down)
    peek.style.transition = `transform ${ANIM_DUR}ms cubic-bezier(0.4,0,0.2,1)`;
    overlay.style.transition = `opacity ${ANIM_DUR}ms ease-out`;

    if (dragDeltaY < EXPAND_THRESHOLD || vel < -0.4) {
      // Swipe up → launch graph
      peek.style.transform = 'translateY(-110%)';
      overlay.style.opacity = '0';
      setTimeout(() => { hidePeekCard(); expandPeekToGraph(title, lang, anchorEl); }, ANIM_DUR);
    } else if (dragDeltaY > DISMISS_THRESHOLD || vel > 0.4) {
      // Swipe down → dismiss
      peek.style.transform = 'translateY(110%)';
      overlay.style.opacity = '0';
      setTimeout(() => { hidePeekCard(); anchorEl?.classList.remove('pp-active-link'); }, ANIM_DUR);
    } else {
      // Snap back
      peek.style.transform = 'translateY(0)';
    }
  };

  // Mouse
  peek.addEventListener('mousedown', e => { startDrag(e.clientY); e.preventDefault(); });
  const onMouseMove = e => moveDrag(e.clientY);
  const onMouseUp   = () => endDrag();
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup',   onMouseUp);

  // Touch
  peek.addEventListener('touchstart', e => { startDrag(e.touches[0].clientY); }, { passive: true });
  const onTouchMove = e => { if (e.touches.length === 1) moveDrag(e.touches[0].clientY); };
  const onTouchEnd  = () => endDrag();
  window.addEventListener('touchmove', onTouchMove, { passive: true });
  window.addEventListener('touchend',  onTouchEnd);

  // Allow "Read more" link clicks through without triggering drag; navigate in-prototype
  const readmoreEl = peek.querySelector('#pp-peek-readmore');
  readmoreEl.addEventListener('mousedown', e => e.stopPropagation());
  readmoreEl.addEventListener('click', e => { e.preventDefault(); navigateToArticle(title); });

  // Store cleanup for hidePeekCard
  peek._dragCleanup = () => {
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('mouseup',   onMouseUp);
    window.removeEventListener('touchmove', onTouchMove);
    window.removeEventListener('touchend',  onTouchEnd);
  };

  // Fetch summary → thumbnail + first sentence
  fetchPageSummary(lang, title).then(
    data => {
      if (ppPeekTitle !== title) return;
      try {
        if (data?.thumbnail?.source) {
          const img = document.createElement('img');
          img.id = 'pp-peek-thumb';
          img.src = data.thumbnail.source; img.alt = '';
          peek.querySelector('#pp-peek-thumb-wrap').appendChild(img);
        }
        const textEl = peek.querySelector('#pp-peek-text');
        if (textEl) {
          if (data?.extract_html) {
            textEl.innerHTML = extractFirstSentence(data.extract_html);
          } else if (data?.extract) {
            const safe = data.extract.replace(/&/g,'&amp;').replace(/</g,'&lt;');
            textEl.textContent = (safe.replace(/\.\s[\s\S]*/,'.') || safe);
          }
        }
      } catch (_) {}
    },
    () => {}
  );
}

function expandPeekToGraph(title, lang, anchorEl) {
  ppCurrentTitle = title;
  clearCanvas();
  ensureCanvas();
  ppFocusX = 0; ppFocusY = 0;
  applyCanvasTransform(false);
  anchorEl?.classList.add('pp-active-link');
  openCard(title, 0, 0, lang);
}

// Load a Wikipedia article title inside the prototype (used by all "Read more" links)
function navigateToArticle(title) {
  hidePeekCard();
  closePagePreview();
  const input = document.getElementById('article-input');
  if (input) input.value = title.replace(/ /g, '_');
  loadArticle();
}

// ── Show / navigate preview ───────────────────────────────────

function showPagePreview(title, anchorEl, fromHistory = false) {
  const fromThumbnail = anchorEl?.classList.contains('pp-node');
  const lang = (document.getElementById('lang-input').value.trim() || 'en').toLowerCase();

  if (fromThumbnail) {
    // Thumbnail click: add to history, expand to new card in existing canvas
    hidePeekCard();
    if (ppHistory.length === 0 && ppCurrentTitle) addToHistory(ppCurrentTitle);
    addToHistory(title);
    ppCurrentTitle = title;
    if (ppHistory.length > 0) renderHistoryBar(title);
  } else if (fromHistory) {
    // History chip: pan to existing card or reopen canvas
    hidePeekCard();
    ppCurrentTitle = title;
    renderHistoryBar(title);
    if (ppCardMap.has(title)) { panTo(ppCardMap.get(title).x, ppCardMap.get(title).y); return; }
    clearCanvas();
    ensureCanvas();
    ppFocusX = 0; ppFocusY = 0;
    applyCanvasTransform(false);
    anchorEl?.classList.add('pp-active-link');
    openCard(title, 0, 0, lang);
    return;
  } else {
    // Article link click: launch graph directly
    document.querySelectorAll('a.pp-active-link').forEach(a => a.classList.remove('pp-active-link'));
    addToHistory(title);
    expandPeekToGraph(title, lang, anchorEl);
    return;
  }

  // Thumbnail click: expand thumb into new card, leave existing cards intact
  {
    ensureCanvas();
    const thumb = ppThumbMap.get(title);
    let wx = ppFocusX, wy = ppFocusY;
    let fromThumbData = null;
    let parentCardTitle = null;

    if (thumb) {
      parentCardTitle = thumb.parentTitle;
      wx = thumb.x + thumb.size / 2;
      wy = thumb.y + thumb.cardH / 2;
      // Push further from parent card for breathing room
      const pc = ppCardMap.get(thumb.parentTitle);
      if (pc) {
        const dx = wx - pc.x, dy = wy - pc.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 0) { wx += (dx / dist) * 80; wy += (dy / dist) * 80; }
      }
      // Capture for expansion animation, then remove from map so collision check ignores it
      fromThumbData = { x: thumb.x, y: thumb.y, size: thumb.size, cardH: thumb.cardH };
      const thumbEl = thumb.el;
      ppThumbMap.delete(title);
      // Remove stale thumb line immediately now that it's out of ppThumbMap
      redrawAllLines();
      // Fade thumb el out
      thumbEl.style.transition = 'opacity 0.38s ease-out';
      thumbEl.style.opacity = '0';
      setTimeout(() => { thumbEl.remove(); }, 400);
    }

    // Nudge to a free position that doesn't overlap existing cards/thumbs
    const free = findFreeCardPos(wx, wy, title);
    wx = free.wx; wy = free.wy;

    panTo(wx, wy);
    openCard(title, wx, wy, lang, fromThumbData, parentCardTitle);
  }
}

async function fetchNodeConnections(lang, titles) {
  if (titles.length < 2) return new Set();
  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const enc = titles.slice(0, 50).map(encodeURIComponent).join('|');
  const res = await fetch(`${api}?action=query&prop=links&titles=${enc}&pllimit=500&format=json&origin=*`).catch(() => null);
  if (!res?.ok) return new Set();
  const data = await res.json().catch(() => null);
  if (!data?.query?.pages) return new Set();
  const titleSet = new Set(titles.map(t => t.toLowerCase().replace(/_/g, ' ')));
  const connections = new Set();
  for (const page of Object.values(data.query.pages)) {
    if (!page.links) continue;
    const from = page.title.toLowerCase();
    for (const lnk of page.links) {
      const to = lnk.title.toLowerCase();
      if (titleSet.has(to) && from !== to)
        connections.add([from, to].sort().join('|||'));
    }
  }
  return connections;
}

async function fetchArticleIntroLinks(lang, title) {
  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const res = await fetch(`${api}?action=parse&page=${encodeURIComponent(title)}&prop=text&section=0&format=json&origin=*`);
  if (!res.ok) return [];
  const data = await res.json().catch(() => null);
  const rawHTML = data?.parse?.text?.['*'];
  if (!rawHTML) return [];

  const parser = new DOMParser();
  const doc = parser.parseFromString(rawHTML, 'text/html');
  const output = doc.querySelector('.mw-parser-output') || doc.body;
  output.querySelectorAll('sup,.reference,.reflist,.infobox,table.infobox,.taxobox,.sidebar,.navbox,.mw-editsection').forEach(el => el.remove());

  const seen = new Set();
  const links = [];
  Array.from(output.querySelectorAll('p')).filter(p => p.textContent.trim()).forEach((p, pIdx) => {
    p.querySelectorAll('a[href^="/wiki/"]').forEach(a => {
      const href = a.getAttribute('href');
      if (/\/wiki\/(Help|Wikipedia|Special|File|Category|Template|Talk):/.test(href)) return;
      const text = a.textContent.trim();
      if (!text || /^\[\d+\]$/.test(text)) return;
      const t = decodeURIComponent(href.split('#')[0].slice(6));
      if (seen.has(t)) return;
      seen.add(t);
      links.push({ title: t, text, paraIdx: pIdx });
    });
  });
  return links;
}

function renderThumbNodes(nodes, wx, wy, parentTitle) {
  const canvas = document.getElementById('pp-canvas');
  if (!canvas) return;

  // Always use fresh physical position from ppCardMap (guards against stale closure)
  const _freshEntry = ppCardMap.get(parentTitle);
  if (_freshEntry) { wx = _freshEntry.x; wy = _freshEntry.y; }

  // All layout constants in logical pixels (zoom-0 equivalents).
  // wx/wy are physical; convert to logical for band placement.
  const _zs     = ZOOM_POSITION_SCALES[-ppZoomLevel];
  const lwx     = wx / _zs, lwy = wy / _zs;
  const MIN_SIZE   = 70;
  const CAPTION_H  = 30;
  const GAP        = 8;
  const BAND_W     = 700;
  const BAND_H     = 210;
  const CARD_H_EST = 380;

  // Logical-space bands above and below the card
  const xMin    = lwx - BAND_W / 2;
  const topZone = { y1: lwy - CARD_H_EST / 2 - GAP - BAND_H, y2: lwy - CARD_H_EST / 2 - GAP };
  const botZone = { y1: lwy + CARD_H_EST / 2 + GAP,          y2: lwy + CARD_H_EST / 2 + GAP + BAND_H };

  // Skip nodes already visible on canvas
  const filtered = nodes.filter(n => {
    const nt = n.summary?.title || n.title || '';
    return nt && !ppCardMap.has(nt) && !ppThumbMap.has(nt);
  });
  if (!filtered.length) return;

  const maxPerBand = Math.max(1, Math.floor(BAND_W / (MIN_SIZE + GAP)));
  const topCount   = Math.min(Math.ceil(filtered.length / 2), maxPerBand);
  const botCount   = Math.min(filtered.length - topCount, maxPerBand);
  const shown      = filtered.slice(0, topCount + botCount);

  const topSlotW = topCount > 0 ? BAND_W / topCount : Infinity;
  const botSlotW = botCount > 0 ? BAND_W / botCount : Infinity;
  const sizeByW  = Math.min(topSlotW, botSlotW) - GAP;
  const sizeByH  = Math.min(
    topCount > 0 ? BAND_H - CAPTION_H - GAP : Infinity,
    botCount > 0 ? BAND_H - CAPTION_H - GAP : Infinity
  );
  const size  = Math.max(MIN_SIZE, Math.min(160, Math.floor(sizeByW), Math.floor(sizeByH)));
  const cardH = size + CAPTION_H;

  const Y_FRACS = [0.10, 0.55, 0.20, 0.70, 0.35, 0.80, 0.05, 0.60];
  const rawPositions = [];

  const placeInBand = (n, zone, slotW, offset) => {
    if (n === 0) return;
    const yRange = Math.max(0, BAND_H - cardH);
    for (let i = 0; i < n; i++) {
      const cx = xMin + (i + 0.5) * slotW;
      rawPositions.push({
        x: Math.round(cx - size / 2),
        y: Math.round(zone.y1 + Y_FRACS[i % 8] * yRange),
        node: shown[offset + i]
      });
    }
  };

  placeInBand(topCount, topZone, topSlotW, 0);
  placeInBand(botCount, botZone, botSlotW, topCount);

  // Collision-filter: avoid all existing cards and thumbs; spiral outward to find free slot
  const CPAD = 8;
  const existingRects = getOccupiedRects(parentTitle);
  const placedRects   = [];
  const positions     = [];  // logical x, y

  // rawPositions are in logical space; collision check in physical space
  const pSize = size * _zs, pCardH = cardH * _zs, pCPAD = CPAD * _zs;
  const fitsAt = (lx, ly) => {
    const r = { x: lx * _zs, y: ly * _zs, w: pSize, h: pCardH };
    return !existingRects.some(e => rectsOverlap(r, e, pCPAD)) &&
           !placedRects.some(e =>   rectsOverlap(r, e, pCPAD));
  };

  for (const pos of rawPositions) {
    let { x, y } = pos; // logical
    if (fitsAt(x, y)) {
      positions.push({ ...pos, x, y });
      placedRects.push({ x: x * _zs, y: y * _zs, w: pSize, h: pCardH });
      continue;
    }
    // Spiral outward using polar sweep (24 angles × 20 rings) for dense coverage
    const step = size + CPAD;
    let placed = false;
    const SPIRAL_ANGLES = 24;
    outer: for (let ring = 1; ring <= 20; ring++) {
      for (let ai = 0; ai < SPIRAL_ANGLES; ai++) {
        const angle = (2 * Math.PI * ai) / SPIRAL_ANGLES;
        const nx = Math.round(x + Math.cos(angle) * ring * step);
        const ny = Math.round(y + Math.sin(angle) * ring * step);
        if (fitsAt(nx, ny)) {
          positions.push({ ...pos, x: nx, y: ny });
          placedRects.push({ x: nx * _zs, y: ny * _zs, w: pSize, h: pCardH });
          placed = true;
          break outer;
        }
      }
    }
    // If no free slot found in 20 rings, skip node
  }

  const BLOOM_DUR  = 420;
  const BLOOM_STAG = 55;
  const ROTS = [-5, 4, -3, 6, -7, 3, -4, 5];

  positions.forEach(({ x, y, node }, idx) => {
    const nodeTitle = node.summary?.title || node.title || '';
    if (!nodeTitle || ppCardMap.has(nodeTitle) || ppThumbMap.has(nodeTitle)) return;

    const el = document.createElement('div');
    const seen = ppHistory.some(h =>
      h.title === nodeTitle ||
      h.title === nodeTitle.replace(/ /g, '_') ||
      h.title.replace(/_/g, ' ') === nodeTitle
    );
    // x, y are logical; convert to physical for DOM placement
    const px = Math.round(x * _zs), py = Math.round(y * _zs);
    el.className = 'pp-node' + (seen ? ' pp-node-seen' : '');
    el.style.cssText = `left:${px}px;top:${py}px;width:${pSize}px;`;
    el.style.transformOrigin = `${pSize / 2}px ${pCardH / 2}px`;
    el.style.setProperty('--bloom-rot', `${ROTS[idx % 8]}deg`);

    const dotEl = document.createElement('div');
    dotEl.className = 'pp-node-dot';

    const img = document.createElement('img');
    img.alt = '';
    img.style.height = `${pSize}px`;

    const caption = document.createElement('div');
    caption.className = 'pp-caption';
    caption.textContent = nodeTitle.replace(/_/g, ' ');

    el.appendChild(dotEl);
    el.appendChild(img);
    el.appendChild(caption);
    canvas.appendChild(el);

    // Register in world map (bloomed=false until image loads + animation fires)
    // logicalX/Y are zoom-0 positions; size/cardH are physical at current zoom
    ppThumbMap.set(nodeTitle, { x: px, y: py, logicalX: x, logicalY: y, size: pSize, cardH: pCardH, logicalSize: size, logicalCardH: cardH, parentTitle, el, bloomed: false });

    const delay = idx * BLOOM_STAG;
    const bloom = () => {
      el.style.animation = `pp-bloom ${BLOOM_DUR}ms cubic-bezier(0.34,1.2,0.64,1) ${delay}ms forwards`;
      // Mark bloomed and immediately redraw lines so connectors appear as each thumb settles
      el.addEventListener('animationend', () => {
        const entry = ppThumbMap.get(nodeTitle);
        if (entry) {
          entry.bloomed = true;
          if (document.getElementById('pp-canvas')) {
            redrawAllLines();
            if (ppZoomLevel === -1) repositionLabels();
          }
        }
      }, { once: true });
    };
    img.addEventListener('load', bloom);
    img.addEventListener('error', () => { el.remove(); ppThumbMap.delete(nodeTitle); });
    img.src = node.summary.thumbnail.source;
    if (img.complete && img.naturalWidth) bloom();

    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      // At zoom -1/-2, if this node's article has already been opened as a card,
      // zoom back to full view and centre on that card instead of re-opening
      if (ppZoomLevel !== 0 && ppCardMap.has(nodeTitle)) {
        ppCurrentTitle = nodeTitle;
        ppUserHasPanned = false;
        setZoomLevel(0);
      } else {
        showPagePreview(nodeTitle, el);
      }
    });
  });

}

/* ────────────────────────────────────────────────────────────
   Fetch & load  (uses MediaWiki Action API — CORS-safe)
──────────────────────────────────────────────────────────── */
async function loadArticle() {
  const lang  = (document.getElementById('lang-input').value.trim() || 'en').toLowerCase();
  const raw   = document.getElementById('article-input').value.trim();
  if (!raw) return;

  const title  = raw.replace(/ /g, '_');
  const root   = document.getElementById('article-root');
  const status = document.getElementById('status-text');

  root.innerHTML = '<div class="state-loading">Loading…</div>';
  status.textContent = '';
  ppHistory.length = 0;
  ppCurrentTitle = null;
  document.getElementById('pp-history-bar')?.remove();
  closePagePreview();

  const api = `https://${lang}.wikipedia.org/w/api.php`;
  const enc = encodeURIComponent(title);

  try {
    // Fetch article HTML + metadata in parallel
    const [parseRes, metaRes, relRes, talkRes] = await Promise.allSettled([
      fetch(`${api}?action=parse&page=${enc}&prop=text|langlinks|displaytitle&format=json&origin=*`).then(r => r.json()),
      fetch(`${api}?action=query&prop=revisions|pageprops&titles=${enc}&rvprop=timestamp|user&rvlimit=1&format=json&origin=*`).then(r => r.json()),
      fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/related/${enc}`).then(r => r.ok ? r.json() : { pages: [] }).catch(() => ({ pages: [] })),
      fetch(`${api}?action=parse&page=Talk:${enc}&prop=sections&format=json&origin=*`).then(r => r.json()).catch(() => null),
    ]);

    if (parseRes.status === 'rejected') throw new Error('Network error');
    const parseData = parseRes.value;
    if (parseData.error) throw new Error(parseData.error.info ?? 'Article not found');

    const p          = parseData.parse;
    // Rewrite protocol-relative URLs so images load over both http:// and file://
    const rawHTML    = p.text['*'].replace(/\/\/upload\.wikimedia\.org/g, 'https://upload.wikimedia.org');
    const langCount  = p.langlinks?.length ?? 0;
    const displayTitle = p.displaytitle ?? title;

    // Metadata
    let timestamp = null, user = null, dir = 'ltr';
    if (metaRes.status === 'fulfilled') {
      const page = Object.values(metaRes.value?.query?.pages ?? {})[0];
      timestamp  = page?.revisions?.[0]?.timestamp ?? null;
      user       = page?.revisions?.[0]?.user ?? null;
      dir        = page?.pagelanguagehtmlcode === 'ar' ? 'rtl' : (page?.pageprops?.['wgPageContentLanguage'] ?? 'ltr');
    }

    // Detect RTL from lang code
    const rtlLangs = ['ar','he','fa','ur','yi','ckb','ps','sd','ug'];
    if (rtlLangs.includes(lang)) dir = 'rtl';

    // Related pages
    const related = relRes.status === 'fulfilled' ? (relRes.value?.pages ?? []) : [];

    // Talk page comment count (number of top-level sections on Talk page)
    const commentCount = talkRes.status === 'fulfilled'
      ? (talkRes.value?.parse?.sections?.length ?? 0)
      : 0;

    // Parse HTML into lead + sections
    const { leadHTML, firstPara, sections } = parseArticleHTML(rawHTML);

    renderArticle({ title, displayTitle, langCount, commentCount, leadHTML, firstPara, sections, timestamp, user, related, dir, lang });
    status.textContent = `✓ ${title.replace(/_/g, ' ')}`;

  } catch (err) {
    root.innerHTML = `
      <div class="state-error">
        <strong>Could not load article</strong><br>
        ${esc(err.message)}<br><br>
        <small>Check the language code and article title.<br>
        (Example: lang <code>en</code>, title <code>Hedy_Lamarr</code>)</small>
      </div>`;
    status.textContent = '✗ error';
  }
}
